    function formatImportDate(val) {
        if (!val) return '';
        if (/^\d{4}-\d{2}-\d{2}$/.test(val)) return val;
        const d = new Date(val);
        if (!isNaN(d)) return d.toISOString().split('T')[0];
        return '';
    }

    async function doImport() {
        if (!importData.length) return;
        const btn = document.getElementById('importBtn');
        btn.textContent = '⏳ Checking duplicates...'; btn.disabled = true;

        // Build duplicate index from existing items
        const existing = STATE.items || [];
        const existBarcodes = new Set(existing.map(i => (i.barcode||'').trim().toLowerCase()).filter(Boolean));
        const existNameDate = new Set(existing.map(i => (i.name||'').toLowerCase().trim() + '||' + (i.expiryDate||'').trim()));

        let success = 0, dupes = 0, failed = 0;
        const uid = STATE.user.localId || STATE.user.uid;
        btn.textContent = '⏳ Importing...';
        for (const item of importData) {
            const barcode = (item.barcode||'').trim().toLowerCase();
            const nameDate = (item.name||'').toLowerCase().trim() + '||' + (item.expiryDate||'').trim();
            // Skip if barcode matches OR name+expiryDate matches
            if ((barcode && existBarcodes.has(barcode)) || existNameDate.has(nameDate)) {
                dupes++; continue;
            }
            try {
                await dbPush('items', { ...item, userId: uid, userEmail: STATE.user.email, createdAt: new Date().toISOString() });
                existBarcodes.add(barcode);
                existNameDate.add(nameDate);
                success++;
            } catch(e) { failed++; }
        }
        closeModal();
        const dupMsg = dupes > 0 ? ` • ${dupes} duplicate${dupes!==1?'s':''} skipped` : '';
        const failMsg = failed > 0 ? ` • ${failed} failed` : '';
        showAlert('success', `✅ Import complete! ${success} added${dupMsg}${failMsg}.`);
        // Invalidate cache so admin sees new items immediately
        try { localStorage.removeItem('beep_cache_items_admin'); } catch(e){}
        fetchItems();
    }

    // ===================== PDF LOGO HEADER HELPER =====================
    /**
     * Draws the company logo + name header on a jsPDF doc.
     * Returns the Y position to start content after the header.
     * @param {object} doc - jsPDF instance
     * @param {string} title - Main form title (e.g. "STOCK OUT TEMPLATE")
     * @param {object} meta - { date, branch, preparedBy, subtitle }
     * @param {string} accentColor - hex string for accent bar (optional)
     */
    function addPDFHeader(doc, title, meta = {}, accentHex = '#1e3a8a') {
        const pageW = 210; const margin = 14;
        // Accent bar top
        const [r,g,b] = hexToRgb(accentHex);
        doc.setFillColor(r,g,b);
        doc.rect(0, 0, pageW, 38, 'F');

        // Logo image — left side
        try {
            doc.addImage(COMPANY_LOGO_B64, 'JPEG', margin, 4, 22, 22);
        } catch(e) { /* skip if image fails */ }

        // Business name + title — right of logo
        doc.setTextColor(255,255,255);
        doc.setFontSize(13); doc.setFont(undefined,'bold');
        doc.text('REAL SAVE SUPERMARKET', margin + 26, 12);
        doc.setFontSize(10); doc.setFont(undefined,'normal');
        doc.text(title, margin + 26, 20);
        if (meta.subtitle) {
            doc.setFontSize(8);
            doc.text(meta.subtitle, margin + 26, 27);
        }

        // Meta row below accent bar
        doc.setFillColor(245, 247, 250);
        doc.rect(0, 38, pageW, 14, 'F');
        doc.setFontSize(8.5); doc.setFont(undefined,'normal'); doc.setTextColor(50,50,80);
        const metaY = 47;
        const parts = [];
        if (meta.date)       parts.push('📅 Date: ' + meta.date);
        if (meta.branch)     parts.push('🏪 Branch: ' + meta.branch);
        if (meta.preparedBy) parts.push('👤 By: ' + meta.preparedBy);
        // Spread across page
        if (parts.length === 1) doc.text(parts[0], margin, metaY);
        else if (parts.length === 2) { doc.text(parts[0], margin, metaY); doc.text(parts[1], pageW/2, metaY); }
        else if (parts.length >= 3) { doc.text(parts[0], margin, metaY); doc.text(parts[1], 80, metaY); doc.text(parts[2], 148, metaY); }

        // Thin divider
        doc.setDrawColor(r,g,b); doc.setLineWidth(0.5);
        doc.line(margin, 52, pageW-margin, 52);

        return 58; // content starts here
    }

    function addPDFFooter(doc, label) {
        const margin = 14;
        const pageCount = doc.internal.getNumberOfPages();
        for (let i = 1; i <= pageCount; i++) {
            doc.setPage(i);
            const pageW = doc.internal.pageSize.getWidth();
            const pageH = doc.internal.pageSize.getHeight();
            doc.setFontSize(7); doc.setTextColor(160,160,160); doc.setFont(undefined,'normal');
            doc.text('REAL SAVE SUPERMARKET  •  ' + label + '  •  Generated by BEEP', margin, pageH-6);
            doc.text('Page ' + i + ' of ' + pageCount, pageW - margin, pageH-6, {align:'right'});
            // Bottom line
            doc.setDrawColor(200,200,200); doc.setLineWidth(0.3);
            doc.line(margin, pageH-10, pageW-margin, pageH-10);
        }
    }

    function hexToRgb(hex) {
        const h = hex.replace('#','');
        return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];
    }

                : (STATE.branches.find(b => b.id === STATE.currentBranch)?.name || STATE.currentBranch || 'Unknown');
            const entry = {
                action:    label,
                filename,
                userId:    uid,
                userEmail: email,
                userName:  name,
                branch,
                printedAt: new Date().toISOString(),
                ...extra
            };
            await dbPush('printLogs', entry);
        } catch(e) {
            // Silent — never block the PDF flow
            console.warn('Print log failed:', e);
        }
    }

    async function savePDF(doc, filename, label) {
        showAlert('info', '⏳ Preparing PDF...');

        const proto = location.protocol;
        const isRestricted = (proto === 'content:' || proto === 'file:');

        // ── http/https only: native file share ──
        if (!isRestricted && navigator.share && navigator.canShare) {
            try {
                const blob = doc.output('blob');
                const file = new File([blob], filename, { type: 'application/pdf' });
                if (navigator.canShare({ files: [file] })) {
                    await navigator.share({ title: 'BEEP — ' + label, files: [file] });
                    showAlert('success', '✅ PDF shared!');
                    logPrintAction(label, filename, { method: 'share' });
                    return;
                }
            } catch(e) {
                if (e.name === 'AbortError') return;
                console.warn('native share failed, falling through:', e);
            }
        }

        // ── http/https only: doc.save() anchor-click ──
        if (!isRestricted) {
            try {
                doc.save(filename);
                showAlert('success', '✅ PDF saved to Downloads!');
                logPrintAction(label, filename, { method: 'download' });
                return;
            } catch(e) { console.warn('doc.save failed:', e); }
        }

        // ── PRIMARY for content:// and file://: navigate current tab to print view ──
        // window.open() and anchor clicks are blocked in these contexts.
        // location.href assignment cannot be blocked — no popup required.
        logPrintAction(label, filename, { method: 'printView' });
        _openPrintView(doc, filename, label);
    }

<script>
const B64  = \`${base64}\`;

// ── Back: restore the app from its snapshot ──
function goBackToApp() {
  try {
    const snap = sessionStorage.getItem('beep_app_snapshot');
    if (snap) {
      sessionStorage.removeItem('beep_app_snapshot');
      document.open('text/html', 'replace');
      document.write(snap);
      document.close();
      return;
    }
  } catch(e) { console.warn('restore failed', e); }
  // Fallback — reload the file from its original content:// URL
  location.reload();
}

function b64toBlob(b64){
  const bin = atob(b64);
  const buf = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) buf[i]=bin.charCodeAt(i);
  return new Blob([buf],{type:'application/pdf'});
}

function setStatus(msg){ document.getElementById('status').textContent = msg; }

async function sharePDF(){
  setStatus('⏳ Preparing…');
  try {
    const blob = b64toBlob(B64);
    const file = new File([blob], NAME, {type:'application/pdf'});
    if(navigator.share && navigator.canShare && navigator.canShare({files:[file]})){
      await navigator.share({title:'BEEP — '+LABEL, files:[file]});
      setStatus('✅ Shared!');
    } else if(navigator.share){
      const dataUri = 'data:application/pdf;base64,'+B64;
      await navigator.share({title:'BEEP — '+LABEL, text:'PDF: '+NAME, url: dataUri});
      setStatus('✅ Shared!');
    } else {
      setStatus('❌ Share not supported — use View PDF.');
      viewPDF();
    }
  } catch(e){
    if(e.name==='AbortError'){ setStatus(''); return; }
    setStatus('❌ Share failed — opening PDF directly.');
    viewPDF();
  }
}

function viewPDF(){
  setStatus('⏳ Opening PDF…');
  location.href = 'data:application/pdf;base64,'+B64;
}

function printPDF(){
  setStatus('⏳ Preparing print…');
  const w = window.open('data:application/pdf;base64,'+B64,'_blank');
  if(!w){ viewPDF(); }
  else { setStatus('✅ Opened — use browser ⋮ menu to Print.'); }
}
<\/script>

    // Keep downloadAndShare for Excel files (non-PDF blobs)
    async function downloadAndShare(blob, filename, mimeType, label) {
        // For PDFs, use savePDF instead. This handles Excel/other files.
        try {
            // Try native share first
            if (navigator.share && navigator.canShare) {
                try {
                    const file = new File([blob], filename, {type: mimeType});
                    if (navigator.canShare({ files: [file] })) {
                        await navigator.share({ title: 'BEEP — ' + label, files: [file] });
                        showAlert('success', '✅ File shared!');
                        return;
                    }
                } catch(e) { if (e.name === 'AbortError') return; }
            }
            // Anchor download
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = filename; a.style.display = 'none';
            document.body.appendChild(a); a.click();
            setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 2000);
            showAlert('success', '✅ File downloaded!');
            setTimeout(() => showFileShareModal(url, filename, label, blob, mimeType), 1000);
        } catch(e) {
            console.warn('downloadAndShare error:', e);
            showFileShareModal(null, filename, label, blob, mimeType);
        }
    }

    function showFileShareModal(dataUri, filename, label, blob, mimeType) {
        const existing = document.getElementById('fileShareModal');
        if (existing) existing.remove();
        window._lastSharedBlob = blob;
        window._lastSharedFilename = filename;
        window._lastSharedMime = mimeType;
        window._lastSharedLabel = label;
        window._lastSharedDataUri = dataUri;
        const modal = document.createElement('div');
        modal.id = 'fileShareModal';
        modal.className = 'modal show';
        modal.innerHTML = `
            <div class="modal-content" style="max-width:480px;">
                <div class="modal-header" style="background:linear-gradient(135deg,#1e40af,#2563eb);color:white;">
                    <h3 style="color:white;">📤 File Ready</h3>
                    <button class="modal-close" onclick="document.getElementById('fileShareModal').remove()" style="color:white;">&times;</button>
                </div>
                <div class="modal-body">
                    <div style="text-align:center;padding:10px 0 14px;font-size:14px;color:var(--text-primary);">
                        <div style="font-size:32px;margin-bottom:6px;">${mimeType==='application/pdf'?'📄':'📊'}</div>
                        <strong>${escHtml(filename)}</strong>
                    </div>
                    <div style="display:grid;gap:10px;">
                        <a href="${dataUri||''}" download="${escHtml(filename)}"
                            onclick="setTimeout(()=>document.getElementById('fileShareModal')?.remove(),500)"
                            style="display:block;text-align:center;padding:12px;background:#2563eb;color:white;border-radius:10px;font-weight:700;font-size:14px;text-decoration:none;">
                            ⬇️ Download File
                        </a>
                        <button class="btn btn-whatsapp" onclick="shareFileViaWhatsApp(window._lastSharedBlob,window._lastSharedFilename,window._lastSharedMime,window._lastSharedLabel)" style="width:100%;">
                            📱 Share via WhatsApp
                        </button>
                        <button class="btn btn-secondary" onclick="copyFileShareLink()" style="width:100%;">
                            📋 Copy Share Message
                        </button>
                        <button class="btn btn-secondary" onclick="document.getElementById('fileShareModal').remove()" style="width:100%;">
                            ✓ Done
                        </button>
                    </div>
                </div>
            </div>`;
        // Store for share handlers
        window._lastSharedBlob = blob;
        window._lastSharedFilename = filename;
        window._lastSharedMime = mimeType;
        window._lastSharedLabel = label;
        document.body.appendChild(modal);
    }

    async function shareFileViaWhatsApp(blob, filename, mimeType, label) {
        document.getElementById('fileShareModal')?.remove();
        // Try native share with file (opens Android share sheet)
        if (navigator.share && blob) {
            try {
                const file = new File([blob], filename, {type: mimeType});
                const canShare = navigator.canShare ? navigator.canShare({files:[file]}) : false;
                if (canShare) {
                    await navigator.share({ title: 'BEEP — ' + label, files: [file] });
                    return;
                }
            } catch(e) { if (e.name === 'AbortError') return; }
        }
        // Fallback: open wa.me with text — user picks group/contact
        const msg = encodeURIComponent('📊 ' + label + ' — ' + filename + '\n\nGenerated by BEEP Expiry Management\nPlease check your Downloads folder for the file.');
        window.open('https://wa.me/?text=' + msg, '_blank');
    }

    function copyFileShareLink() {
        const label = window._lastSharedLabel || 'BEEP Export';
        const filename = window._lastSharedFilename || 'file';
        const text = '📊 ' + label + '\nFile: ' + filename + '\nGenerated by BEEP Expiry Management';
        if (navigator.clipboard) {
            navigator.clipboard.writeText(text).then(() => {
                showAlert('success', '✅ Share text copied! Paste into any chat.');
                document.getElementById('fileShareModal')?.remove();
            }).catch(() => { showAlert('info', 'ℹ️ File downloaded. Share it from your Downloads folder.'); });
        }
    }

        await loadJsPDF();

        ]);
        doc.autoTable({
            head: [cols], body: rows, startY: 50,

    // ── Admin: load saved forms from Firebase ──
    async function loadSavedForms() {

            dbGet('expiredForms'),
            dbGet('stockOutForms'),

        ]);

    // ===================== PRINT LOG (Admin) =====================
    let _printLogAllEntries = [];

    async function loadAdminPrintLog() {
        const container = document.getElementById('adminPrintLogContainer');
        const statsEl   = document.getElementById('printLogStats');
        const alertEl   = document.getElementById('adminPrintLogAlert');
        if (container) container.innerHTML = '<div style="padding:14px;color:var(--text-secondary);font-size:13px;">⏳ Loading...</div>';
        try {
            const data = await dbGet('printLogs');
            _printLogAllEntries = data
                ? Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>(b.printedAt||'').localeCompare(a.printedAt||''))
                : [];

            // Stats banner
            if (statsEl) {
                const total  = _printLogAllEntries.length;
                const users  = new Set(_printLogAllEntries.map(e=>e.userEmail)).size;
                const today  = _printLogAllEntries.filter(e=>(e.printedAt||'').startsWith(new Date().toISOString().split('T')[0])).length;
                statsEl.innerHTML = [
                    { label:'Total Prints', val: total,  color:'#2563eb' },
                    { label:'Today',        val: today,  color:'#10b981' },
                    { label:'Users',        val: users,  color:'#7c3aed' }
                ].map(s=>`
                    <div style="background:var(--card-bg);border:1px solid var(--border-color);border-radius:10px;padding:10px 16px;min-width:100px;text-align:center;">
                        <div style="font-size:20px;font-weight:900;color:${s.color};">${s.val}</div>
                        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">${s.label}</div>
                    </div>`).join('');
            }
            renderAdminPrintLog(_printLogAllEntries);
        } catch(e) {
            if (container) container.innerHTML = '<div style="padding:14px;color:#dc2626;font-size:13px;">❌ Failed to load print logs: ' + escHtml(e.message||String(e)) + '</div>';
        }
    }

    function filterAdminPrintLog(q) {
        const typeFilter = (document.getElementById('printLogTypeFilter')?.value||'').toLowerCase();
        const search = (q||'').trim().toLowerCase();
        const filtered = _printLogAllEntries.filter(e => {
            const matchType   = !typeFilter || (e.action||'').toLowerCase().includes(typeFilter);
            const matchSearch = !search
                || (e.userName||'').toLowerCase().includes(search)
                || (e.userEmail||'').toLowerCase().includes(search)
                || (e.action||'').toLowerCase().includes(search)
                || (e.branch||'').toLowerCase().includes(search)
                || (e.filename||'').toLowerCase().includes(search);
            return matchType && matchSearch;
        });
        renderAdminPrintLog(filtered);
    }

    function renderAdminPrintLog(entries) {
        const container = document.getElementById('adminPrintLogContainer');
        if (!container) return;
        if (!entries.length) {
            container.innerHTML = '<div style="padding:18px;text-align:center;color:var(--text-secondary);font-size:13px;">📭 No print records found.</div>';
            return;
        }
        const methodIcon = { share:'📤', download:'💾', browserPrint:'🖨️', printView:'📄' };
        const actionColor = a => {
            if ((a||'').includes('Expired')) return { bg:'#fef2f2', border:'#dc2626', text:'#991b1b' };
            if ((a||'').includes('Stock Out')) return { bg:'#f0fdf4', border:'#10b981', text:'#065f46' };
            if ((a||'').includes('Policy')) return { bg:'#eff6ff', border:'#3b82f6', text:'#1e40af' };
            return { bg:'var(--bg-tertiary)', border:'var(--border-color)', text:'var(--text-primary)' };
        };
        container.innerHTML = entries.map(e => {
            const c = actionColor(e.action);
            const icon = methodIcon[e.method] || '🖨️';
            const when = e.printedAt ? new Date(e.printedAt).toLocaleString('en-KE',{dateStyle:'medium',timeStyle:'short'}) : '—';
            return `
            <div style="padding:10px 14px;border-bottom:1px solid var(--border-color);display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap;">
                <div style="flex-shrink:0;width:34px;height:34px;border-radius:8px;background:${c.bg};border:1.5px solid ${c.border};display:flex;align-items:center;justify-content:center;font-size:16px;">${icon}</div>
                <div style="flex:1;min-width:0;">
                    <div style="font-weight:700;font-size:13px;color:${c.text};">${escHtml(e.action||'—')}</div>
                    <div style="font-size:11px;color:var(--text-secondary);margin-top:2px;line-height:1.6;">
                        👤 ${escHtml(e.userName||e.userEmail||'Unknown')} &nbsp;•&nbsp;
                        🏪 ${escHtml(e.branch||'—')} &nbsp;•&nbsp;
                        ${e.rows!=null ? '📦 '+e.rows+' rows &nbsp;•&nbsp; ' : ''}
                        🕒 ${when}
                    </div>
                    <div style="font-size:10px;color:var(--text-tertiary);margin-top:2px;font-family:monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(e.filename||'')}</div>
                </div>
                <button onclick="adminDeletePrintLog('${escHtml(e.id)}')" title="Delete log entry"
                    style="flex-shrink:0;background:none;border:none;cursor:pointer;color:#dc2626;font-size:15px;padding:4px 6px;border-radius:6px;opacity:.7;"
                    onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=.7">🗑️</button>
            </div>`;
        }).join('');
    }

    // ── renderAdminContactGrid: defined as real function (not innerHTML <script>) ──
    let _cgOffset = 0;
    const ADMIN_CONTACT_PAGE = 30;

    function renderAdminContactGrid(offset, search) {
        if (offset === 0) _cgOffset = 0;
        const grid    = document.getElementById('adminContactGrid');
        const more    = document.getElementById('contactGridMore');
        const counter = document.getElementById('contactGridCount');
        if (!grid) return;
        const q = (search !== undefined ? search : (document.getElementById('contactGridSearch')?.value || '')).toLowerCase();
        const allSlots = Array.from({length:250}, (_,i) => ({i, c: STATE.contacts[i] || {name:'',phone:'',email:''}}));
        const filledCount = allSlots.filter(({c}) => c.name||c.phone||c.email).length;
        const visible = q
            ? allSlots.filter(({c}) => (c.name+c.phone+(c.email||'')).toLowerCase().includes(q))
            : allSlots.filter(({c,i}) => c.name||c.phone||c.email || i < (filledCount + 5));
        const page = visible.slice(_cgOffset, _cgOffset + ADMIN_CONTACT_PAGE);
        const html = page.map(({i,c}) => {
            const filled = !!(c.name||c.phone||c.email);
            return `<div class="contact-slot ${filled?'filled':''}" id="acslot_${i}"
                style="flex-direction:column;align-items:stretch;gap:6px;padding:12px;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">
                    <div class="contact-avatar" id="acav_${i}"
                        style="font-size:${filled?'16px':'13px'};flex-shrink:0;">
                        ${c.name ? c.name.charAt(0).toUpperCase() : i+1}
                    </div>
                    <input type="text" class="contact-input" id="acname_${i}"
                        value="${escHtml(c.name||'')}" placeholder="👤 Name"
                        style="flex:1;" oninput="updateAdminSlot(${i})">
                    <button onclick="clearAdminSlot(${i})" title="Clear"
                        style="background:none;border:none;cursor:pointer;font-size:14px;color:#d1d5db;padding:4px;flex-shrink:0;"
                        onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">✕</button>
                </div>
                <input type="tel" class="contact-input" id="acphone_${i}"
                    value="${escHtml(c.phone||'')}" placeholder="📱 WhatsApp: +254712345678"
                    oninput="updateAdminSlot(${i})">
                <input type="email" class="contact-input" id="acemail_${i}"
                    value="${escHtml(c.email||'')}" placeholder="✉️ Email: name@company.com"
                    style="border-color:${c.email?'#3b82f6':''};"
                    oninput="updateAdminSlot(${i})">
            </div>`;
        }).join('');
        if (offset === 0) { grid.innerHTML = html; } else { grid.insertAdjacentHTML('beforeend', html); }
        _cgOffset = _cgOffset + ADMIN_CONTACT_PAGE;
        const filled = STATE.contacts.filter(c => c && (c.name||c.phone||c.email)).length;
        if (counter) counter.textContent = filled + ' / 250 filled';
        const remaining = visible.length - _cgOffset;
        if (more) more.innerHTML = remaining > 0
            ? `<button class="btn btn-secondary btn-sm" style="width:auto;" onclick="renderAdminContactGrid(${_cgOffset})">⬇️ Load ${Math.min(ADMIN_CONTACT_PAGE,remaining)} More (${remaining} remaining)</button>`
            : (visible.length < 250 && !q ? `<button class="btn btn-primary btn-xs" style="width:auto;margin-top:4px;" onclick="renderAdminContactGrid(${_cgOffset})">➕ Show more empty slots</button>` : '');
    }

    function addNewAdminContact() {
        const searchEl = document.getElementById('contactGridSearch');
        if (searchEl && searchEl.value) { searchEl.value = ''; renderAdminContactGrid(0, ''); }
        const firstEmpty = STATE.contacts.findIndex(c => !c || (!c.name && !c.phone && !c.email));
        const targetIdx  = firstEmpty >= 0 ? firstEmpty : STATE.contacts.length < 250 ? STATE.contacts.length : -1;
        if (targetIdx < 0) { showAlert('warning', '⚠️ All 250 slots are full.'); return; }
        const neededOffset = Math.floor(targetIdx / ADMIN_CONTACT_PAGE) * ADMIN_CONTACT_PAGE;
        if (!document.getElementById('acslot_' + targetIdx)) {
            for (let off = 0; off <= neededOffset; off += ADMIN_CONTACT_PAGE) renderAdminContactGrid(off);
        }
        setTimeout(() => {
            const slot  = document.getElementById('acslot_' + targetIdx);
            const input = document.getElementById('acname_' + targetIdx);
            if (slot) {
                slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
                slot.style.transition  = 'border-color .2s, box-shadow .2s';
                slot.style.borderColor = '#10b981';
                slot.style.boxShadow   = '0 0 0 3px rgba(16,185,129,.3)';
                setTimeout(() => { slot.style.borderColor = ''; slot.style.boxShadow = ''; }, 1800);
            }
            if (input) input.focus();
        }, 150);
    }

    function updateAdminSlot(i) {
        const name  = document.getElementById('acname_'+i)?.value  || '';
        const phone = document.getElementById('acphone_'+i)?.value || '';
        const email = document.getElementById('acemail_'+i)?.value || '';
        const slot  = document.getElementById('acslot_'+i);
        const av    = document.getElementById('acav_'+i);
        const emailInput = document.getElementById('acemail_'+i);
        if (slot) slot.classList.toggle('filled', !!(name||phone||email));
        if (av)   { av.textContent = name ? name.charAt(0).toUpperCase() : (i+1); av.style.fontSize = name ? '16px' : '13px'; }
        // Blue border when email is filled
        if (emailInput) emailInput.style.borderColor = email ? '#3b82f6' : '';
    }

    function clearAdminSlot(i) {
        const n = document.getElementById('acname_'+i);  if (n) n.value = '';
        const p = document.getElementById('acphone_'+i); if (p) p.value = '';
        const e = document.getElementById('acemail_'+i); if (e) e.value = '';
        updateAdminSlot(i);
    }

    function clearAllAdminContacts() {
        if (!confirm('Clear all 250 contact slots?')) return;
        for (let i=0;i<250;i++) clearAdminSlot(i);
    }

    async function saveAdminContacts() {
        const contacts = Array.from({length:250},(_,i)=>({
            name:  (document.getElementById('acname_'+i)?.value||'').trim(),
            phone: (document.getElementById('acphone_'+i)?.value||'').trim(),
            email: (document.getElementById('acemail_'+i)?.value||'').trim()
        }));
        const alertDiv = document.getElementById('adminContactsAlert');
        try {
            await saveContacts(contacts);
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-success show">✅ Contacts saved successfully!</div>';
            setTimeout(()=>{ if(alertDiv) alertDiv.innerHTML=''; }, 2500);
        } catch(e) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Failed to save. Please try again.</div>';
        }
    }

    async function saveMasterTemplate(editId) {
        const name = document.getElementById('tplFName').value.trim();
        const category = document.getElementById('tplFCategory').value;
        const alertDiv = document.getElementById('masterTplFormAlert');
        if (!name || !category) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Template Name and Category are required.</div>';
            return;
        }
        const data = {
            name,
            category,
            supplier:   document.getElementById('tplFSupplier').value.trim(),
            location:   document.getElementById('tplFLocation').value,
            barcode:    document.getElementById('tplFBarcode').value.trim(),
            quantity:   document.getElementById('tplFQty').value || '',
            checkedBy:  document.getElementById('tplFCheckedBy').value.trim(),
            notes:      document.getElementById('tplFNotes').value.trim(),
            updatedAt:  new Date().toISOString()
        };
        try {
            if (editId) {
                await dbUpdate(TPL_PATH + '/' + editId, data);
            } else {
                const res = await dbPush(TPL_PATH, data);
                editId = res.name;
            }
            STATE.appSettings = STATE.appSettings || {};
            STATE.appSettings.masterTemplates = STATE.appSettings.masterTemplates || {};
            STATE.appSettings.masterTemplates[editId] = data;
            document.getElementById('masterTplFormModal').remove();
            renderMasterTplList(STATE.appSettings.masterTemplates);
            const a = document.getElementById('masterTplAlert');
            if (a) { a.innerHTML = '<div class="alert alert-success show">✅ Template saved!</div>'; setTimeout(()=>{a.innerHTML='';},2500); }
        } catch(e) {
            if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-danger show">❌ ${e.message||'Save failed'}</div>`;
        }
    }

        if(Object.keys(templates).length===0){showAlert('warning','⚠️ No templates defined yet.');return;}
        window._itemTplScanMode=true;

        if(p.status==='denied'){window._itemTplScanMode=false;showCameraPermissionDeniedError();return;}
        if(p.status==='granted'){showScanningModal();try{await startBarcodeCamera();}catch(e){closeModal();window._itemTplScanMode=false;handleCameraError(e);}return;}

    /** Called from template form — opens camera scanner and routes result to tplFBarcode */
    async function scanBarcodeForTemplate() {
        window._tplScanMode = true;
        const permissionCheck = await checkCameraPermissions();
        if (!permissionCheck.supported) { window._tplScanMode = false; showCameraNotSupportedError(permissionCheck.error); return; }
        if (permissionCheck.status === 'denied') { window._tplScanMode = false; showCameraPermissionDeniedError(); return; }
        if (permissionCheck.status === 'granted') {
            showScanningModal();
            try { await startBarcodeCamera(); } catch(e) { closeModal(); window._tplScanMode = false; handleCameraError(e); }
            return;
        }
        showCameraPermissionPrompt();
    }

    /** Import templates from an Excel/CSV file */
    async function importTemplatesFromExcel(input) {
        const file = input.files[0];
        input.value = ''; // reset so same file can be re-imported
        if (!file) return;
        const alertDiv = document.getElementById('masterTplAlert');
        try {
            await loadXLSX();
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const wb = XLSX.read(e.target.result, {type:'binary'});
                    const ws = wb.Sheets[wb.SheetNames[0]];
                    const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
                    if (rows.length < 2) { throw new Error('File appears empty or has no data rows.'); }

                    // Map header names → column indices (case-insensitive)
                    const headers = rows[0].map(h => String(h).toLowerCase().trim());
                    const col = key => headers.findIndex(h => h.includes(key));
                    const iName      = col('name');
                    const iCat       = col('categ');
                    const iSupplier  = col('supplier');
                    const iLocation  = col('location');
                    const iBarcode   = col('barcode') >= 0 ? col('barcode') : col('sku');
                    const iQty       = col('qty') >= 0 ? col('qty') : col('quantity');
                    const iCheckedBy = col('checked');
                    const iNotes     = col('notes');

                    if (iName < 0 || iCat < 0) { throw new Error('Could not find "Name" and "Category" columns. Please use the exported template as a guide.'); }

                    // Build duplicate-check index from existing templates
                    // Duplicate = same name+category (case-insensitive) OR same non-empty barcode
                    const existing = STATE.appSettings?.masterTemplates || {};
                    const existingNames = new Set(
                        Object.values(existing).map(t => (t.name||'').trim().toLowerCase() + '||' + (t.category||'').trim().toLowerCase())
                    );
                    const existingBarcodes = new Set(
                        Object.values(existing).map(t => (t.barcode||'').trim().toLowerCase()).filter(Boolean)
                    );

                    let added = 0, skipped = 0, duplicates = 0;
                    const writes = [];
                    for (let r = 1; r < rows.length; r++) {
                        const row = rows[r];
                        const name     = String(row[iName]||'').trim();
                        const category = String(row[iCat]||'').trim();
                        if (!name || !category) { skipped++; continue; }

                        const barcode = iBarcode >= 0 ? String(row[iBarcode]||'').trim() : '';
                        const nameKey = name.toLowerCase() + '||' + category.toLowerCase();

                        // Skip if name+category already exists
                        if (existingNames.has(nameKey)) { duplicates++; continue; }
                        // Skip if barcode already exists (and barcode is not empty)
                        if (barcode && existingBarcodes.has(barcode.toLowerCase())) { duplicates++; continue; }

                        const tpl = {
                            name, category,
                            supplier:  iSupplier  >= 0 ? String(row[iSupplier]||'').trim()  : '',
                            location:  iLocation  >= 0 ? String(row[iLocation]||'').trim()  : '',
                            barcode,
                            quantity:  iQty       >= 0 ? String(row[iQty]||'').trim()       : '',
                            checkedBy: iCheckedBy >= 0 ? String(row[iCheckedBy]||'').trim() : '',
                            notes:     iNotes     >= 0 ? String(row[iNotes]||'').trim()     : '',
                            updatedAt: new Date().toISOString()
                        };
                        writes.push(dbPush(TPL_PATH, tpl).then(res => {
                            if (res?.name) {
                                STATE.appSettings = STATE.appSettings || {};
                                STATE.appSettings.masterTemplates = STATE.appSettings.masterTemplates || {};
                                STATE.appSettings.masterTemplates[res.name] = tpl;
                                // Add to live index so subsequent rows in same file don't duplicate
                                existingNames.add(nameKey);
                                if (barcode) existingBarcodes.add(barcode.toLowerCase());
                            }
                            added++;
                        }));
                    }
                    await Promise.all(writes);
                    renderMasterTplList(STATE.appSettings.masterTemplates || {});
                    if (alertDiv) {
                        const dupMsg = duplicates > 0 ? ` • ${duplicates} duplicate${duplicates!==1?'s':''} skipped` : '';
                        const skipMsg = skipped > 0 ? ` • ${skipped} skipped (missing name/category)` : '';
                        alertDiv.innerHTML = `<div class="alert alert-success show">✅ Imported ${added} new template${added!==1?'s':''}${dupMsg}${skipMsg}.</div>`;
                        setTimeout(()=>{alertDiv.innerHTML='';},5000);
                    }
                } catch(err) {
                    if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-danger show">❌ Import failed: ${err.message||err}</div>`;
                }
            };
            reader.readAsBinaryString(file);
        } catch(e) {
            if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-danger show">❌ ${e.message||e}</div>`;
        }
    }

    // ===================== DEVICE AUTHORIZATION =====================
    function getDeviceId() {
        try {
            let id = localStorage.getItem('beep_device_id');
            if (!id) {
                id = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
                localStorage.setItem('beep_device_id', id);
            }
            return id;
        } catch(e) {
            if (!window._beepDeviceId) window._beepDeviceId = 'dev_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8);
            return window._beepDeviceId;
        }
    }

    function getDeviceInfo() {
        const ua = navigator.userAgent;
        let type = '🖥️';
        let browser = 'Unknown';
        let os = 'Unknown';
        if (/Android/i.test(ua)) { type = '📱'; os = 'Android'; }
        else if (/iPhone|iPad/i.test(ua)) { type = '📱'; os = 'iOS'; }
        else if (/Windows/i.test(ua)) { type = '💻'; os = 'Windows'; }
        else if (/Mac/i.test(ua)) { type = '💻'; os = 'macOS'; }
        else if (/Linux/i.test(ua)) { type = '🖥️'; os = 'Linux'; }
        if (/Chrome/i.test(ua) && !/Chromium|Edge/i.test(ua)) browser = 'Chrome';
        else if (/Firefox/i.test(ua)) browser = 'Firefox';
        else if (/Safari/i.test(ua) && !/Chrome/i.test(ua)) browser = 'Safari';
        else if (/Edge/i.test(ua)) browser = 'Edge';
        else if (/Samsung/i.test(ua)) browser = 'Samsung Browser';
        const screen = `${window.screen.width}×${window.screen.height}`;
        return { type, browser, os, screen, userAgent: ua.slice(0,120) };
    }

    async function registerDevice() {
        const uid = STATE.user.localId || STATE.user.uid;
        const devId = getDeviceId();
        STATE.deviceId = devId;
        const info = getDeviceInfo();
        const deviceData = {
            deviceId: devId,
            userId: uid,
            userEmail: STATE.user.email,
            displayName: STATE.userProfile?.displayName || (STATE.user?.email||'').split('@')[0],
            type: info.type,
            browser: info.browser,
            os: info.os,
            screen: info.screen,
            lastSeen: new Date().toISOString(),
            firstSeen: new Date().toISOString(),
            status: 'active'
        };
        try {
            // Check if device already registered
            const existing = await dbGet('devices/' + devId);
            if (existing) {
                // Update lastSeen
                await dbUpdate('devices/' + devId, {
                    lastSeen: new Date().toISOString(),
                    userId: uid,
                    userEmail: STATE.user.email
                });
                // Check if this device is blocked
                if (existing.status === 'blocked') {
                    const adminBlock = STATE.appSettings?.deviceAuth?.enforceBlock !== false;
                    if (adminBlock && !STATE.isAdmin) {
                        logout(true); // forced logout - no confirm dialog
                        return;
                    }
                }
            } else {
                // New device
                const requireApproval = STATE.appSettings?.deviceAuth?.requireApproval && !STATE.isAdmin;
                deviceData.status = requireApproval ? 'pending' : 'active';
                await dbSet('devices/' + devId, deviceData);
                if (requireApproval) {
                    showAlert('warning', '⚠️ This device is pending admin approval. Some features may be restricted.');
                }
            }
        } catch(e) { console.warn('Device registration failed:', e); }
    }

    async function processSMSAlerts(isManual = false) {
        const settings = STATE.appSettings?.sms;
        if (!settings || !settings.recipients || settings.recipients.length === 0) {
            return { success: false, error: 'No recipients configured' };
        }
        
        // Collect items that need alerts
        const warning = settings.warningEnabled ? STATE.items.filter(i => getStatus(i.expiryDate) === 'warning') : [];
        const critical = settings.criticalEnabled ? STATE.items.filter(i => getStatus(i.expiryDate) === 'critical') : [];
        const expired = settings.expiredEnabled ? STATE.items.filter(i => getDaysLeft(i.expiryDate) < 0) : [];
        
        if (warning.length === 0 && critical.length === 0 && expired.length === 0) {
            return { success: true, sent: 0, message: 'No items require alerts' };
        }
        
        // Build message
        const message = buildSMSMessage(critical, warning, expired);
        
        // Send to all recipients
        let sent = 0;
        let failed = 0;
        for (const recipient of settings.recipients) {
            const result = await sendSMS(recipient, message, settings);
            if (result.success) sent++;
            else failed++;
        }
        
        // Update last sent timestamp
        if (sent > 0) {
            await dbUpdate('appSettings/sms', { lastSent: new Date().toISOString() });
        }
        
        return { success: sent > 0, sent, failed };
    }

    function buildSMSMessage(critical, warning, expired) {
        const lines = [];
        lines.push('🔔 BEEP Expiry Alert');
        lines.push(`📅 ${new Date().toLocaleDateString()}`);
        lines.push('─'.repeat(28));
        
        if (expired.length > 0) {
            lines.push(`⚫ ${expired.length} EXPIRED item${expired.length!==1?'s':''}`);
            expired.slice(0, 3).forEach(item => {
                lines.push(`  • ${item.name} (${Math.abs(getDaysLeft(item.expiryDate))}d ago)`);
            });
            if (expired.length > 3) lines.push(`  ...and ${expired.length - 3} more`);
        }
        
        if (critical.length > 0) {
            lines.push(`🔴 ${critical.length} CRITICAL (≤7 days)`);
            critical.slice(0, 3).forEach(item => {
                lines.push(`  • ${item.name} (${getDaysLeft(item.expiryDate)}d left)`);
            });
            if (critical.length > 3) lines.push(`  ...and ${critical.length - 3} more`);
        }
        
        if (warning.length > 0) {
            lines.push(`🟡 ${warning.length} WARNING (≤30 days)`);
            warning.slice(0, 2).forEach(item => {
                lines.push(`  • ${item.name} (${getDaysLeft(item.expiryDate)}d left)`);
            });
            if (warning.length > 2) lines.push(`  ...and ${warning.length - 2} more`);
        }
        
        lines.push('─'.repeat(28));
        lines.push('Check BEEP for full details');
        
        return lines.join('\n');
    }

    async function sendSMS(to, message, settings) {
        try {
            if (settings.provider === 'africastalking') {
                return await sendViaAfricasTalking(to, message, settings);
            } else if (settings.provider === 'bulksmskenya') {
                return await sendViaBulkSMSKenya(to, message, settings);
            } else if (settings.provider === 'smsleopard') {
                return await sendViaSMSLeopard(to, message, settings);
            } else if (settings.provider === 'twilio') {
                return await sendViaTwilio(to, message, settings);
            } else if (settings.provider === 'messagebird') {
                return await sendViaMessageBird(to, message, settings);
            } else if (settings.provider === 'custom') {
                return { success: false, error: 'Custom API not yet implemented' };
            } else {
                return { success: false, error: 'No SMS provider configured' };
            }
        } catch(e) {
            return { success: false, error: e.message || 'Unknown error' };
        }
    }

    /**
     * AfricasTalking SMS (Best for Kenya)
     * Cost: KES 0.80/SMS + FREE KES 100 on signup
     */
    async function sendViaAfricasTalking(to, message, settings) {
        try {
            const url = 'https://api.africastalking.com/version1/messaging';
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'apiKey': settings.apiKey,
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'Accept': 'application/json'
                },
                body: new URLSearchParams({
                    username: settings.username || 'sandbox',
                    to: to,
                    message: message,
                    from: settings.fromNumber || 'AFRICASTKNG'
                })
            });
            
            const data = await res.json();
            
            if (data.SMSMessageData && data.SMSMessageData.Recipients && data.SMSMessageData.Recipients.length > 0) {
                const recipient = data.SMSMessageData.Recipients[0];
                if (recipient.status === 'Success' || recipient.statusCode === 101) {
                    return { success: true, messageId: recipient.messageId };
                } else {
                    return { success: false, error: recipient.status || 'SMS failed' };
                }
            }
            
            return { success: false, error: 'No response from AfricasTalking' };
        } catch(e) {
            return { success: false, error: e.message || 'AfricasTalking API error' };
        }
    }

    async function sendViaTwilio(to, message, settings) {
        try {
            const url = `https://api.twilio.com/2010-04-01/Accounts/${settings.apiKey}/Messages.json`;
            const auth = btoa(`${settings.apiKey}:${settings.apiSecret}`);
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Basic ${auth}`,
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                    From: settings.fromNumber,
                    To: to,
                    Body: message
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                return { success: false, error: err.message || 'Twilio API error' };
            }
            
            return { success: true };
        } catch(e) {
            return { success: false, error: e.message };
        }
    }

    async function sendViaMessageBird(to, message, settings) {
        try {
            const url = 'https://rest.messagebird.com/messages';
            
            const res = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `AccessKey ${settings.apiKey}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    originator: settings.fromNumber,
                    recipients: [to],
                    body: message
                })
            });
            
            if (!res.ok) {
                const err = await res.json();
                return { success: false, error: err.errors?.[0]?.description || 'MessageBird API error' };
            }
            
            return { success: true };
        } catch(e) {
            return { success: false, error: e.message };
        }
    }

    // Check if SMS alerts should be sent (called on app load)
    async function checkSMSAlertsSchedule() {
        if (!STATE.isAdmin) return; // Only admins trigger scheduled alerts
        
        const settings = STATE.appSettings?.sms;
        if (!settings || settings.frequency === 'manual') return;
        
        const now = new Date();
        const lastSent = settings.lastSent ? new Date(settings.lastSent) : null;
        
        // Check if it's time to send
        let shouldSend = false;
        
        if (settings.frequency === 'daily') {
            // Send if never sent, or if last sent was yesterday or earlier
            if (!lastSent || (now.getDate() !== lastSent.getDate() || now.getMonth() !== lastSent.getMonth())) {
                shouldSend = now.getHours() >= 8; // Send at or after 8 AM
            }
        } else if (settings.frequency === 'weekly') {
            // Send on Mondays
            if (now.getDay() === 1) { // Monday
                if (!lastSent || (now - lastSent > 6 * 24 * 60 * 60 * 1000)) {
                    shouldSend = now.getHours() >= 8;
                }
            }
        }
        
        if (shouldSend) {
            await processSMSAlerts(false);
        }
    }

    function promoteUser(uid) {
        const user = STATE.allUsers.find(u => u.id === uid);
        const userName = user?.displayName || user?.email || 'this user';
        
        if (!confirm(`🔐 Promote "${userName}" to Admin?\n\nAdmins can:\n✅ View all inventory\n✅ Manage users & devices\n✅ Access admin panel\n✅ Configure settings\n\nThis action takes effect immediately.`)) return;
        
        dbUpdate('users/' + uid, { 
            role: 'admin',
            promotedAt: new Date().toISOString(),
            promotedBy: STATE.user.email
        }).then(() => { 
            showAlert('success', `✅ ${userName} is now an Admin with full access!`); 
            loadAdminUsers(); 
        }).catch(err => {
            showAlert('danger', `❌ Failed to promote user: ${err.message}`);
        });
    }

    function demoteUser(uid) {
        const user = STATE.allUsers.find(u => u.id === uid);
        const userName = user?.displayName || user?.email || 'this user';
        const currentUid = STATE.user.localId || STATE.user.uid;
        
        // Prevent self-demotion
        if (uid === currentUid) {
            showAlert('warning', '⚠️ You cannot demote yourself! Ask another admin to demote you.');
            return;
        }
        
        if (!confirm(`⬇️ Demote "${userName}" to regular user?\n\nThey will lose:\n❌ Access to admin panel\n❌ Ability to view all inventory\n❌ Device & user management\n\nThis action takes effect immediately.`)) return;
        
        dbUpdate('users/' + uid, { 
            role: 'user',
            demotedAt: new Date().toISOString(),
            demotedBy: STATE.user.email
        }).then(() => { 
            showAlert('success', `✅ ${userName} demoted to regular user.`); 
            loadAdminUsers(); 
        }).catch(err => {
            showAlert('danger', `❌ Failed to demote user: ${err.message}`);
        });
    }

    function deleteUser(uid, email) {
        if (!confirm(`Remove user "${email}" from the database?\n\nNote: This removes their profile record. Their items will remain.`)) return;
        dbDelete('users/' + uid)
            .then(() => { showAlert('success', '✅ User record removed.'); loadAdminUsers(); });
    }

                            <div style="font-size:28px;font-weight:900;color:${color};line-height:1;">${val}</div>
                            <div style="font-size:10px;color:var(--text-tertiary);margin-top:3px;">${sub}</div>
                        </div>`).join('')}
                    </div>
                    <div class="dash-grid">
                        <div class="dash-card">

                        </div>

    // ===================== ADMIN ITEMS MANAGEMENT =====================
    let ADMIN_ALL_ITEMS = [];
    async function loadAdminItems() {
        const container = document.getElementById('adminItemsContainer');
        const statsDiv = document.getElementById('adminItemsStats');
        if (!container) return;
        container.innerHTML = '<div class="loading"><span class="loading-spinner">⏳</span>Loading all items...</div>';
        if (statsDiv) statsDiv.innerHTML = '';
        const t0 = Date.now();
        try {
            const data = await dbGet('items', { orderBy: '"expiryDate"' }).catch(() => dbGet('items'));
            const elapsed = ((Date.now() - t0) / 1000).toFixed(1);
            ADMIN_ALL_ITEMS = (data && !data.error) ? Object.entries(data).map(([id,val]) => {
                const item = {id,...val};
                // pre-compute search index for fast admin search
                item._search = [item.name, item.category, item.location,
                    item.barcode, item.userEmail].map(v=>(v||'').toLowerCase()).join(' ');
                return item;
            }) : [];
            // Data is already sorted by expiryDate from Firebase — no client sort needed
            if (statsDiv) {
                const tot = ADMIN_ALL_ITEMS.length,
                    cr  = ADMIN_ALL_ITEMS.filter(i=>getStatusCached(i.expiryDate)==='critical').length,
                    wa  = ADMIN_ALL_ITEMS.filter(i=>getStatusCached(i.expiryDate)==='warning').length,
                    sa  = ADMIN_ALL_ITEMS.filter(i=>getStatusCached(i.expiryDate)==='safe').length;
                const sizeWarn = tot >= 3000
                    ? `<div style="background:#fee2e2;border-radius:8px;padding:8px 12px;font-size:12px;color:#991b1b;font-weight:600;margin-top:8px;">⚠️ ${tot.toLocaleString()} items — consider archiving expired items in the 🗃️ Data tab to improve load times.</div>`
                    : '';
                statsDiv.innerHTML = [
                    ['📦 Total: '+tot.toLocaleString(),'#e5e7eb','#f3f4f6','#111827'],
                    ['🔴 Critical: '+cr,'#fca5a5','#fee2e2','#991b1b'],
                    ['🟡 Warning: '+wa,'#fde68a','#fef9c3','#92400e'],
                    ['🟢 Safe: '+sa,'#6ee7b7','#dcfce7','#065f46']
                ].map(([txt,border,bg,color])=>`<div style="background:${bg};border-radius:10px;padding:10px 16px;font-size:13px;font-weight:700;color:${color};border:2px solid ${border};">${txt}</div>`).join('') +
                `<div style="font-size:11px;color:var(--text-tertiary);width:100%;padding-top:4px;">⏱ Loaded in ${elapsed}s</div>` + sizeWarn;
            }
            filterAdminItems('');
        } catch(e) {
            container.innerHTML = '<div class="danger-box">❌ Failed to load items: ' + escHtml(e.message||'Unknown error') + '</div>';
        }
    }
    function filterAdminItems(search) {
        const sf = document.getElementById('adminItemsStatusFilter')?.value||'';
        const q = (search||'').toLowerCase().trim();
        let filtered = ADMIN_ALL_ITEMS;
        if (q) filtered = filtered.filter(i => i._search && i._search.includes(q));
        if (sf) filtered = filtered.filter(i => getStatusCached(i.expiryDate)===sf);
        renderAdminItemsTable(filtered);
    }
    function renderAdminItemsTable(items) {
        const container = document.getElementById('adminItemsContainer');
        if (!container) return;
        if (!items.length) { container.innerHTML='<div class="info-box" style="text-align:center;">No items match your filter.</div>'; return; }
        container.innerHTML = '<div style="max-height:480px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;padding-right:2px;">' +
            items.map((item,idx) => {
                const st=getStatus(item.expiryDate), days=getDaysLeft(item.expiryDate);
                const sc=st==='critical'?'#ef4444':st==='warning'?'#f59e0b':'#10b981';
                const sl=st==='critical'?'🔴 Critical':st==='warning'?'🟡 Warning':'🟢 Safe';
                const dl=days===0?'Today!':days<0?Math.abs(days)+'d ago':days+'d left';
                const owner=(item.userEmail||'—'); const os=owner.length>22?owner.substring(0,19)+'...':owner;
                const sn=escHtml(item.name||'').replace(/'/g,"\'").replace(/"/g,'&quot;');
                const photo=item.photoURL?`<img src="${escHtml(item.photoURL)}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid var(--border-color);" onerror="this.style.display='none'">`:'';

                    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
                        <div style="display:flex;gap:8px;flex:1;min-width:0;">${photo}
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:700;font-size:14px;color:var(--text-primary);margin-bottom:3px;">${idx+1}. ${escHtml(item.name||'—')}</div>
                                <div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-bottom:4px;">
                                    <span style="background:${sc}20;color:${sc};padding:1px 8px;border-radius:8px;font-size:11px;font-weight:700;">${sl}</span>
                                    <span style="font-size:12px;color:#6b7280;">${escHtml(item.category||'—')}</span>
                                    ${item.quantity?`<span style="font-size:12px;color:#6b7280;">Qty: ${escHtml(String(item.quantity))}</span>`:''}
                                </div>
                                <div style="font-size:12px;color:var(--text-tertiary);">📅 ${formatDate(item.expiryDate)} &nbsp;<span style="color:${sc};font-weight:600;">(${dl})</span></div>
                                <div style="font-size:11px;color:#9ca3af;margin-top:2px;">👤 ${escHtml(os)}</div>
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;gap:5px;flex-shrink:0;">
                            <button class="btn btn-xs" onclick="adminViewItem('${item.id}')" style="background:#6366f1;color:white;padding:5px 10px;font-size:13px;margin:0;">👁️ View</button>
                            <button class="btn btn-success btn-xs" onclick="adminDuplicateItem('${item.id}')" style="padding:5px 10px;font-size:13px;margin:0;">📋 Copy</button>
                            <button class="btn btn-danger btn-xs" onclick="adminDeleteItem('${item.id}','${sn}')" style="padding:5px 10px;font-size:13px;margin:0;">🗑️ Del</button>
                        </div>
                    </div>
                </div>`;
            }).join('') +
        '</div><div style="font-size:12px;color:#6b7280;margin-top:8px;text-align:right;">Showing ' + items.length + ' of ' + ADMIN_ALL_ITEMS.length + ' total items</div>';
    }
    function adminViewItem(id) {
        const item = ADMIN_ALL_ITEMS.find(i=>i.id===id);
        if (!item) { showAlert('warning','⚠️ Item not found'); return; }
        const st=getStatus(item.expiryDate), days=getDaysLeft(item.expiryDate);
        const sc=st==='critical'?'#ef4444':st==='warning'?'#f59e0b':'#10b981';
        const fields=[['📦 Name',item.name],['🏷️ Category',item.category],['📅 Expiry',formatDate(item.expiryDate)+' ('+(days<0?Math.abs(days)+'d ago':days===0?'Today!':days+'d left')+')'],['🔢 Qty',item.quantity||'—'],['📍 Location',item.location||'—'],['🏷️ Barcode',item.barcode||'—'],['✅ Checked By',item.checkedBy||'—'],['👤 Owner',item.userEmail||'—'],['📝 Notes',item.notes||'—'],['🕒 Created',item.createdAt?formatDate(item.createdAt):'—']];
        const photoHTML = item.photoURL ? `<div style="text-align:center;margin-bottom:14px;"><img src="${escHtml(item.photoURL)}" style="max-width:180px;max-height:180px;border-radius:12px;border:2px solid var(--border-color);object-fit:cover;" onerror="this.style.display='none'"></div>` : '';
        const modal = document.createElement('div'); modal.className='modal show';
        modal.innerHTML = `<div class="modal-content" style="max-width:520px;"><div class="modal-header" style="background:${sc}15;border-bottom:3px solid ${sc};"><h3>👁️ Item Details</h3><button class="modal-close" onclick="this.closest('.modal').remove()">&times;</button></div><div class="modal-body">${photoHTML}<div style="margin-bottom:14px;padding:10px 14px;background:${sc}15;border-radius:8px;border-left:4px solid ${sc};"><span style="font-weight:700;color:${sc};font-size:15px;">${st==='critical'?'🔴 CRITICAL':st==='warning'?'🟡 WARNING':'🟢 SAFE'}</span></div><table style="width:100%;border-collapse:collapse;font-size:14px;">${fields.map(([label,val])=>`<tr style="border-bottom:1px solid var(--border-color);"><td style="padding:8px 6px;font-weight:600;color:#6b7280;width:38%;white-space:nowrap;">${label}</td><td style="padding:8px 6px;color:var(--text-primary);">${escHtml(String(val||''))}</td></tr>`).join('')}</table></div><div class="modal-footer"><button class="btn btn-success btn-sm" style="width:auto;" onclick="this.closest('.modal').remove();adminDuplicateItem('${id}')">📋 Duplicate</button><button class="btn btn-danger btn-sm" style="width:auto;" onclick="this.closest('.modal').remove();adminDeleteItem('${id}','${escHtml(item.name||'').replace(/'/g,"\'")}')">🗑️ Delete</button><button class="btn btn-secondary btn-sm" style="width:auto;" onclick="this.closest('.modal').remove()">Close</button></div></div>`;
        document.body.appendChild(modal);
    }
    async function adminDeleteItem(id, name) {
        if (!confirm('🗑️ Delete "' + name + '"?\n\nThis removes it for ALL users immediately and cannot be undone.')) return;
        const a = document.getElementById('adminItemsAlert');
        try {
            await dbDelete('items/'+id);
            ADMIN_ALL_ITEMS = ADMIN_ALL_ITEMS.filter(i=>i.id!==id);
            if(a){a.innerHTML='<div class="alert alert-success show">✅ "' + escHtml(name) + '" deleted for all users.</div>';setTimeout(()=>{a.innerHTML='';},3500);}
            filterAdminItems(document.getElementById('adminItemsSearch')?.value||'');
            fetchItems();
        } catch(e) { if(a) a.innerHTML='<div class="alert alert-danger show">❌ Delete failed: ' + escHtml(e.message||'') + '</div>'; }
    }
    async function adminDuplicateItem(id) {
        const item = ADMIN_ALL_ITEMS.find(i=>i.id===id);
        if (!item) { showAlert('warning','⚠️ Item not found'); return; }
        const {id:_id, createdAt, checkedAt, checkedBy, ...rest} = item;
        const dup = {...rest, name:(item.name||'Item')+' (Copy)', createdAt:new Date().toISOString(), duplicatedFrom:id, duplicatedBy:STATE.user.email};
        const a = document.getElementById('adminItemsAlert');
        try {
            await dbPush('items', dup);
            if(a){a.innerHTML='<div class="alert alert-success show">📋 "' + escHtml(item.name) + '" duplicated!</div>';setTimeout(()=>{a.innerHTML='';},3500);}
            await loadAdminItems(); fetchItems();
        } catch(e) { if(a) a.innerHTML='<div class="alert alert-danger show">❌ Duplicate failed: ' + escHtml(e.message||'') + '</div>'; }
    }

    // ===================== POS SYSTEM INTEGRATION =====================
    let POS_SYNC_TIMER = null;
    let POS_IMPORT_DATA = [];

    async function loadPOSSettings() {
        try {
            const s = await dbGet('appSettings/pos').catch(() => null);
            if (!s) { updatePOSOverview(null); return; }
            // Populate form fields
            const set = (id, val) => { const el = document.getElementById(id); if (el && val !== undefined) el.value = val; };
            const chk = (id, val) => { const el = document.getElementById(id); if (el) el.checked = !!val; };
            set('posSystemType', s.systemType || '');
            togglePOSFields(s.systemType || '');
            set('posLoyverseToken', s.loyverseToken || '');
            set('posLoyverseStore', s.loyverseStore || '');
            set('posSquareToken', s.squareToken || '');
            set('posSquareLocation', s.squareLocation || '');
            set('posSquareEnv', s.squareEnv || 'production');
            set('posCustomUrl', s.customUrl || '');
            set('posCustomKey', s.customKey || '');
            set('posCustomItems', s.customItems || 'items');
            set('posCustomBarcode', s.customBarcode || 'barcode');
            set('posCustomQtyField', s.customQtyField || 'quantity');
            set('posCustomName', s.customName || 'name');
            set('posColName', s.colName || 'item_name');
            set('posColBarcode', s.colBarcode || 'barcode');
            set('posColQty', s.colQty || 'qty_sold');
            set('posColDate', s.colDate || 'date');
            set('posSyncFreq', s.syncFreq || '60');
            chk('posAutoDeduct', s.autoDeduct !== false);
            chk('posNotifyZero', s.notifyZero !== false);
            chk('posArchiveZero', s.archiveZero);
            updatePOSOverview(s);
            // Start auto-sync timer if configured
            if (s.syncFreq && s.syncFreq !== 'manual') startPOSSyncTimer(parseInt(s.syncFreq));
        } catch(e) { console.warn('POS settings load error:', e); }
    }

    function updatePOSOverview(s) {
        const banner = document.getElementById('posStatusBanner');
        if (!banner) return;
        if (!s || !s.systemType) {
            banner.className = 'warning-box';
            banner.innerHTML = '⚠️ <strong>POS not configured.</strong> Go to Sync Settings to connect your POS system.';
        } else {
            const names = { generic:'Generic CSV/Excel', loyverse:'Loyverse POS', square:'Square POS', custom:'Custom/Local POS' };
            banner.className = 'success-box';
            banner.innerHTML = '✅ <strong>' + (names[s.systemType]||s.systemType) + '</strong> connected. Auto-deduct: ' + (s.autoDeduct!==false?'On':'Off') + ' | Sync: ' + (s.syncFreq==='manual'?'Manual':s.syncFreq+'min');
        }
        // Update KPI boxes
        const setKPI = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
        setKPI('posTotalSynced', s?.totalSynced || '0');
        setKPI('posTotalSales', s?.totalSalesImported || '0');
        setKPI('posLastSync', s?.lastSync ? new Date(s.lastSync).toLocaleTimeString() : 'Never');
        setKPI('posDeducted', s?.totalDeducted || '0');
        loadPOSLog();
    }

    function togglePOSFields(type) {
        const fields = ['posGenericFields','posLoyverseFields','posSquareFields','posCustomFields'];
        fields.forEach(id => { const el = document.getElementById(id); if (el) el.style.display = 'none'; });
        const map = { generic:'posGenericFields', loyverse:'posLoyverseFields', square:'posSquareFields', custom:'posCustomFields' };
        if (map[type]) { const el = document.getElementById(map[type]); if (el) el.style.display = 'block'; }
    }

    async function savePOSSettings() {
        const alertDiv = document.getElementById('posAlert');
        const systemType = document.getElementById('posSystemType')?.value || '';

    function startPOSSyncTimer(intervalMinutes) {

    async function syncPOSNow(auto = false) {
        const s = STATE.appSettings?.pos;
        if (!s || !s.systemType) {
            showAlert('warning', '⚠️ POS not configured. Go to Admin Panel → POS System → Sync Settings.');
            return;
        }
        const alertDiv = document.getElementById('posAlert');
        if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-info show">🔄 Syncing with ' + s.systemType + ' POS...</div>';
        try {
            let result = { synced: 0, deducted: 0, errors: [] };
            if (s.systemType === 'loyverse') result = await syncLoyverse(s);
            else if (s.systemType === 'square') result = await syncSquare(s);
            else if (s.systemType === 'custom') result = await syncCustomPOS(s);
            else { showAlert('info', 'ℹ️ Generic POS uses file import. Use the Import Sales tab.'); if(alertDiv) alertDiv.innerHTML=''; return; }
            const msg = '✅ Sync complete — ' + result.synced + ' items checked, ' + result.deducted + ' quantities deducted.';
            showAlert('success', msg);
            if (alertDiv) { alertDiv.innerHTML = '<div class="alert alert-success show">' + msg + '</div>'; setTimeout(()=>{if(alertDiv)alertDiv.innerHTML='';},4000); }
            addPOSLog('Sync completed' + (auto?' (auto)':''), result.synced + ' items, ' + result.deducted + ' deducted');
            await dbUpdate('appSettings/pos', { lastSync: new Date().toISOString(), totalSynced: (s.totalSynced||0)+result.synced, totalDeducted: (s.totalDeducted||0)+result.deducted });
            updatePOSOverview({...s, lastSync: new Date().toISOString()});
            fetchItems();
        } catch(e) {
            const msg = '❌ Sync failed: ' + (e.message||'Unknown error');
            showAlert('danger', msg);
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">' + msg + '</div>';
            addPOSLog('Sync failed', e.message||'Unknown error');
        }
    }

    async function syncLoyverse(s) {
        if (!s.loyverseToken) throw new Error('Loyverse API token not configured.');
        const since = new Date(Date.now() - 24*60*60*1000).toISOString();
        const url = 'https://api.loyverse.com/v1.0/receipts?created_at_min=' + encodeURIComponent(since) + '&limit=250';
        const res = await fetch(url, { headers: { 'Authorization': 'Bearer ' + s.loyverseToken } });
        if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.errors?.[0]?.details || 'Loyverse API error: ' + res.status); }
        const data = await res.json();
        return await applyPOSSales(data.receipts || [], 'item_id', 'qty', s);
    }

    async function syncSquare(s) {
        if (!s.squareToken) throw new Error('Square Access Token not configured.');
        const base = s.squareEnv === 'sandbox' ? 'https://connect.squareupsandbox.com' : 'https://connect.squareup.com';
        const begin = new Date(Date.now() - 24*60*60*1000).toISOString();
        const body = { begin_time: begin };
        if (s.squareLocation) body.location_ids = [s.squareLocation];
        const res = await fetch(base + '/v2/orders/search', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + s.squareToken, 'Content-Type': 'application/json', 'Square-Version': '2024-01-17' },
            body: JSON.stringify({ query: { filter: { date_time_filter: { created_at: { start_at: begin } } } } })
        });
        if (!res.ok) { const err = await res.json().catch(()=>({})); throw new Error(err.errors?.[0]?.detail || 'Square API error: ' + res.status); }
        const data = await res.json();
        const items = (data.orders||[]).flatMap(o => o.line_items||[]);
        return await applyPOSSales(items, 'catalog_object_id', 'quantity', s);
    }

    async function syncCustomPOS(s) {
        if (!s.customUrl) throw new Error('Custom POS API URL not configured.');
        const headers = { 'Content-Type': 'application/json' };
        if (s.customKey) headers['Authorization'] = 'Bearer ' + s.customKey;
        const res = await fetch(s.customUrl, { headers });
        if (!res.ok) throw new Error('Custom POS API error: ' + res.status);
        const data = await res.json();
        const items = data[s.customItems] || data.items || data.sales || data.data || data;
        return await applyPOSSales(Array.isArray(items)?items:[], s.customBarcode||'barcode', s.customQtyField||'quantity', s);
    }

    async function applyPOSSales(salesItems, barcodeField, qtyField, settings) {
        if (!settings.autoDeduct) return { synced: salesItems.length, deducted: 0, errors: [] };
        const allData = await dbGet('items');
        if (!allData || allData.error) return { synced: 0, deducted: 0, errors: [] };
        const allItems = Object.entries(allData).map(([id,val])=>({id,...val}));
        let deducted = 0;
        const promises = [];
        for (const sale of salesItems) {
            const barcode = String(sale[barcodeField] || sale.barcode || sale.sku || '').trim();
            const qtySold = parseFloat(sale[qtyField] || sale.quantity || sale.qty || 1);
            if (!barcode || !qtySold) continue;
            const match = allItems.find(i => i.barcode && i.barcode.trim() === barcode);
            if (!match) continue;
            const currentQty = parseFloat(match.quantity || 0);
            const newQty = Math.max(0, currentQty - qtySold);
            promises.push(dbUpdate('items/' + match.id, { quantity: newQty, lastPOSDeductAt: new Date().toISOString() }));
            deducted++;
            if (settings.notifyZero && newQty === 0) {
                showAlert('warning', '⚠️ "' + (match.name||barcode) + '" is now OUT OF STOCK after POS deduction.');
            }
            if (settings.archiveZero && newQty === 0) {
                const { id: _id, ...rest } = match;
                promises.push(dbSet('archive/' + match.id, { ...rest, quantity: 0, archived: true, archivedAt: new Date().toISOString(), archivedBy: 'POS Auto-Archive' }));
                promises.push(dbDelete('items/' + match.id));
            }
        }
        await Promise.all(promises);
        return { synced: salesItems.length, deducted, errors: [] };
    }

    function handlePhotoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        if (file.size > 500000) {
            showAlert('warning', '⚠️ Photo too large. Please use an image under 500KB.');
            return;
        }
        const reader = new FileReader();
        reader.onload = e => {
            const dataURL = e.target.result;
            // Update avatar preview
            const avatarEl = document.getElementById('profileAvatarImg');
            if (avatarEl) {
                avatarEl.outerHTML = `<img src="${dataURL}" class="profile-avatar" id="profileAvatarImg" onclick="document.getElementById('photoFileInput').click()" title="Click to change photo">`;
            }
            // Store in state & DB as base64
            STATE.userProfile.photoURL = dataURL;
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { photoURL: dataURL })
                .then(() => showAlert('success', '✅ Photo updated!'))
                .catch(() => showAlert('warning', '⚠️ Photo saved locally only.'));
        };
        reader.readAsDataURL(file);
    }

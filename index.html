        const rowClass    = status === 'critical' ? 'critical-row' : status === 'warning' ? 'warning-row' : '';
        const daysLabel   = days < 0 ? `⚠️ ${Math.abs(days)}d EXPIRED` : days === 0 ? '⚠️ TODAY' : `${days}d`;
        const daysColor   = status === 'critical' ? '#ef4444' : status === 'warning' ? '#f59e0b' : '#10b981';
        const safeId      = escHtml(item.id);
        const safeName    = escHtml(item.name||'');
        return `<tr class="${rowClass}" title="${safeName} | ${escHtml(item.expiryDate||'')} | ${daysLabel}">
            <td style="font-weight:600;color:#374151;text-align:center;">${idx+1}</td>
            <td title="${safeName}"><strong>${safeName||'—'}</strong></td>
            <td title="${escHtml(item.category||'')}"><span class="category-chip">${escHtml(item.category||'—')}</span></td>
            <td title="${escHtml(item.supplier||'')}">${escHtml(item.supplier||'—')}</td>
            <td title="${escHtml(item.location||'')}">${escHtml(item.location||'—')}</td>
            <td><strong>${formatDate(item.expiryDate)}</strong></td>
            <td style="text-align:center;"><span style="font-weight:700;color:${daysColor}">${daysLabel}</span></td>
            <td style="text-align:center;"><span class="badge ${badgeClass}">${status.toUpperCase()}</span></td>
            <td style="text-align:center;">${escHtml(item.quantity||'—')}</td>
            <td title="${escHtml(item.barcode||'')}">${escHtml(item.barcode||'—')}</td>
            <td title="${escHtml(item.notes||'')}">${escHtml(item.notes||'—')}</td>
            <td>
                <input type="text"
                    value="${escHtml(item.checkedBy||'')}"
                    placeholder="Name…"
                    title="Checked By: ${escHtml(item.checkedBy||'not set')} — type and press Enter to save"
                    style="width:100%;padding:2px 5px;border:1px solid #d1d5db;border-radius:4px;font-size:11px;background:#f9fafb;box-sizing:border-box;"
                    onchange="saveCheckedBy('${safeId}',this.value)"
                    onkeydown="if(event.key==='Enter'){this.blur();}"
                    onfocus="this.style.borderColor='#6366f1';this.style.background='#fff';"
                    onblur="this.style.borderColor='#d1d5db';this.style.background='#f9fafb';">
            </td>
            <td>
                <div class="action-buttons">
                    <button class="btn btn-info btn-xs"    data-action="view"   data-id="${safeId}" title="View details">👁️</button>
                    <button class="btn btn-warning btn-xs" data-action="edit"   data-id="${safeId}" title="Edit item">✏️</button>
                    <button class="btn btn-danger btn-xs"  data-action="delete" data-id="${safeId}" data-name="${safeName}" title="Delete item">🗑️</button>
                </div>
            </td>
        </tr>`;
    }

    // ===================== FONT SIZE =====================
    const FS_SCALES = { small: 0.90, medium: 1.00, large: 1.15, xlarge: 1.30 };
    const FS_VALS   = { small: 90,   medium: 100,  large: 115,  xlarge: 130  };

    function applyFontSize(scale) {
        document.documentElement.style.setProperty('--fs-scale', scale);
    }

    function setFontSize(size, btn) {
        const scale = FS_SCALES[size] || 1;
        applyFontSize(scale);
        // Update button states
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        // Sync slider
        const slider = document.getElementById('fsSizeSlider');
        if (slider) slider.value = FS_VALS[size] || 100;
        // Save to state + DB + localStorage
        if (STATE.userProfile) STATE.userProfile.fontSize = size;
        try { localStorage.setItem('beep_font_size', size); } catch(e) {}
        if (STATE.user) {
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { fontSize: size, fontSizeUpdatedAt: new Date().toISOString() }).catch(()=>{});
        }
    }

    function setFontSizeSlider(val) {
        const num = parseInt(val);
        const scale = num / 100;
        applyFontSize(scale);
        // Highlight nearest preset
        document.querySelectorAll('.fs-btn').forEach(b => b.classList.remove('active'));
        let closest = 'medium';
        let minDiff = 999;
        Object.entries(FS_VALS).forEach(([k, v]) => {
            if (Math.abs(v - num) < minDiff) { minDiff = Math.abs(v - num); closest = k; }
        });
        const matchBtn = [...document.querySelectorAll('.fs-btn')].find(b => b.title && b.title.startsWith(closest.charAt(0).toUpperCase() + closest.slice(1)));
        if (matchBtn) matchBtn.classList.add('active');
        // Save custom value
        if (STATE.userProfile) STATE.userProfile.fontSize = 'custom_' + num;
        try { localStorage.setItem('beep_font_size', 'custom_' + num); } catch(e) {}
        if (STATE.user) {
            const uid = STATE.user.localId || STATE.user.uid;
            dbUpdate('users/' + uid, { fontSize: 'custom_' + num }).catch(()=>{});
        }
    }

    function loadFontSize() {
        // Priority: DB profile → localStorage → default
        let size = STATE.userProfile?.fontSize || null;

    }

            item.checkedBy = trimmed;

            item._search = [item.name, item.category, item.location,
                item.checkedBy, item.barcode, item.notes

    // ===================== DARK MODE =====================
    function initDarkMode() {
        // Load saved preference
        const saved = localStorage.getItem('beep_theme');
        const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = saved || (systemDark ? 'dark' : 'light');
        applyTheme(theme);
        
        // Listen for system theme changes
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
            if (!localStorage.getItem('beep_theme')) {
                applyTheme(e.matches ? 'dark' : 'light');
            }
        });
    }
    
    function applyTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('beep_theme', theme);
        
        // Update toggle button if it exists
        const toggle = document.getElementById('darkModeToggle');
        if (toggle) {
            toggle.textContent = theme === 'dark' ? '🌙 Dark Mode' : '☀️ Light Mode';
        }
        
        // Save to user profile
        if (STATE.userProfile) {
            STATE.userProfile.theme = theme;
            if (STATE.user) {
                const uid = STATE.user.localId || STATE.user.uid;
                dbUpdate('users/' + uid, { theme, themeUpdatedAt: new Date().toISOString() }).catch(()=>{});
            }
        }
    }
    
    function toggleDarkMode() {
        const current = document.documentElement.getAttribute('data-theme') || 'light';
        const newTheme = current === 'dark' ? 'light' : 'dark';
        applyTheme(newTheme);
    }

    // ===================== BRANCH MANAGEMENT =====================
    async function loadBranches() {
        try {
            // Serve cached branches instantly (30-min TTL) — branches rarely change
            const cached = cacheGet('branches', 30 * 60 * 1000);
            if (cached && cached.length > 0) {
                STATE.branches = cached;
                // Background-refresh without blocking
                dbGet('branches').then(data => {
                    if (data && !data.error) {
                        STATE.branches = Object.entries(data).map(([id,val])=>({id,...val}));
                        cacheSet('branches', STATE.branches);
                    }
                }).catch(()=>{});
                return;
            }
            const data = await dbGet('branches');
            if(data&&!data.error){STATE.branches=Object.entries(data).map(([id,val])=>({id,...val}));cacheSet('branches',STATE.branches);}else{STATE.branches=[];}
            if(STATE.branches.length===0&&data!==null){await createDefaultBranch();}else if(STATE.branches.length===0){STATE.branches=[{id:'main',name:'Main Branch',code:'MAIN',active:true}];}
        }catch(e){STATE.branches=[{id:'main',name:'Main Branch',code:'MAIN',active:true}];}
    }
    
    async function createDefaultBranch() {
        if(!STATE.isAdmin){STATE.branches=[{id:'main',name:'Main Branch',code:'MAIN',active:true}];return 'main';}
        const d={name:'Main Branch',code:'MAIN',createdAt:new Date().toISOString(),active:true};
        try{const k=await dbPush('branches',d);if(!k||!k.name){STATE.branches=[{id:'main',name:'Main Branch',code:'MAIN',active:true}];return 'main';}STATE.branches=[{id:k.name,...d}];return k.name;}catch(e){STATE.branches=[{id:'main',name:'Main Branch',code:'MAIN',active:true}];}
    }

        const branchData = {
            name: document.getElementById('branchName').value.trim(),

            active: document.getElementById('branchActive').checked,
            createdAt: new Date().toISOString(),
            createdBy: STATE.user.email
        };
        
        try {
            const result = await dbPush('branches', branchData);

    async function deleteBranch(branchId, branchName) {
        if (!confirm(`Delete branch "${branchName}"?\n\n⚠️ WARNING: Items in this branch will remain but will show "Unknown Branch". This cannot be undone.`)) return;
        
        try {
            await dbDelete('branches/' + branchId);
            STATE.branches = STATE.branches.filter(b => b.id !== branchId);
            showAlert('success', `✅ Branch "${branchName}" deleted`);
            
            // If current branch was deleted, switch to first available branch
            if (STATE.currentBranch === branchId) {
                const firstBranch = STATE.branches.find(b => b.active);
                if (firstBranch) {
                    selectBranch(firstBranch.id);
                } else {
                    STATE.currentBranch = null;
                }
            }
            
            showManageBranches();
        } catch(e) {
            showAlert('danger', '❌ Failed to delete branch: ' + e.message);
        }
    }
    
    async function assignItemsToMainBranch() {
        if (!confirm('This will assign all items without a branch to "Main Branch".\n\nContinue?')) return;
        
        try {
            showAlert('info', '⏳ Assigning items to Main Branch...');
            
            // Find Main Branch
            const mainBranch = STATE.branches.find(b => b.name === 'Main Branch' || b.code === 'MAIN');
            if (!mainBranch) {
                showAlert('danger', '❌ Main Branch not found. Please create it first.');
                return;
            }
            
            // Get all items
            const allItems = await dbGet('items');
            if (!allItems) {
                showAlert('info', 'ℹ️ No items found');
                return;
            }
            
            let count = 0;
            const updates = [];
            
            // Find items without branchId
            for (const [itemId, item] of Object.entries(allItems)) {
                if (!item.branchId) {
                    updates.push(
                        dbUpdate(`items/${itemId}`, { 
                            branchId: mainBranch.id,
                            branchAssignedAt: new Date().toISOString(),
                            branchAssignedBy: STATE.user?.email || 'system'
                        })
                    );
                    count++;
                }
            }
            
            if (count === 0) {
                showAlert('info', '✅ All items already assigned to branches');
                return;
            }
            
            // Execute all updates
            await Promise.all(updates);
            
            showAlert('success', `✅ Assigned ${count} item(s) to Main Branch`);
            
            // Reload items
            await fetchItems();
            
        } catch(e) {
            console.error('Migration error:', e);
            showAlert('danger', '❌ Failed to assign items: ' + e.message);
        }
    }

    /**
     * Load users assigned to a branch
     */
    async function loadBranchUsers(branchId) {
        const container = document.getElementById('branchUsersList');
        if (!container) return;
        
        try {
            // Get all users
            const usersData = await dbGet('users');
            if (!usersData) {
                container.innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:32px;margin-bottom:10px;">👥</div>
                        <div>No users registered yet</div>
                    </div>`;
                return;
            }
            
            // Get branch assignments
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUserIds = branchData?.assignedUsers || [];
            
            // Filter to assigned users only
            const allUsers = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email);
            
            const assignedUsers = allUsers.filter(u => assignedUserIds.includes(u.uid));
            
            if (assignedUsers.length === 0) {
                container.innerHTML = `
                    <div style="text-align:center;padding:20px;color:var(--text-secondary);">
                        <div style="font-size:32px;margin-bottom:10px;">👥</div>
                        <div>No users assigned to this branch yet</div>
                        <div style="font-size:12px;margin-top:8px;">Click "Assign User to Branch" below to add users</div>
                    </div>`;
                return;
            }
            
            // Display assigned users
            let html = '<div style="display:grid;gap:10px;">';
            assignedUsers.forEach(user => {
                const isAdmin = user.role === 'admin';
                const roleColor = isAdmin ? '#10b981' : '#6b7280';
                const roleBadge = isAdmin ? '👑 Admin' : '👤 User';
                
                html += `
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:var(--bg-secondary);border-radius:8px;border:2px solid var(--border-color);">
                        <div style="flex:1;">
                            <div style="font-weight:600;color:var(--text-primary);margin-bottom:4px;">
                                ${escHtml(user.email)}
                            </div>
                            <div style="font-size:12px;color:${roleColor};">
                                ${roleBadge}
                            </div>
                        </div>
                        <button class="btn btn-danger btn-sm" style="width:auto;padding:6px 12px;" onclick="unassignUserFromBranch('${branchId}', '${user.uid}', '${escHtml(user.email).replace(/'/g, "\\'")}')">
                            ✖ Remove
                        </button>
                    </div>`;
            });
            html += '</div>';
            
            container.innerHTML = html;
        } catch(e) {
            console.error('Error loading branch users:', e);
            container.innerHTML = `
                <div style="text-align:center;padding:20px;color:#ef4444;">
                    <div style="font-size:32px;margin-bottom:10px;">❌</div>
                    <div>Error loading users</div>
                </div>`;
        }
    }

    /**
     * Load users that can be assigned to branch
     */
    async function loadAvailableUsersForBranch(branchId) {
        const dropdown = document.getElementById('userToAssign');
        if (!dropdown) return;
        
        try {
            const usersData = await dbGet('users');
            if (!usersData) {
                dropdown.innerHTML = '<option value="">No users available</option>';
                return;
            }
            
            // Get currently assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUserIds = branchData?.assignedUsers || [];
            
            // Filter to unassigned users only
            const availableUsers = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email && !assignedUserIds.includes(u.uid))
                .sort((a, b) => (a.email || '').localeCompare(b.email || ''));
            
            if (availableUsers.length === 0) {
                dropdown.innerHTML = '<option value="">All users already assigned</option>';
                return;
            }
            
            let html = '<option value="">Select a user...</option>';
            availableUsers.forEach(user => {
                const label = user.email + (user.role === 'admin' ? ' (Admin)' : '');
                html += `<option value="${user.uid}">${escHtml(label)}</option>`;
            });
            
            dropdown.innerHTML = html;
        } catch(e) {
            console.error('Error loading users:', e);
            dropdown.innerHTML = '<option value="">Error loading users</option>';
        }
    }
    
    /**
     * Assign user to branch
     */
    async function doAssignUserToBranch(event, branchId) {
        event.preventDefault();
        const userId = document.getElementById('userToAssign').value;
        
        if (!userId) {
            showAlert('warning', '⚠️ Please select a user');
            return;
        }
        
        try {
            // Get current assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUsers = branchData?.assignedUsers || [];
            
            // Add user if not already assigned
            if (!assignedUsers.includes(userId)) {
                assignedUsers.push(userId);
                
                await dbUpdate(`branches/${branchId}`, {
                    assignedUsers,
                    updatedAt: new Date().toISOString(),
                    updatedBy: STATE.user.email
                });
                
                showAlert('success', '✅ User assigned to branch successfully!');
                
                // Close assign modal
                const assignModal = document.getElementById('assignUserModal');
                if (assignModal) assignModal.remove();
                
                // Reload users list in settings modal
                loadBranchUsers(branchId);
            } else {
                showAlert('info', 'ℹ️ User is already assigned to this branch');
            }
        } catch(e) {
            showAlert('danger', '❌ Error assigning user: ' + e.message);
        }
    }
    
    /**
     * Unassign user from branch
     */
    async function unassignUserFromBranch(branchId, userId, userEmail) {
        if (!confirm(`Remove ${userEmail} from this branch?\n\nThey will no longer be able to access items in this branch.`)) {
            return;
        }
        
        try {
            // Get current assigned users
            const branchData = await dbGet(`branches/${branchId}`);
            const assignedUsers = branchData?.assignedUsers || [];
            
            // Remove user
            const updatedUsers = assignedUsers.filter(uid => uid !== userId);
            
            await dbUpdate(`branches/${branchId}`, {
                assignedUsers: updatedUsers,
                updatedAt: new Date().toISOString(),
                updatedBy: STATE.user.email
            });
            
            showAlert('success', '✅ User removed from branch');
            
            // Reload users list
            loadBranchUsers(branchId);
        } catch(e) {
            showAlert('danger', '❌ Error removing user: ' + e.message);
        }
    }

    function renderStockOutRows() {

                        onkeydown="soTabKey(event,${idx},1)"
                        placeholder="Item name / description"
                        style="width:100%;padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--input-bg);color:var(--text-primary);font-size:13px;">
                </td>

                        data-so-row="${idx}" data-so-col="2"
                        value="${row.proposedQty}"
                        onchange="updateStockOutRow(${idx},'proposedQty',this.value)"
                        onkeydown="soTabKey(event,${idx},2)"
                        placeholder="0" min="0"
                        style="width:100%;padding:6px 8px;border:1px solid var(--border-color);border-radius:6px;background:var(--input-bg);color:var(--text-primary);font-size:13px;">
                </td>
                <td style="padding:6px 4px;text-align:center;position:sticky;right:0;background:inherit;z-index:1;">
                    <button class="btn btn-danger btn-xs" onclick="deleteStockOutRow(${idx})" title="Delete row">🗑️</button>
                </td>
            </tr>
        `).join('');
    }
    
    function updateStockOutRow(idx, field, value) {
        if (STATE.stockOutRows[idx]) STATE.stockOutRows[idx][field] = value;
    }

    // Enter key: move to next column, then next row; auto-add row on last
    function soTabKey(event, rowIdx, colIdx) {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        const fields = ['itemCode','itemDescription','proposedQty'];
        updateStockOutRow(rowIdx, fields[colIdx], event.target.value);
        const nextCol = colIdx + 1;
        if (nextCol < fields.length) {
            const next = document.querySelector(`[data-so-row="${rowIdx}"][data-so-col="${nextCol}"]`);
            if (next) { next.focus(); next.select && next.select(); }
        } else {
            const nextRow = rowIdx + 1;
            if (nextRow >= STATE.stockOutRows.length) {
                addStockOutRow();
                setTimeout(() => {
                    const next = document.querySelector(`[data-so-row="${nextRow}"][data-so-col="0"]`);
                    if (next) next.focus();
                }, 50);
            } else {
                const next = document.querySelector(`[data-so-row="${nextRow}"][data-so-col="0"]`);
                if (next) { next.focus(); next.select && next.select(); }
            }
        }
    }

    function addStockOutRow() {
        STATE.stockOutRows.push({ itemCode: '', itemDescription: '', proposedQty: '' });

    }
    
    function deleteStockOutRow(idx) {

            STATE.stockOutRows.splice(idx, 1);

    function updateExpiredRow(idx, field, value) {
        if (STATE.expiredRows[idx]) STATE.expiredRows[idx][field] = value;
    }

    function eiTabKey(event, rowIdx, colIdx) {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        const fields = ['code','itemName','expiryDate','qty','supplier','action'];
        updateExpiredRow(rowIdx, fields[colIdx], event.target.value);
        const nextCol = colIdx + 1;
        if (nextCol < fields.length) {
            const next = document.querySelector(`[data-ei-row="${rowIdx}"][data-ei-col="${nextCol}"]`);
            if (next) { next.focus(); next.select && next.select(); }
        } else {
            const nextRow = rowIdx + 1;
            if (nextRow >= STATE.expiredRows.length) {
                addExpiredRow();
                setTimeout(() => {
                    const next = document.querySelector(`[data-ei-row="${nextRow}"][data-ei-col="0"]`);
                    if (next) next.focus();
                }, 50);
            } else {
                const next = document.querySelector(`[data-ei-row="${nextRow}"][data-ei-col="0"]`);
                if (next) { next.focus(); next.select && next.select(); }
            }
        }
    }

    function refreshExpiredTable() {
        const tbody = document.getElementById('expiredTableBody');
        if (!tbody) return;
        const itemFilter  = (document.getElementById('eiFilterItem')?.value||'').trim().toLowerCase();
        const suppFilter  = (document.getElementById('eiFilterSupplier')?.value||'').trim().toLowerCase();
        const countEl     = document.getElementById('eiFilterCount');

        if (!itemFilter && !suppFilter) {
            tbody.innerHTML = renderExpiredRows();
            if (countEl) countEl.textContent = STATE.expiredRows.filter(r=>r.itemName||r.code||r.qty).length + ' item(s)';
            return;
        }
        // Apply filters — keep original indices for handlers
        const filtered = []; const filteredIdx = [];
        STATE.expiredRows.forEach((row, idx) => {
            const nameMatch = !itemFilter  || (row.itemName||'').toLowerCase().includes(itemFilter)  || (row.code||'').toLowerCase().includes(itemFilter);
            const suppMatch = !suppFilter  || (row.supplier||'').toLowerCase().includes(suppFilter);
            if (nameMatch && suppMatch) { filtered.push(row); filteredIdx.push(idx); }
        });
        tbody.innerHTML = renderExpiredRows(filtered, filteredIdx);
        if (countEl) {
            const total = STATE.expiredRows.filter(r=>r.itemName||r.code||r.qty).length;
            countEl.textContent = filtered.length + ' of ' + total + ' shown';
            countEl.style.color = filtered.length < total ? '#dc2626' : '#059669';
        }
    }

    async function handleExpiredImport(input) {
        const file = input.files[0]; input.value = '';
        if (!file) return;
        showAlert('info', '⏳ Importing...');
        await loadXLSX();
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
                // Find header row
                let hdrIdx = rows.findIndex(r => r.some(c => String(c).toLowerCase().includes('item') || String(c).toLowerCase().includes('name')));
                if (hdrIdx < 0) hdrIdx = 0;
                const headers = rows[hdrIdx].map(h => String(h).toLowerCase().trim());
                const ci = k => headers.findIndex(h => h.includes(k));
                const iCode=ci('code'); const iName=ci('item')||ci('name'); const iExpiry=ci('expiry')||ci('exp');
                const iQty=ci('qty')||ci('quantity'); const iSupp=ci('supplier'); const iAct=ci('action');

                const imported = [];
                for (let r = hdrIdx+1; r < rows.length; r++) {
                    const row = rows[r];
                    const itemName = iName>=0 ? String(row[iName]||'').trim() : '';
                    if (!itemName) continue;
                    let expDate = '';
                    if (iExpiry >= 0 && row[iExpiry]) {
                        const d = row[iExpiry];
                        expDate = d instanceof Date ? d.toISOString().split('T')[0] : String(d).trim();
                    }
                    imported.push({
                        code: iCode>=0 ? String(row[iCode]||'').trim() : '',
                        itemName,
                        expiryDate: expDate,
                        qty: iQty>=0 ? String(row[iQty]||'').trim() : '',
                        supplier: iSupp>=0 ? String(row[iSupp]||'').trim() : '',
                        action: iAct>=0 ? String(row[iAct]||'').trim() : ''
                    });
                }
                if (imported.length === 0) { showAlert('warning', '⚠️ No data found in file.'); return; }
                // Append to existing rows (skip if both code+itemName match)
                const existingKeys = new Set(STATE.expiredRows.map(r => (r.code||'').toLowerCase()+'||'+(r.itemName||'').toLowerCase()).filter(k => k !== '||'));
                let added = 0, dupes = 0;
                imported.forEach(r => {
                    const key = r.code.toLowerCase()+'||'+r.itemName.toLowerCase();
                    if (existingKeys.has(key)) { dupes++; return; }
                    STATE.expiredRows.push(r);
                    existingKeys.add(key);
                    added++;
                });
                // Remove trailing empty rows
                STATE.expiredRows = STATE.expiredRows.filter(r => r.code||r.itemName||r.qty||r.supplier||r.action);
                if (STATE.expiredRows.length === 0) STATE.expiredRows.push({ code:'', itemName:'', expiryDate:'', qty:'', supplier:'', action:'' });
                refreshExpiredTable();
                const dupMsg = dupes > 0 ? ` • ${dupes} duplicate${dupes!==1?'s':''} skipped` : '';
                showAlert('success', `✅ Imported ${added} row${added!==1?'s':''}${dupMsg}`);
            } catch(err) { showAlert('danger', '❌ Import failed: ' + (err.message||err)); }
        };
        reader.readAsBinaryString(file);
    }

        let sent = 0;
        for (const cb of selected) {
            const phone = (cb.dataset.phone||'').replace(/[^0-9]/g,'');
            if (!phone) continue;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
            sent++;
            if (sent < selected.length) await new Promise(r => setTimeout(r, 500));
        }
        showAlert('success', `✅ Opened WhatsApp for ${sent} contact${sent!==1?'s':''}`);
        closeModal();
    }

    // ── Save Expired Items Form to Firebase ──
    async function saveExpiredForm() {
        const filledRows = STATE.expiredRows.filter(r => r.code || r.itemName || r.qty);
        if (filledRows.length === 0) { showAlert('warning', '⚠️ Nothing to save — add items first.'); return; }
        const btn = document.getElementById('saveExpiredBtn');
        if (btn) { btn.textContent = '⏳ Saving...'; btn.disabled = true; }
        const uid = STATE.user.localId || STATE.user.uid;
        const payload = {
            date: STATE.expiredDate || new Date().toISOString().split('T')[0],
            preparedBy: STATE.expiredPreparedBy || STATE.userProfile?.displayName || STATE.user?.email || '',
            branch: STATE.currentBranch || '',
            branchName: STATE.branches.find(b=>b.id===STATE.currentBranch)?.name || '',
            rows: filledRows,
            userId: uid,
            userEmail: STATE.user.email || '',
            savedAt: new Date().toISOString(),
            type: 'expiredForm'
        };
        try {
            if (STATE.expiredFormId) {
                await dbUpdate('expiredForms/' + STATE.expiredFormId, payload);
            } else {
                const res = await dbPush('expiredForms', payload);
                if (res?.name) STATE.expiredFormId = res.name;
            }
            if (btn) { btn.textContent = '✅ Saved'; setTimeout(()=>{ if(btn){btn.textContent='💾 Save';btn.disabled=false;} },2000); }
            showAlert('success', '✅ Expired Items Form saved!');
        } catch(e) {
            if (btn) { btn.textContent = '💾 Save'; btn.disabled = false; }
            showAlert('danger', '❌ Save failed: ' + (e.message||e));
        }
    }

    function updateDamagesRow(idx, field, value) {
        if (STATE.damagesRows[idx]) STATE.damagesRows[idx][field] = value;
    }

    function dmTabKey(event, rowIdx, colIdx) {
        if (event.key !== 'Enter') return;
        event.preventDefault();
        const fields = ['code','itemName','expiryDate','qty','supplier','action'];
        updateDamagesRow(rowIdx, fields[colIdx], event.target.value);
        const nextCol = colIdx + 1;
        if (nextCol < fields.length) {
            const next = document.querySelector(`[data-dm-row="${rowIdx}"][data-dm-col="${nextCol}"]`);
            if (next) { next.focus(); next.select && next.select(); }
        } else {
            const nextRow = rowIdx + 1;
            if (nextRow >= STATE.damagesRows.length) {
                addDamagesRow();
                setTimeout(() => {
                    const next = document.querySelector(`[data-dm-row="${nextRow}"][data-dm-col="0"]`);
                    if (next) next.focus();
                }, 50);
            } else {
                const next = document.querySelector(`[data-dm-row="${nextRow}"][data-dm-col="0"]`);
                if (next) { next.focus(); next.select && next.select(); }
            }
        }
    }

    function addDamagesRow() {
        STATE.damagesRows.push({ code:'', itemName:'', expiryDate:'', qty:'', supplier:'', action:'' });
        refreshDamagesTable();

    function deleteDamagesRow(idx) {
        if (confirm('Delete this row?')) {
            STATE.damagesRows.splice(idx, 1);
            if (STATE.damagesRows.length === 0) STATE.damagesRows.push({ code:'', itemName:'', expiryDate:'', qty:'', supplier:'', action:'' });
            refreshDamagesTable();
        }
    }

    function refreshDamagesTable() {
        const tbody = document.getElementById('damagesTableBody');
        if (!tbody) return;
        const itemFilter = (document.getElementById('dmFilterItem')?.value||'').trim().toLowerCase();
        const suppFilter = (document.getElementById('dmFilterSupplier')?.value||'').trim().toLowerCase();
        const countEl   = document.getElementById('dmFilterCount');
        if (!itemFilter && !suppFilter) {
            tbody.innerHTML = renderDamagesRows();
            if (countEl) countEl.textContent = STATE.damagesRows.filter(r=>r.itemName||r.code||r.qty).length + ' item(s)';
            return;
        }
        const filtered = []; const filteredIdx = [];
        STATE.damagesRows.forEach((row, idx) => {
            const nameMatch = !itemFilter || (row.itemName||'').toLowerCase().includes(itemFilter) || (row.code||'').toLowerCase().includes(itemFilter);
            const suppMatch = !suppFilter || (row.supplier||'').toLowerCase().includes(suppFilter);
            if (nameMatch && suppMatch) { filtered.push(row); filteredIdx.push(idx); }
        });
        tbody.innerHTML = renderDamagesRows(filtered, filteredIdx);
        if (countEl) {
            const total = STATE.damagesRows.filter(r=>r.itemName||r.code||r.qty).length;
            countEl.textContent = filtered.length + ' of ' + total + ' shown';
            countEl.style.color = filtered.length < total ? '#b45309' : '#059669';
        }
    }

    function clearDamagesFilters() {
        const item = document.getElementById('dmFilterItem');
        const supp = document.getElementById('dmFilterSupplier');
        if (item) item.value = '';
        if (supp) supp.value = '';

        if (!confirm('Clear all rows? This will remove all entered data.')) return;

    // ── Export Excel ──
    async function exportDamagesExcel() {
        const filledRows = STATE.damagesRows.filter(r => r.code || r.itemName || r.qty);
        if (filledRows.length === 0) { showAlert('warning', '⚠️ No data to export.'); return; }

        await loadXLSX();
        const dmDate = STATE.damagesDate || new Date().toISOString().split('T')[0];
        const prepBy = STATE.damagesPreparedBy || STATE.userProfile?.displayName || STATE.user?.email?.split('@')[0] || 'Unknown';
        const branch = STATE.branches.find(b => b.id === STATE.currentBranch)?.name || 'Unknown';
        const data = [
            ['DAMAGES ITEM FORM'],
            ['Date: ' + dmDate],
            ['Branch: ' + branch],
            ['Prepared By: ' + prepBy],
            [],
            ['#', 'Code', 'Item Name', 'Expiry Date', 'QTY', 'Supplier', 'Action Taken']
        ];
        filledRows.forEach((r, i) => data.push([i+1, r.code, r.itemName, r.expiryDate, r.qty, r.supplier, r.action]));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        ws['!cols'] = [{wch:4},{wch:12},{wch:35},{wch:14},{wch:7},{wch:16},{wch:18}];

    async function handleDamagesImport(input) {
        const file = input.files[0]; input.value = '';
        if (!file) return;
        showAlert('info', '⏳ Importing...');
        await loadXLSX();
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const wb = XLSX.read(e.target.result, {type:'binary', cellDates:true});
                const ws = wb.Sheets[wb.SheetNames[0]];
                const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
                if (!rows.length) { showAlert('warning', '⚠️ File is empty.'); return; }

                // Find header row — any row with item/name/code/expiry keywords
                let hdrIdx = rows.findIndex(r => r.some(c => {
                    const v = String(c).toLowerCase().trim();
                    return v.includes('item') || v.includes('name') || v.includes('code') || v.includes('expiry');
                }));
                if (hdrIdx < 0) hdrIdx = 0;

                const headers = rows[hdrIdx].map(h => String(h).toLowerCase().trim());

                // Multi-keyword smart column finder — matches any keyword variant
                const ci = (...keys) => headers.findIndex(h => keys.some(k => h.includes(k)));

                // ONLY map damage-relevant columns — skip days left, status, barcode, notes etc.
                const iCode   = ci('code','sku','item code','barcode');
                const iName   = ci('item name','itemname','item','name','description','product');
                const iExpiry = ci('expiry','exp date','expiry date','expiration','best before','use by');
                const iQty    = ci('qty','quantity','count','amount','units');
                const iSupp   = ci('supplier','vendor','brand','company');
                const iAct    = ci('action','taken','dispose','remark','note');

                // Debug log so you can see what was mapped in browser console
                console.log('[DamagesImport] headers:', headers);
                console.log('[DamagesImport] mapped cols — code:', iCode, 'name:', iName, 'expiry:', iExpiry, 'qty:', iQty, 'supplier:', iSupp, 'action:', iAct);

                // Date parser — handles dd/mm/yyyy, mm/dd/yyyy, yyyy-mm-dd
                const parseDate = d => {
                    if (!d) return '';
                    if (d instanceof Date) return d.toISOString().split('T')[0];
                    const s = String(d).trim();
                    const parts = s.split(/[\/\-\.]/);
                    if (parts.length === 3) {
                        const [a,b,c] = parts;
                        if (a.length === 4) return `${a}-${b.padStart(2,'0')}-${c.padStart(2,'0')}`;
                        if (Number(a) > 12)  return `${c.length===4?c:'20'+c}-${b.padStart(2,'0')}-${a.padStart(2,'0')}`;
                        return `${c.length===4?c:'20'+c}-${a.padStart(2,'0')}-${b.padStart(2,'0')}`;
                    }
                    return s;
                };

                // Build imported rows — skip any row with no item name
                const imported = [];
                for (let r = hdrIdx+1; r < rows.length; r++) {
                    const row = rows[r];
                    const itemName = iName >= 0 ? String(row[iName]||'').trim() : '';
                    if (!itemName) continue;
                    imported.push({
                        code:       iCode   >= 0 ? String(row[iCode]||'').trim()  : '',
                        itemName,
                        expiryDate: iExpiry >= 0 ? parseDate(row[iExpiry])        : '',
                        qty:        iQty    >= 0 ? String(row[iQty]||'').trim()   : '',
                        supplier:   iSupp   >= 0 ? String(row[iSupp]||'').trim()  : '',
                        action:     iAct    >= 0 ? String(row[iAct]||'').trim()   : ''
                    });
                }

                if (imported.length === 0) {
                    showAlert('warning', '⚠️ No items found. Ensure file has an Item Name column.');
                    return;
                }

                // Duplicate key: code+name if code present, else name+expiryDate
                const dupKey = r => {
                    const code = (r.code||'').toLowerCase().trim();
                    const name = (r.itemName||'').toLowerCase().trim();
                    const exp  = (r.expiryDate||'').trim();
                    return code ? `${code}||${name}` : `${name}||${exp}`;
                };

                // Remove blank placeholder rows before merging
                STATE.damagesRows = STATE.damagesRows.filter(r => r.code || r.itemName);
                const existingKeys = new Set(STATE.damagesRows.map(dupKey));

                let added = 0, dupes = 0;
                imported.forEach(r => {
                    const key = dupKey(r);
                    if (existingKeys.has(key)) { dupes++; return; }
                    STATE.damagesRows.push(r);
                    existingKeys.add(key);
                    added++;
                });

                if (STATE.damagesRows.length === 0)
                    STATE.damagesRows.push({ code:'', itemName:'', expiryDate:'', qty:'', supplier:'', action:'' });

                refreshDamagesTable();
                const dupMsg = dupes > 0 ? ` (${dupes} duplicate${dupes!==1?'s':''} skipped)` : '';
                showAlert('success', `✅ Imported ${added} item${added!==1?'s':''}${dupMsg}`);
            } catch(err) {
                console.error('Import error:', err);
                showAlert('danger', '❌ Import failed: ' + (err.message||err));
            }
        };
        reader.readAsBinaryString(file);
    }

    function shareStockOutToGroup() {
        const message = window._stockOutMessage || '';
        if (!message) { showAlert('danger', '❌ No message to share.'); return; }
        // wa.me with no phone number — WhatsApp opens and lets user pick any chat/group
        const url = `https://wa.me/?text=${encodeURIComponent(message)}`;
        window.open(url, '_blank');
        showAlert('success', '✅ WhatsApp opened — select your group to send.');
    }

    function copyStockOutMessage() {
        const message = window._stockOutMessage || '';
        if (!message) { showAlert('danger', '❌ No message to copy.'); return; }
        if (navigator.clipboard) {
            navigator.clipboard.writeText(message).then(() => {
                showAlert('success', '✅ Message copied! Open WhatsApp and paste into any group.');
            }).catch(() => _fallbackCopy(message));
        } else { _fallbackCopy(message); }
    }

    function _fallbackCopy(text) {
        const ta = document.createElement('textarea');
        ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
        document.body.appendChild(ta); ta.select();
        try { document.execCommand('copy'); showAlert('success', '✅ Message copied! Paste into any WhatsApp group.'); }
        catch(e) { showAlert('warning', '⚠️ Could not copy automatically. Please copy manually.'); }
        document.body.removeChild(ta);
    }

    function toggleStockOutRecipient(idx, card) {
        const check = document.getElementById('stockrc_check_' + idx);
        if (window.stockOutSelectedRecipients.has(idx)) {
            window.stockOutSelectedRecipients.delete(idx);
            card.classList.remove('selected');
            if (check) check.style.display = 'none';
        } else {
            window.stockOutSelectedRecipients.add(idx);
            card.classList.add('selected');
            if (check) check.style.display = 'block';
        }
    }
    
    function sendStockOutWhatsApp() {
        if (window.stockOutSelectedRecipients.size === 0) {
            showAlert('warning', '⚠️ Please select at least one recipient');
            return;
        }
        
        const message = window._stockOutMessage || '';
        if (!message) {
            showAlert('danger', '❌ Message not found. Please try again.');
            return;
        }
        
        const contacts = STATE.contacts.filter(c => c.name || c.phone);
        const selected = Array.from(window.stockOutSelectedRecipients).map(i => contacts[i]);
        
        // Send to each selected contact
        selected.forEach(contact => {
            const phone = contact.phone.replace(/[^0-9+]/g, '');
            const encodedMsg = encodeURIComponent(message);
            const url = `https://api.whatsapp.com/send?phone=${phone}&text=${encodedMsg}`;
            window.open(url, '_blank');
        });
        
        showAlert('success', `✅ Opening WhatsApp for ${selected.length} recipient(s)`);
        closeModal();
    }

    function handleItemPhotoUpload(event) {
        const file = event.target.files[0];

        const reader = new FileReader();
        reader.onload = e => {
            const url = e.target.result;
            const preview = document.getElementById('fPhotoPreview');
            const placeholder = document.getElementById('fPhotoPlaceholder');
            const photoData = document.getElementById('fPhotoData');
            const clearBtn = document.getElementById('fPhotoClearBtn');
            if (preview) { preview.src = url; preview.style.display = 'block'; }
            if (placeholder) placeholder.style.display = 'none';
            if (photoData) photoData.value = url;
            if (clearBtn) clearBtn.style.display = 'inline-block';
        };
        reader.readAsDataURL(file);
    }

    /**

     */
    async function loadUsersForAssignment(currentAssignedTo) {
        const dropdown = document.getElementById('fAssignedTo');
        if (!dropdown || !STATE.isAdmin) return;
        
        try {
            const usersData = await dbGet('users');
            if (!usersData) {
                dropdown.innerHTML = `
                    <option value="all" selected>📢 All Users (Everyone can see)</option>
                    <option value="">🔒 No Assignment (Admin only)</option>`;
                return;
            }
            
            const users = Object.entries(usersData)
                .map(([uid, data]) => ({ uid, ...data }))
                .filter(u => u.email && u.email !== STATE.user.email) // Exclude current admin
                .sort((a, b) => (a.email || '').localeCompare(b.email || ''));
            
            let html = `
                <option value="all" ${currentAssignedTo === 'all' || !currentAssignedTo ? 'selected' : ''}>📢 All Users (Everyone can see)</option>
                <option value="" ${currentAssignedTo === '' ? 'selected' : ''}>🔒 No Assignment (Admin only)</option>`;
            
            if (users.length > 0) {
                html += `<option disabled>──────────────</option>`;
                users.forEach(user => {
                    const isSelected = currentAssignedTo === user.uid;
                    const label = user.email + (user.role === 'admin' ? ' (Admin)' : '');
                    html += `<option value="${user.uid}" ${isSelected ? 'selected' : ''}>👤 ${escHtml(label)}</option>`;
                });
            }
            
            dropdown.innerHTML = html;
        } catch(e) {
            console.error('Error loading users:', e);
            dropdown.innerHTML = `
                <option value="all" selected>📢 All Users (Everyone can see)</option>
                <option value="">🔒 No Assignment (Admin only)</option>`;
        }
    }

    /**
     * Archive an item (move to archive, can be restored)
     */
    async function archiveItem(id, name) {
        try {
            const item = STATE.items.find(i => i.id === id);
            if (!item) {
                showAlert('danger', '❌ Item not found');
                return;
            }
            
            // Add archive metadata
            const archivedItem = {
                ...item,
                archived: true,
                archivedAt: new Date().toISOString(),
                archivedBy: STATE.user.email
            };
            
            // Move to archive collection
            await dbSet('archive/' + id, archivedItem);
            
            // Remove from items
            await dbDelete('items/' + id);
            
            showAlert('success', `📦 "${name}" archived. View in Archive section to restore.`);
            fetchItems();
        } catch(err) {
            showAlert('danger', '❌ Archive failed: ' + (err.message || 'Unknown error'));
        }
    }
    
    /**
     * Permanent delete (cannot be recovered)
     */
    function permanentDeleteItem(id, name) {
        if (!confirm(`⚠️ PERMANENT DELETE\n\nAre you absolutely sure you want to permanently delete "${name}"?\n\nThis CANNOT be undone and the item will be lost forever.`)) {
            return;
        }
        
        dbDelete('items/' + id)
            .then(() => { 
                showAlert('success', '✅ Item permanently deleted.'); 
                fetchItems(); 
            })
            .catch(err => showAlert('danger', '❌ Error: ' + (err.message || 'Delete failed')));
    }

    /**
     * Load archived items from Firebase
     */
    async function loadArchivedItems() {
        try {
            const archiveData = await dbGet('archive');
            const loadingDiv = document.getElementById('archiveLoading');
            const contentDiv = document.getElementById('archiveContent');
            const emptyDiv = document.getElementById('archiveEmpty');
            
            if (loadingDiv) loadingDiv.style.display = 'none';
            
            if (!archiveData || Object.keys(archiveData).length === 0) {
                if (emptyDiv) emptyDiv.style.display = 'block';
                return;
            }
            
            // Convert to array and sort by archived date
            const archivedItems = Object.entries(archiveData)
                .map(([id, item]) => ({ id, ...item }))
                .sort((a, b) => new Date(b.archivedAt) - new Date(a.archivedAt));
            
            // Filter by current branch if not admin
            const filtered = STATE.isAdmin 
                ? archivedItems
                : archivedItems.filter(item => 
                    item.branchId === STATE.currentBranch || !item.branchId
                );
            
            if (filtered.length === 0) {
                if (emptyDiv) emptyDiv.style.display = 'block';
                return;
            }
            
            // Store for filtering
            window.ARCHIVE_ITEMS = filtered;
            
            // Show stats
            const statsDiv = document.getElementById('archiveStats');
            if (statsDiv) {
                statsDiv.innerHTML = `
                    <strong>📊 Archive Statistics:</strong> 
                    ${filtered.length} archived item${filtered.length !== 1 ? 's' : ''} • 
                    Oldest: ${formatDate(filtered[filtered.length - 1].archivedAt)} • 
                    Newest: ${formatDate(filtered[0].archivedAt)}
                `;
            }
            
            // Render table
            renderArchiveTable(filtered);
            
            if (contentDiv) contentDiv.style.display = 'block';
            
        } catch(e) {
            console.error('Error loading archive:', e);
            const loadingDiv = document.getElementById('archiveLoading');
            if (loadingDiv) {

        if (!window.ARCHIVE_ITEMS) return;
        
        const filtered = searchTerm
            ? window.ARCHIVE_ITEMS.filter(item =>
                item.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                item.category.toLowerCase().includes(searchTerm.toLowerCase()) ||
                (item.archivedBy && item.archivedBy.toLowerCase().includes(searchTerm.toLowerCase()))
            )
            : window.ARCHIVE_ITEMS;

    /**
     * Restore item from archive back to inventory
     */
    async function restoreFromArchive(id, name) {
        if (!confirm(`♻️ Restore "${name}" to inventory?`)) return;
        
        try {
            const archived = await dbGet('archive/' + id);
            if (!archived) {
                showAlert('danger', '❌ Archived item not found');
                return;
            }
            
            // Remove archive metadata
            const { archived: isArchived, archivedAt, archivedBy, ...restoredItem } = archived;
            
            // Add restore metadata
            restoredItem.restoredAt = new Date().toISOString();
            restoredItem.restoredBy = STATE.user.email;
            
            // Move back to items
            await dbSet('items/' + id, restoredItem);
            
            // Remove from archive
            await dbDelete('archive/' + id);
            
            showAlert('success', `✅ "${name}" restored to inventory!`);
            
            // Reload archive view
            loadArchivedItems();
            
            // Refresh main inventory
            fetchItems();
            
        } catch(err) {
            showAlert('danger', '❌ Restore failed: ' + (err.message || 'Unknown error'));
        }
    }

    /**
     * Execute auto-archive
     */
    async function executeAutoArchive() {
        const days = parseInt(document.getElementById('archiveDays').value) || 30;
        const cutoffDate = new Date();
        cutoffDate.setDate(cutoffDate.getDate() - days);
        
        const eligible = STATE.items.filter(item => 
            new Date(item.expiryDate) < cutoffDate
        );
        
        if (eligible.length === 0) {
            showAlert('info', 'ℹ️ No items to archive');
            return;
        }
        
        if (!confirm(`Archive ${eligible.length} item${eligible.length !== 1 ? 's' : ''}?\n\nItems expired before ${formatDate(cutoffDate.toISOString())} will be moved to archive.`)) {
            return;
        }
        
        const btn = event.target;
        btn.textContent = '⏳ Archiving...';
        btn.disabled = true;
        
        let archived = 0;
        let failed = 0;
        
        for (const item of eligible) {
            try {
                // Add archive metadata
                const archivedItem = {
                    ...item,
                    archived: true,
                    archivedAt: new Date().toISOString(),
                    archivedBy: STATE.user.email,
                    autoArchived: true,
                    autoArchiveDays: days
                };
                
                // Move to archive
                await dbSet('archive/' + item.id, archivedItem);
                await dbDelete('items/' + item.id);
                archived++;
            } catch(e) {
                console.error('Failed to archive', item.id, e);
                failed++;
            }
        }
        
        closeModal();
        
        if (failed === 0) {
            showAlert('success', `✅ ${archived} item${archived !== 1 ? 's' : ''} archived successfully!`);
        } else {
            showAlert('warning', `⚠️ Archived: ${archived}, Failed: ${failed}`);
        }
        
        fetchItems();
    }

    // Barcode scanner state
    const BARCODE_SCANNER = {
        isScanning: false,
        stream: null,
        videoElement: null,
        canvasElement: null,
        detectInterval: null,
        keyboardBuffer: '',
        keyboardTimer: null,
        lastScanTime: 0,
        scanCooldown: 1000 // 1 second between scans
    };
    
    /**
     * Initialize barcode scanning with keyboard scanner support
     * USB barcode scanners typically act as keyboard input
     */
    function initKeyboardScanner() {
        document.addEventListener('keydown', handleKeyboardScan);
        console.log('✅ Keyboard barcode scanner initialized');
    }
    
    /**
     * Handle keyboard input from USB barcode scanners
     * Most USB scanners send: barcode + Enter key
     */
    function handleKeyboardScan(event) {
        // Only process if in a barcode input field or modal is open
        const isBarcodeField = event.target.id === 'fBarcode';
        const isModalOpen = document.querySelector('.modal.show');
        
        if (!isBarcodeField && !isModalOpen) return;
        
        // Clear timeout on any key press
        if (BARCODE_SCANNER.keyboardTimer) {
            clearTimeout(BARCODE_SCANNER.keyboardTimer);
        }
        
        // Check for Enter key (scanner finished)
        if (event.key === 'Enter' && BARCODE_SCANNER.keyboardBuffer.length > 0) {
            event.preventDefault();
            const barcode = BARCODE_SCANNER.keyboardBuffer;
            BARCODE_SCANNER.keyboardBuffer = '';
            handleBarcodeDetected(barcode, 'keyboard');
            return;
        }
        
        // Add character to buffer (ignore special keys)
        if (event.key.length === 1 && !event.ctrlKey && !event.altKey && !event.metaKey) {
            BARCODE_SCANNER.keyboardBuffer += event.key;
            
            // Auto-clear buffer after 100ms of no input (scanner types fast)
            BARCODE_SCANNER.keyboardTimer = setTimeout(() => {
                BARCODE_SCANNER.keyboardBuffer = '';
            }, 100);
        }
    }
    
    /**
     * Check camera permissions before showing scanner
     */
    async function checkCameraPermissions() {
        // Check if browser supports camera at all
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            return {
                supported: false,
                error: 'Camera API not supported in this browser. Please use Chrome, Safari, or Edge.'
            };
        }
        
        // Check if we're on HTTPS (required for camera on mobile)
        const isSecure = window.location.protocol === 'https:' || 
                        window.location.hostname === 'localhost' || 
                        window.location.hostname === '127.0.0.1';
        
        if (!isSecure) {
            return {
                supported: false,
                error: 'Camera requires HTTPS connection. Please access BEEP via https:// URL (not http://)'
            };
        }
        
        // Try to check permission status (if supported)
        if (navigator.permissions && navigator.permissions.query) {
            try {
                const permissionStatus = await navigator.permissions.query({ name: 'camera' });
                return {
                    supported: true,
                    status: permissionStatus.state, // 'granted', 'denied', or 'prompt'
                    permissionAPI: true
                };
            } catch(e) {
                // Permission API not fully supported, that's okay
                return {
                    supported: true,
                    status: 'unknown',
                    permissionAPI: false
                };
            }
        }
        
        return {
            supported: true,
            status: 'unknown',
            permissionAPI: false
        };
    }
    
    /**
     * Show barcode scanner modal with camera - with permission check
     */
    async function showBarcodeScanner() {
        // First, check camera permissions
        const permissionCheck = await checkCameraPermissions();
        
        if (!permissionCheck.supported) {
            // Camera not supported
            showCameraNotSupportedError(permissionCheck.error);
            return;
        }
        
        // If permission already denied, show help immediately
        if (permissionCheck.status === 'denied') {
            showCameraPermissionDeniedError();
            return;
        }
        
        // If permission already granted, skip prompt and go straight to scanner
        if (permissionCheck.status === 'granted') {
            showScanningModal();
            try {
                await startBarcodeCamera();
            } catch(e) {
                closeModal();
                handleCameraError(e);
            }
            return;
        }
        
        // Otherwise, show permission prompt
        showCameraPermissionPrompt();
    }

    /**
     * Start camera for barcode scanning
     */
    async function startBarcodeCamera() {
        try {
            const video = document.getElementById('barcodeScannerVideo');
            const canvas = document.getElementById('barcodeScannerCanvas');
            
            if (!video || !canvas) return;
            
            // Request camera access (prefer back camera on mobile)
            const stream = await navigator.mediaDevices.getUserMedia({
                video: {
                    facingMode: 'environment', // Back camera on mobile
                    width: { ideal: 1280 },
                    height: { ideal: 720 }
                }
            });
            
            video.srcObject = stream;
            BARCODE_SCANNER.stream = stream;
            BARCODE_SCANNER.videoElement = video;
            BARCODE_SCANNER.canvasElement = canvas;
            BARCODE_SCANNER.isScanning = true;
            
            // Wait for video to be ready
            video.onloadedmetadata = () => {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                
                // Hide loading indicator, show camera view
                const loadingIndicator = document.getElementById('cameraLoadingIndicator');
                const scannerContainer = document.getElementById('barcodeScannerContainer');
                const scanningTips = document.getElementById('scanningTips');
                
                if (loadingIndicator) loadingIndicator.style.display = 'none';
                if (scannerContainer) scannerContainer.style.display = 'block';
                if (scanningTips) scanningTips.style.display = 'block';
                
                // Start detection
                startBarcodeDetection();
                
                // Show success message briefly
                showAlert('success', '✅ Camera ready! Point at barcode to scan');
            };
            
        } catch(e) {
            console.error('Camera error:', e);
            throw e; // Let caller handle the error
        }
    }
    
    /**
     * Start detecting barcodes from video stream
     * Uses native BarcodeDetector API if available, otherwise ZXing library
     */
    async function startBarcodeDetection() {
        const video = BARCODE_SCANNER.videoElement;
        const canvas = BARCODE_SCANNER.canvasElement;
        
        // Try native BarcodeDetector API first (better performance on mobile)
        if ('BarcodeDetector' in window) {
            console.log('✅ Using native BarcodeDetector API');
            startNativeBarcodeDetection(video);
        } else {
            console.log('⚠️ Native BarcodeDetector not available, using ZXing library');
            startZXingBarcodeDetection(video, canvas);
        }
    }
    
    /**
     * Use native BarcodeDetector API (Chrome/Edge on Android)
     */
    async function startNativeBarcodeDetection(video) {
        try {
            const barcodeDetector = new BarcodeDetector({
                formats: [
                    'ean_13', 'ean_8', 'upc_a', 'upc_e',
                    'code_128', 'code_39', 'code_93',
                    'qr_code', 'data_matrix', 'pdf417'
                ]
            });
            
            console.log('✅ Native BarcodeDetector initialized');
            
            let frameCount = 0;
            BARCODE_SCANNER.detectInterval = setInterval(async () => {
                if (!BARCODE_SCANNER.isScanning || !video || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    return;
                }
                
                frameCount++;
                
                try {
                    const barcodes = await barcodeDetector.detect(video);
                    
                    if (barcodes.length > 0) {
                        const barcode = barcodes[0];
                        console.log('✅ Barcode detected (native):', barcode.rawValue);
                        handleBarcodeDetected(barcode.rawValue, 'camera');
                    } else {
                        // Log progress every 5 seconds
                        if (frameCount % 25 === 0) {
                            console.log('Scanning... frame', frameCount, '(no barcode detected yet)');
                        }
                    }
                } catch(e) {
                    console.error('Detection error:', e);
                }
            }, 200); // Scan every 200ms (5 FPS)
            
        } catch(e) {
            console.error('Failed to initialize native detector:', e);
            // Fall back to ZXing
            startZXingBarcodeDetection(video, BARCODE_SCANNER.canvasElement);
        }
    }
    
    /**
     * Use ZXing library for barcode detection (fallback)
     */
    async function startZXingBarcodeDetection(video, canvas) {
        const ctx = canvas.getContext('2d');
        
        // Load ZXing library dynamically
        if (!window.ZXing) {
            try {
                await loadZXingLibrary();
            } catch(e) {
                console.error('Failed to load ZXing:', e);
                showAlert('danger', '❌ Barcode library failed to load. Please check internet connection.');
                return;
            }
        }
        
        try {
            // Initialize ZXing barcode reader with hints
            const codeReader = new ZXing.BrowserMultiFormatReader();
            
            // Add hints for better detection
            const hints = new Map();
            const formats = [
                ZXing.BarcodeFormat.EAN_13,
                ZXing.BarcodeFormat.EAN_8,
                ZXing.BarcodeFormat.UPC_A,
                ZXing.BarcodeFormat.UPC_E,
                ZXing.BarcodeFormat.CODE_128,
                ZXing.BarcodeFormat.CODE_39,
                ZXing.BarcodeFormat.QR_CODE
            ];
            hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, formats);
            hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
            
            console.log('✅ Starting ZXing barcode detection...');
            
            // Detect barcodes continuously
            let frameCount = 0;
            BARCODE_SCANNER.detectInterval = setInterval(async () => {
                if (!BARCODE_SCANNER.isScanning || !video || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    return;
                }
                
                frameCount++;
                
                try {
                    // Draw current video frame to canvas
                    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                    
                    // Try to decode barcode from canvas
                    const result = await codeReader.decodeFromCanvas(canvas);
                    
                    if (result && result.text) {
                        console.log('✅ Barcode detected (ZXing):', result.text);
                        handleBarcodeDetected(result.text, 'camera');
                    }
                } catch(e) {
                    // No barcode found in this frame (expected, keep trying)
                    // Log every 25 frames (5 seconds) for debugging
                    if (frameCount % 25 === 0) {
                        console.log('Scanning... frame', frameCount, '(no barcode yet)');
                    }
                }
            }, 200); // Check every 200ms (5 FPS)
        } catch(e) {
            console.error('Failed to initialize ZXing:', e);
            showAlert('danger', '❌ Barcode scanner initialization failed. Library may not be loaded.');
        }
    }
    
    /**
     * Load ZXing barcode library
     */
    async function loadZXingLibrary() {
        return new Promise((resolve, reject) => {
            if (window.ZXing) {
                console.log('✅ ZXing already loaded');
                resolve();
                return;
            }
            
            console.log('📦 Loading ZXing library...');
            const script = document.createElement('script');
            script.src = 'https://unpkg.com/@zxing/library@latest/umd/index.min.js';
            script.onload = () => {
                console.log('✅ ZXing library loaded successfully');
                // Wait a bit for library to initialize
                setTimeout(resolve, 100);
            };
            script.onerror = () => {
                console.error('❌ Failed to load ZXing library from CDN');
                reject(new Error('Failed to load barcode scanner library. Please check internet connection.'));
            };
            document.head.appendChild(script);
        });
    }
    
    /**
     * Handle barcode detection
     */
    function handleBarcodeDetected(barcode, source) {
        // Cooldown to prevent duplicate scans
        const now = Date.now();
        if (now - BARCODE_SCANNER.lastScanTime < BARCODE_SCANNER.scanCooldown) {
            return;
        }
        BARCODE_SCANNER.lastScanTime = now;

        console.log('📷 Barcode detected:', barcode, 'Source:', source);

        // Stop camera stream and detection
        stopBarcodeScanner();

        // Only close the scanner modal for camera scans — keyboard scanner has no modal to close
        if (source === 'camera') {
            closeModal(); // removes topmost (scanner) modal only — Add Item form stays intact
        }

        playBeep();

        // ── Form scan mode: routes to stockout / expired / damages ──
        if (window._formScanMode) {
            const formType = window._formScanMode;
            window._formScanMode = null;
            setTimeout(() => autoFillFormRow(formType, barcode), source === 'camera' ? 80 : 0);
            return;
        }

        if (window._itemTplScanMode) {
            window._itemTplScanMode = false;
            playBeep();
            setTimeout(() => {
                const templates = STATE.appSettings?.masterTemplates || {};
                const scanned = barcode.trim().toLowerCase();
                const match = Object.entries(templates).find(([,t]) => t.barcode && t.barcode.trim().toLowerCase() === scanned);
                const msgEl = document.getElementById('tplScanMsg');
                const picker = document.getElementById('fTplPicker');
                if (match) {
                    const [id, t] = match;
                    if (picker) { picker.value = id; applyItemTemplate(id); }
                    if (msgEl) { msgEl.style.display='block'; msgEl.style.color='#065f46'; msgEl.textContent=`✅ Template matched: ${t.name}`; setTimeout(()=>{msgEl.style.display='none';},3000); }
                    showAlert('success', `✅ Template auto-filled: ${t.name}`);
                } else {
                    if (msgEl) { msgEl.style.display='block'; msgEl.style.color='#991b1b'; msgEl.textContent=`❌ No template found for barcode: ${barcode}`; setTimeout(()=>{msgEl.style.display='none';},4000); }
                    showAlert('warning', `⚠️ No template matched barcode: ${barcode}`);
                }
            }, 300);
            return;
        }

        // If template scan mode, pipe result into template barcode field
        if (window._tplScanMode) {
            window._tplScanMode = false;
            if (source === 'camera') closeModal();
            playBeep();
            setTimeout(() => {
                const tplInput = document.getElementById('tplFBarcode');
                if (tplInput) {
                    tplInput.value = barcode;
                    tplInput.style.background = '#d1fae5';
                    tplInput.style.border = '3px solid #10b981';
                    setTimeout(() => { tplInput.style.background = ''; tplInput.style.border = ''; }, 1800);
                    showAlert('success', `✅ Barcode scanned: ${barcode}`);
                }
            }, source === 'camera' ? 60 : 0);
            return;
        }

        // If scanToSearch mode is active, pipe result into search box
        if (window._scanToSearchMode) {
            window._scanToSearchMode = false;
            setTimeout(() => {
                const sb = document.getElementById('searchBox');
                if (sb) {
                    sb.value = barcode;
                    sb.focus();
                    doSearch(barcode);
                    sb.style.background = '#d1fae5';
                    sb.style.borderColor = '#10b981';

    /**
     * Play beep sound on successful scan
     */
    function playBeep() {
        try {
            // Create audio context
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            
            oscillator.frequency.value = 800; // 800Hz beep
            oscillator.type = 'sine';
            
            gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
            
            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + 0.1);
        } catch(e) {
            // Silent fail if audio not supported
        }
    }

    /**
     * Play a WhatsApp-style two-tone notification chime.
     * mode: 'alert'  — incoming alert banner appears (ascending ding-dong)
     *       'sent'   — message dispatched to WhatsApp  (short success chime)
     *       'enable' — user turns on WA alerts toggle   (soft positive tone)
     */
    function playWANotifSound(mode) {
        try {
            const ac = new (window.AudioContext || window.webkitAudioContext)();

            function tone(freq, startT, dur, vol, type='sine', fadeStart) {
                const osc  = ac.createOscillator();
                const gain = ac.createGain();
                osc.connect(gain);
                gain.connect(ac.destination);
                osc.type = type;
                osc.frequency.setValueAtTime(freq, startT);
                gain.gain.setValueAtTime(vol, startT);
                gain.gain.exponentialRampToValueAtTime(0.001, startT + dur);
                osc.start(startT);
                osc.stop(startT + dur + 0.02);
            }

            const t = ac.currentTime;

            if (mode === 'alert') {
                // WhatsApp-like ascending ding-dong (two notes: low → high)
                tone(620,  t,        0.18, 0.28, 'sine');   // low note
                tone(980,  t + 0.20, 0.22, 0.32, 'sine');   // high note
                tone(1200, t + 0.42, 0.14, 0.18, 'sine');   // bright tail
            } else if (mode === 'sent') {
                // Short ascending success chime — three quick tones
                tone(700,  t,        0.10, 0.22, 'sine');
                tone(900,  t + 0.11, 0.10, 0.22, 'sine');
                tone(1100, t + 0.22, 0.16, 0.28, 'sine');
            } else if (mode === 'enable') {
                // Soft single positive ping
                tone(880, t, 0.20, 0.20, 'sine');
                tone(1100, t + 0.08, 0.18, 0.15, 'sine');
            }
        } catch(e) { /* silent fail */ }
    }

    let importData = [];

        await loadXLSX();

            try {

                const ws = wb.Sheets[wb.SheetNames[0]];
                const json = XLSX.utils.sheet_to_json(ws, { raw: false });

                    expiryDate: formatImportDate(row.expiryDate || row['Expiry Date'] || row.expiry || ''),

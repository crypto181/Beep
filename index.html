    function changePassword() {
        const pass = document.getElementById('newPass').value;
        const conf = document.getElementById('newPassConfirm')?.value || pass;
        const alertDiv = document.getElementById('profileAlert') || document.getElementById('settingsAlert');
        if (!pass || pass.length < 6) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Password must be at least 6 characters.</div>';
            return;
        }
        if (pass !== conf) {
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-danger show">❌ Passwords do not match.</div>';
            return;
        }
        fbChangePassword(STATE.user.idToken, pass)
            .then(data => {
                STATE.user.idToken = data.idToken;
                STATE.user.refreshToken = data.refreshToken;
                saveSession(STATE.user);
                if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-success show">✅ Password changed successfully!</div>';
                document.getElementById('newPass').value = '';
                if (document.getElementById('newPassConfirm')) document.getElementById('newPassConfirm').value = '';
            })
            .catch(err => {
                let msg = err.message || 'Failed to change password.';
                if (msg.includes('CREDENTIAL_TOO_OLD') || msg.includes('TOKEN_EXPIRED'))
                    msg = 'Session expired. Please sign out and sign back in, then try again.';
                if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-danger show">❌ ${msg}</div>`;
            });
    }

    // ===================== CONTACTS =====================
    async function loadContacts() {
        // Contacts are shared — admin manages them, all users read from contacts/shared
        try {
            const cached = cacheGet('contacts_shared', 10 * 60 * 1000);
            if (cached) { STATE.contacts = cached; }
            if (!IS_ONLINE) {
                STATE.contacts = cached || cacheGetStale('contacts_shared') || [];
                return;
            }
            const data = await dbGet('contacts/shared');
            const contacts = data ? (Array.isArray(data) ? data : Object.values(data)) : [];

            if (contacts.filter(c => c.name || c.phone).length > 0) {
                // contacts/shared has data — use it
                STATE.contacts = contacts;
                cacheSet('contacts_shared', STATE.contacts);
            } else {
                // contacts/shared is empty — check if admin contacts exist at old per-user path
                // and auto-migrate them once to contacts/shared
                try {
                    const allUsers = await dbGet('users');
                    if (allUsers) {
                        const adminEntry = Object.entries(allUsers).find(([uid, u]) =>
                            u.role === 'admin' || ADMIN_EMAILS.includes(u.email)
                        );
                        if (adminEntry) {
                            const [adminUid] = adminEntry;
                            const oldData = await dbGet('contacts/' + adminUid);
                            const oldContacts = oldData ? (Array.isArray(oldData) ? oldData : Object.values(oldData)) : [];
                            if (oldContacts.filter(c => c.name || c.phone).length > 0) {
                                // Migrate old contacts to shared path
                                await dbSet('contacts/shared', oldContacts);
                                STATE.contacts = oldContacts;
                                cacheSet('contacts_shared', oldContacts);
                                console.log('%c✅ Contacts migrated to shared path', 'color:#10b981;font-weight:bold;');
                                return;
                            }
                        }
                    }
                } catch(migErr) { console.warn('Contact migration check failed:', migErr); }
                STATE.contacts = [];
                cacheSet('contacts_shared', []);
            }
        } catch(e) {
            try { STATE.contacts = cacheGetStale('contacts_shared') || []; } catch(_) { STATE.contacts = []; }
        }
    }

    async function saveContacts(contacts) {
        // Writes to shared path — only admin UI calls this
        await dbSet('contacts/shared', contacts);
        STATE.contacts = contacts;
        cacheSet('contacts_shared', contacts);
    }

    /**
     * Send message to selected WhatsApp recipients
     */
    async function sendToSelectedRecipients(message, title) {
        const selected = Array.from(document.querySelectorAll('.recipient-checkbox:checked'));
        
        if (selected.length === 0) {
            document.getElementById('recipientAlert').innerHTML = 
                '<div class="alert alert-warning show">⚠️ Please select at least one recipient</div>';
            return;
        }
        
        const recipients = selected.map(cb => ({
            name: cb.dataset.name,
            phone: cb.dataset.phone
        }));
        
        // Open WhatsApp for each recipient
        let sent = 0;
        for (const recipient of recipients) {
            const whatsappUrl = `https://wa.me/${recipient.phone.replace(/[^0-9]/g, '')}?text=${encodeURIComponent(message)}`;
            window.open(whatsappUrl, '_blank');
            sent++;
            
            // Small delay between opens to avoid blocking
            if (sent < recipients.length) {
                await new Promise(resolve => setTimeout(resolve, 500));
            }
        }
        
        showAlert('success', `✅ Opened WhatsApp for ${sent} recipient${sent > 1 ? 's' : ''}!`);
        playWANotifSound('sent');
        closeModal();
    }

    function shareToGroupWA(message) {

    function copyToClipboardWA(message) {
        if (!message) { showAlert('danger', '❌ No message to copy.'); return; }
        if (navigator.clipboard) {
            navigator.clipboard.writeText(message).then(() => {
                showAlert('success', '✅ Message copied! Open WhatsApp and paste into any group.');
            }).catch(() => _fallbackCopy(message));
        } else { _fallbackCopy(message); }
    }

    // ── renderManageSlots: defined here (not in innerHTML <script>) so Chrome executes it ──
    let _msOffset = 0;
    const MPAGE_CONTACTS = 25;

    function renderManageSlots(offset, search) {
        if (offset === 0) _msOffset = 0;
        const list = document.getElementById('contactSlotsList');
        const more = document.getElementById('manageSlotsMore');
        const cnt  = document.getElementById('manageContactCount');
        if (!list) return;
        const q = (search !== undefined ? search : (document.getElementById('manageContactSearch')?.value || '')).toLowerCase();
        const allSlots = Array.from({length:250}, (_,i) => ({i, c: STATE.contacts[i] || {name:'',phone:'',email:''}}));
        const filled_count = allSlots.filter(({c}) => c.name || c.phone || c.email).length;
        const visible = q
            ? allSlots.filter(({c}) => (c.name + c.phone + (c.email||'')).toLowerCase().includes(q))
            : allSlots.filter(({c,i}) => c.name || c.phone || i < (filled_count + 5));
        const page = visible.slice(_msOffset, _msOffset + MPAGE_CONTACTS);
        const html = page.map(({i,c}) => `
            <div class="contact-slot ${c.name||c.phone?'filled':''}" id="cslot_${i}"
                style="padding:12px;margin-bottom:8px;border:2px solid var(--border-color);border-radius:12px;background:var(--bg-tertiary);">
                <div style="display:flex;align-items:center;gap:10px;">
                    <div class="contact-avatar"
                        style="width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,#10b981,#059669);color:white;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;flex-shrink:0;">
                        ${c.name ? c.name.charAt(0).toUpperCase() : i+1}
                    </div>
                    <div style="flex:1;display:grid;gap:6px;">
                        <input type="text" class="form-control" id="cname_${i}"
                            value="${escHtml(c.name||'')}" placeholder="👤 Name (e.g. John, Manager)"
                            oninput="updateSlotAvatar(${i})"
                            style="font-weight:600;font-size:14px;padding:8px 10px;">
                        <input type="tel" class="form-control" id="cphone_${i}"
                            value="${escHtml(c.phone||'')}" placeholder="📱 +254712345678"
                            style="font-size:13px;padding:8px 10px;">
                        <input type="email" class="form-control" id="cemail_${i}"
                            value="${escHtml(c.email||'')}" placeholder="✉️ email@example.com (optional)"
                            style="font-size:13px;padding:8px 10px;">
                    </div>
                    <button onclick="clearContactSlot(${i})"
                        style="background:#fee2e2;border:2px solid #ef4444;border-radius:8px;cursor:pointer;font-size:15px;color:#ef4444;padding:8px 10px;font-weight:700;">✕</button>
                </div>
            </div>`).join('');
        if (offset === 0) { list.innerHTML = html; } else { list.insertAdjacentHTML('beforeend', html); }
        _msOffset = _msOffset + MPAGE_CONTACTS;
        const filled = STATE.contacts.filter(c => c && (c.name || c.phone || c.email)).length;
        if (cnt) cnt.textContent = filled + ' / 250 filled';
        const rem = visible.length - _msOffset;
        if (more) more.innerHTML = rem > 0
            ? `<button class="btn btn-secondary btn-xs" style="width:auto;" onclick="renderManageSlots(${_msOffset})">⬇️ Load ${Math.min(MPAGE_CONTACTS,rem)} more</button>`
            : '';
    }

    function addNewContact() {
        // Clear any active search
        const searchEl = document.getElementById('manageContactSearch');
        if (searchEl && searchEl.value) {
            searchEl.value = '';
            renderManageSlots(0, '');
        }

        // Find first empty slot
        const firstEmpty = STATE.contacts.findIndex(c => !c || (!c.name && !c.phone));
        const targetIdx  = firstEmpty >= 0 ? firstEmpty
                         : STATE.contacts.length < 250 ? STATE.contacts.length : -1;

        if (targetIdx < 0) {
            showAlert('warning', '⚠️ All 250 contact slots are full. Clear a slot first.');
            return;
        }

        // Render enough pages to reach the target slot
        const neededOffset = Math.floor(targetIdx / MPAGE_CONTACTS) * MPAGE_CONTACTS;
        if (!document.getElementById('cslot_' + targetIdx)) {
            for (let off = 0; off <= neededOffset; off += MPAGE_CONTACTS) {
                renderManageSlots(off);
            }
        }

        // Scroll + flash + focus
        setTimeout(() => {
            const slot      = document.getElementById('cslot_' + targetIdx);
            const nameInput = document.getElementById('cname_' + targetIdx);
            if (slot) {
                slot.scrollIntoView({ behavior: 'smooth', block: 'center' });
                slot.style.transition  = 'border-color .2s, box-shadow .2s';
                slot.style.borderColor = '#10b981';
                slot.style.boxShadow   = '0 0 0 3px rgba(16,185,129,.3)';
                setTimeout(() => { slot.style.borderColor = ''; slot.style.boxShadow = ''; }, 1800);
            }
            if (nameInput) nameInput.focus();
        }, 150);
    }

    function updateSlotAvatar(i) {
        const name  = document.getElementById('cname_'+i)?.value  || '';
        const phone = document.getElementById('cphone_'+i)?.value || '';
        const email = document.getElementById('cemail_'+i)?.value || '';
        const slot  = document.getElementById('cslot_'+i);
        const avatar = slot?.querySelector('.contact-avatar');
        if (avatar) avatar.textContent = name ? name.charAt(0).toUpperCase() : (i+1);
        if (slot) slot.classList.toggle('filled', !!(name || phone || email));
    }

    function clearContactSlot(i) {
        const n = document.getElementById('cname_'+i);  if (n) n.value = '';
        const p = document.getElementById('cphone_'+i); if (p) p.value = '';
        const e = document.getElementById('cemail_'+i); if (e) e.value = '';
        const slot = document.getElementById('cslot_'+i);
        if (slot) {
            slot.classList.remove('filled');
            const av = slot.querySelector('.contact-avatar');
            if (av) av.textContent = i+1;
        }
    }

    async function doSaveContacts() {
        const contacts = [];
        for (let i=0;i<250;i++) {
            const name  = (document.getElementById('cname_'+i)?.value||'').trim();
            const phone = (document.getElementById('cphone_'+i)?.value||'').trim();
            const email = (document.getElementById('cemail_'+i)?.value||'').trim();
            contacts.push({name, phone, email});
        }
        try {
            await saveContacts(contacts);
            document.getElementById('contactsAlert').innerHTML = '<div class="alert alert-success show">✅ Contacts saved!</div>';
            setTimeout(closeModal, 1200);
        } catch(e) {
            document.getElementById('contactsAlert').innerHTML = '<div class="alert alert-danger show">❌ Failed to save. Try again.</div>';
        }
    }

    // ===================== SHARE MODAL =====================
    let shareMode = 'whatsapp';
    let shareTemplate = 'critical';

    function getActiveFilters() {
        const filters = [];
        if (STATE.currentFilter !== 'all') {
            filters.push(`Status: ${STATE.currentFilter.charAt(0).toUpperCase() + STATE.currentFilter.slice(1)}`);
        }
        if (STATE.currentCategory) {
            filters.push(`Category: ${STATE.currentCategory}`);
        }
        if (STATE.currentCheckedBy) {
            filters.push(`Checked By: ${STATE.currentCheckedBy}`);
        }
        if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
            const labels = {today:'Today',this_week:'This Week',next_7:'Next 7 Days',next_14:'Next 14 Days',next_30:'Next 30 Days',this_month:'This Month',next_month:'Next Month'};
            filters.push(`Expiry: ${labels[STATE.currentDatePreset]||STATE.currentDatePreset}`);
        } else if (STATE.currentDateFrom || STATE.currentDateTo) {
            if (STATE.currentDateFrom && STATE.currentDateTo) filters.push(`Expiry: ${STATE.currentDateFrom} to ${STATE.currentDateTo}`);
            else if (STATE.currentDateFrom) filters.push(`Expiry: From ${STATE.currentDateFrom}`);
            else if (STATE.currentDateTo) filters.push(`Expiry: Until ${STATE.currentDateTo}`);
        }
        if (STATE.currentSearch) {
            filters.push(`Search: "${STATE.currentSearch}"`);
        }
        return filters.length > 0 ? filters.join(' | ') : null;
    }

    function buildMessage(template) {
        const wa = STATE.appSettings?.wa || {};
        const today = new Date().toLocaleDateString('en-MY', {day:'2-digit',month:'short',year:'numeric'});
        const sender = wa.businessName || STATE.userProfile?.displayName || STATE.user?.email || 'BEEP User';
        const prefix = wa.msgPrefix ? wa.msgPrefix + '\n' : '';
        const footer = wa.msgFooter || '_Sent via BEEP Expiry Management_';
        
        // Get custom message if provided
        const customText = document.getElementById('customMessageText')?.value.trim() || '';
        
        // Determine which items to include
        let items;
        if (template === 'current') {
            // Share exactly what's visible on screen (respects all filters)
            items = [...STATE.filtered];
        } else {
            // Apply template filter on top of current STATE.filtered
            items = [...STATE.filtered];
            if (template === 'critical') {
                items = items.filter(i => getStatus(i.expiryDate) === 'critical');
            } else if (template === 'expired') {
                items = items.filter(i => getDaysLeft(i.expiryDate) < 0);
            } else if (template === 'warning') {
                items = items.filter(i => ['critical','warning'].includes(getStatus(i.expiryDate)));
            } else if (template === 'safe') {
                items = items.filter(i => getStatus(i.expiryDate) === 'safe');
            }
        }
        
        // Cap at 20 items to keep message short
        const list = items.slice(0,20);
        const hasMore = items.length > 20;
        const statusIcon = s => s==='critical'?'🔴':s==='warning'?'🟡':'🟢';
        
        // Intro line based on template
        let introLine;
        if (template === 'current') {
            introLine = '🎯 Current filtered view:';
        } else if (template === 'critical') {
            introLine = wa.tplCritical || '⚠️ Items requiring *immediate action* (≤7 days):';
        } else if (template === 'expired') {
            introLine = '🔴 *EXPIRED ITEMS* - Action Required:';
        } else if (template === 'warning') {
            introLine = wa.tplWarning || '📋 Items expiring within 30 days:';
        } else if (template === 'safe') {
            introLine = '✅ Safe items (>30 days remaining):';
        } else {
            introLine = '📦 Full inventory report:';
        }
        
        // Build item lines
        const lines = list.map((item,i) => {
            const days = getDaysLeft(item.expiryDate);
            const s = getStatus(item.expiryDate);
            const exp = days<0?`EXPIRED ${Math.abs(days)}d ago`:days===0?`Expires TODAY`:`${days} days left`;
            return `${i+1}. ${statusIcon(s)} *${item.name}*\n   📍 ${item.location||'—'} | ${exp}`;
        }).join('\n');
        
        // Stats (use STATE.items for full inventory, items for filtered count)
        const total = STATE.items.length;
        const critical = STATE.items.filter(i=>getStatus(i.expiryDate)==='critical').length;
        const warning  = STATE.items.filter(i=>getStatus(i.expiryDate)==='warning').length;
        const expired  = STATE.items.filter(i=>getDaysLeft(i.expiryDate)<0).length;
        const shownCount = items.length;
        
        // Active filters banner
        const activeFilters = getActiveFilters();
        const filterBanner = activeFilters ? `📊 *Active Filters:* ${activeFilters}\n${'─'.repeat(32)}\n` : '';
        
        // Custom message section
        const customSection = customText ? `💬 *Message:*\n${customText}\n${'─'.repeat(32)}\n` : '';
        
        return `${prefix}🔔 *BEEP Expiry Report*
📅 ${today} | From: ${sender}
${'─'.repeat(32)}
*Summary:* 🔴 ${expired} Expired | 🔴 ${critical} Critical | 🟡 ${warning} Warning | 📦 ${total} Total
${'─'.repeat(32)}
${customSection}${filterBanner}${introLine}
${lines||'✅ No items match this filter.'}${hasMore?`\n\n...and ${items.length-20} more items`:''}
${'─'.repeat(32)}
*Showing:* ${shownCount} of ${total} total items
${'─'.repeat(32)}
${footer}`;
    }

        refreshSharePreview();
    }

               </div>`;

        const modal = document.createElement('div');

        modal.innerHTML = `
            <div class="modal-content" style="max-width:640px;">

                    <h3 style="color:${titleColor};">${title}</h3>
                    <button class="modal-close" onclick="closeModal()">&times;</button>

                <div class="modal-body">

                    </div>

                    <!-- RECIPIENTS -->
                    <div id="shareRecipients" class="tab-content active">
                        ${getActiveFilters() ? `<div class="info-box" style="margin-bottom:12px;background:#eff6ff;border-left-color:#3b82f6;">
                            📊 <strong>Active Filters:</strong> ${getActiveFilters()}
                            <div style="font-size:11px;margin-top:4px;">Included in message to show data subset.</div>
                        </div>` : ''}
                        ${recipientCards}
                    </div>

                    <!-- MESSAGE -->
                    <div id="shareMessage" class="tab-content">
                        <div style="margin-bottom:12px;">
                            <div style="font-size:13px;font-weight:600;color:var(--text-primary);margin-bottom:8px;">📋 Message Type:</div>
                            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;">
                                <button class="msg-template-btn active" id="tpl_critical" onclick="setTemplate('critical',this)" style="background:#fee2e2;border-color:#ef4444;color:#991b1b;">🔴 Critical<br><small>≤7 days</small></button>
                                <button class="msg-template-btn" id="tpl_expired"  onclick="setTemplate('expired',this)"  style="background:#fef2f2;border-color:#dc2626;color:#7f1d1d;">⚠️ Expired<br><small>Past due</small></button>

    function toggleRecipient(i, el) {
        if (selectedRecipients.has(i)) {
            selectedRecipients.delete(i);
            el.classList.remove('selected');
            const ch = document.getElementById('rc_check_'+i);
            if (ch) ch.style.display = 'none';
        } else {
            selectedRecipients.add(i);
            el.classList.add('selected');
            const ch = document.getElementById('rc_check_'+i);
            if (ch) ch.style.display = '';
        }
    }

    function selectAllRecipients(count) {
        for (let i = 0; i < count; i++) {
            selectedRecipients.add(i);
            const el = document.getElementById('rc_'+i);
            const ch = document.getElementById('rc_check_'+i);
            if (el) el.classList.add('selected');
            if (ch) ch.style.display = '';
        }
    }

    function deselectAllRecipients(count) {
        selectedRecipients.clear();
        for (let i = 0; i < count; i++) {
            const el = document.getElementById('rc_'+i);
            const ch = document.getElementById('rc_check_'+i);
            if (el) el.classList.remove('selected');
            if (ch) ch.style.display = 'none';
        }
    }

    function setTemplate(tpl, btn) {
        shareTemplate = tpl;
        document.querySelectorAll('.msg-template-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        refreshSharePreview();
    }

    function refreshSharePreview() {
        const el = document.getElementById('sharePreview');
        if (el) el.innerHTML = escHtml(buildMessage(shareTemplate));
    }

    function doSendWhatsApp() {
        const contacts = _shareContactList;
        const msg      = buildMessage(shareTemplate);
        const encoded  = encodeURIComponent(msg);
        const alertDiv = document.getElementById('shareAlert');

        if (selectedRecipients.size === 0) {
            window.open(`https://wa.me/?text=${encoded}`, '_blank');
            return;
        }

        let opened = 0;
        selectedRecipients.forEach(i => {
            const c = contacts[i];
            if (!c) return;
            const phone = (c.phone||'').replace(/[^0-9]/g,'');
            if (!phone) return;
            setTimeout(() => window.open(`https://wa.me/${phone}?text=${encoded}`, '_blank'), opened * 600);
            opened++;
        });

        if (opened === 0) {
            window.open(`https://wa.me/?text=${encoded}`, '_blank');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-warning show">⚠️ No valid phone numbers found. Add numbers in Admin → Contacts.</div>';
            return;
        }

    function doSendEmail() {
        const contacts = _shareContactList;
        const msg      = buildMessage(shareTemplate);
        const alertDiv = document.getElementById('shareAlert');
        const today    = new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'short',year:'numeric'});
        const subject  = encodeURIComponent(`BEEP Expiry Report — ${today}`);
        const body     = encodeURIComponent(msg);

        if (selectedRecipients.size === 0) {
            window.open(`mailto:?subject=${subject}&body=${body}`, '_self');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-warning show">⚠️ No recipients selected. Opening email — add addresses manually.</div>';
            return;
        }

        const emails = [];
        selectedRecipients.forEach(i => {
            const c = contacts[i];
            if (!c) return;
            const addr = c.email || ((c.phone||'').includes('@') ? c.phone : '');
            if (addr) emails.push(addr);
        });

        if (emails.length === 0) {
            window.open(`mailto:?subject=${subject}&body=${body}`, '_self');
            if (alertDiv) alertDiv.innerHTML = '<div class="alert alert-warning show">⚠️ No email addresses found. Add emails in Admin → Contacts.</div>';
            return;
        }

        window.open(`mailto:${emails.join(',')}?subject=${subject}&body=${body}`, '_self');
        if (alertDiv) alertDiv.innerHTML = `<div class="alert alert-success show">✉️ Opening email for ${emails.length} recipient${emails.length!==1?'s':''}...</div>`;
        setTimeout(closeModal, 1500);
    }

    // ===================== PUSH NOTIFICATIONS =====================
    let NOTIF_TIMER = null;
    async function requestNotificationPermission() {
        if (!('Notification' in window)) { showAlert('warning', '⚠️ Push notifications not supported in this browser.'); return false; }
        if (Notification.permission === 'granted') return true;
        if (Notification.permission === 'denied') { showAlert('warning', '🔔 Notifications blocked. Enable in browser Settings → Site Settings → Notifications.'); return false; }
        const perm = await Notification.requestPermission();
        return perm === 'granted';
    }
    function sendNotification(title, body, tag) {
        if (Notification.permission !== 'granted') return;
        const n = new Notification(title, { body, tag: tag||'beep', requireInteraction: false });
        n.onclick = () => { window.focus(); n.close(); };
        setTimeout(() => n.close(), 8000);
    }
    function checkAndNotify() {
        if (!STATE.items || !STATE.items.length) return;
        const expiredPast = STATE.items.filter(i => getDaysLeft(i.expiryDate) < 0);
        const expiredToday = STATE.items.filter(i => getDaysLeft(i.expiryDate) === 0);
        const critical = STATE.items.filter(i => getStatus(i.expiryDate) === 'critical');
        const warning  = STATE.items.filter(i => getStatus(i.expiryDate) === 'warning');
        if (expiredPast.length > 0) {
            sendNotification('🔴 BEEP — Expired Items!', expiredPast.length + ' item(s) already expired. Immediate action required.', 'beep-expired');
        } else if (expiredToday.length > 0) {
            sendNotification('⚠️ BEEP — Expiring Today!', expiredToday.map(i=>i.name).slice(0,3).join(', ') + (expiredToday.length>3?' +' + (expiredToday.length-3) + ' more':''), 'beep-today');
        } else if (critical.length > 0) {
            sendNotification('🔴 BEEP — ' + critical.length + ' Critical Item' + (critical.length>1?'s':''), critical.map(i=>i.name).slice(0,3).join(', ') + (critical.length>3?' +' + (critical.length-3) + ' more':''), 'beep-critical');
        }
        // Refresh WA alert banner alongside push notifications
        updateWAAlertBanner(critical.length, expiredPast.length + expiredToday.length, warning.length);
    }
    function startNotificationSchedule() {
        if (NOTIF_TIMER) clearInterval(NOTIF_TIMER);
        const interval = parseInt(localStorage.getItem('beep_notif_interval') || '300000');
        NOTIF_TIMER = setInterval(checkAndNotify, interval);
    }
    function stopNotificationSchedule() {
        if (NOTIF_TIMER) { clearInterval(NOTIF_TIMER); NOTIF_TIMER = null; }
    }

    // ===================== SCHEDULED WHATSAPP ALERTS (8:00 AM & 6:00 PM) =====================
    let _waScheduleTimer = null;
    let _waLastAlertDate = { am: null, pm: null };

    function startWASchedule() {
        if (_waScheduleTimer) clearInterval(_waScheduleTimer);
        _waScheduleTimer = setInterval(_checkWASchedule, 30000); // check every 30s
        _checkWASchedule(); // also check immediately on start
    }
    function stopWASchedule() {
        if (_waScheduleTimer) { clearInterval(_waScheduleTimer); _waScheduleTimer = null; }
    }
    function _checkWASchedule() {
        const waEnabled = localStorage.getItem('beep_wa_schedule') === 'true';
        if (!waEnabled) return;
        const now = new Date();
        const h = now.getHours(), m = now.getMinutes();
        const today = now.toDateString();
        // Fire at 8:00–8:01 AM
        if (h === 8 && m === 0 && _waLastAlertDate.am !== today) {
            _waLastAlertDate.am = today;
            _autoSendWAAlert('morning');
        }
        // Fire at 18:00–18:01 (6 PM)
        if (h === 18 && m === 0 && _waLastAlertDate.pm !== today) {
            _waLastAlertDate.pm = today;
            _autoSendWAAlert('evening');
        }
    }
    function _autoSendWAAlert(slot) {
        const wa = STATE.appSettings?.wa || {};
        const waAlertsAllowed = STATE.appSettings?.wa?.alertsEnabled !== false;
        if (!waAlertsAllowed) return;
        const items = STATE.items || [];
        const expired  = items.filter(i => getDaysLeft(i.expiryDate) < 0);
        const critical = items.filter(i => getStatus(i.expiryDate) === 'critical');
        if (!expired.length && !critical.length) return; // nothing to alert
        const label = slot === 'morning' ? '🌅 8:00 AM' : '🌆 6:00 PM';
        let alertLines = [];
        if (expired.length)  alertLines.push(`🔴 *Expired (${expired.length}):*\n`  + expired.slice(0,10).map((i,n)=>`${n+1}. ${i.name||'Unknown'} — expired ${Math.abs(getDaysLeft(i.expiryDate))}d ago`).join('\n'));
        if (critical.length) alertLines.push(`⚠️ *Critical ≤7 days (${critical.length}):*\n` + critical.slice(0,10).map((i,n)=>`${n+1}. ${i.name||'Unknown'} — ${getDaysLeft(i.expiryDate)}d left`).join('\n'));
        const biz = wa.businessName || STATE.userProfile?.displayName || 'Expiry Record';
        const today = new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'short',year:'numeric'});
        const footer = wa.msgFooter || '_Sent via Expiry Record System_';
        const msg = `🔔 *Scheduled Expiry Alert* ${label}\n📅 ${today} | From: ${biz}\n${'─'.repeat(30)}\n${alertLines.join('\n\n')}\n${'─'.repeat(30)}\n${footer}`;
        showWhatsAppRecipientSelection(msg, `📱 Scheduled Alert — ${label}`);
    }

    async function exportPolicyPDF() {
        showAlert('info', '⏳ Generating policy PDF...');

        const { jsPDF } = window.jspdf;
        const doc = new jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });
        let p = STATE.appSettings?.withdrawPolicy;
        if (!p) { try { p = await dbGet('appSettings/withdrawPolicy'); } catch(e) {} }
        p = p || DEFAULT_POLICY;

        const pageW=210, margin=14;
        let y=20;

        // Header with logo
        doc.setFillColor(30,58,138); doc.rect(0,0,pageW,44,'F');
        try { doc.addImage(COMPANY_LOGO_B64,'JPEG',margin,4,24,24); } catch(e){}
        doc.setTextColor(255,255,255);
        doc.setFontSize(14); doc.setFont(undefined,'bold');
        doc.text(p.bizName||'REAL SAVE SUPERMARKET', margin+28, 14);
        doc.setFontSize(10); doc.setFont(undefined,'normal');
        doc.text('Standard Product Expiry Withdrawal Policy', margin+28, 22);
        doc.setFontSize(8);
        const roles = [p.manager&&('Manager: '+p.manager), p.supervisor&&('Supervisor: '+p.supervisor), p.stockController&&('Stock Controller: '+p.stockController)].filter(Boolean);
        if (roles.length) doc.text(roles.join('  |  '), margin+28, 30);
        doc.text('Date: '+new Date().toLocaleDateString('en-KE',{day:'2-digit',month:'long',year:'numeric'}), margin+28, 37);
        y=52;

        const rules = [
            { num:'1', title:'STAFF RESPONSIBILITY', color:[37,99,235], bg:[239,246,255],
              items:[['What to Record', p.staffRecord||DEFAULT_POLICY.staffRecord], ['Submission Deadline', 'Submit to supervisor by the '+(p.staffDeadline||'15th')+' of every month'], ['Accountability', p.staffAccount||DEFAULT_POLICY.staffAccount]] },
            { num:'2', title:'SUPERVISOR RESPONSIBILITY', color:[124,58,237], bg:[245,243,255],
              items:[['Counter-Check Process', p.supervisorProcess||DEFAULT_POLICY.supervisorProcess], ['Sign-off Deadline', 'Must countersign '+(p.supervisorDeadline||'within 2 days')+' of staff submission']] },
            { num:'3', title:'STOCK CONTROLLER RESPONSIBILITY', color:[5,150,105], bg:[236,253,245],
              items:[['Process', p.stockProcess||DEFAULT_POLICY.stockProcess], ['Supplier Notification', 'Notify supplier '+(p.supplierLead||'3 months')+' before expiry']] },
            { num:'4', title:'ACCOUNTABILITY — UNRECORDED PRODUCTS', color:[220,38,38], bg:[254,242,242],
              items:[['Accountability Policy', p.accountNotes||DEFAULT_POLICY.accountNotes], p.incidentProcess&&['Incident Reporting', p.incidentProcess]].filter(Boolean) },
            { num:'5', title:'MONTHLY EXPIRY REVIEW (by 15th each month)', color:[217,119,6], bg:[255,251,235],
              items:[['Monthly Steps', (p.monthlySteps||DEFAULT_POLICY.monthlySteps).replace(/\n/g,' | ')], p.monthlyNotes&&['Note', p.monthlyNotes]].filter(Boolean) },
        ];

        for (const rule of rules) {
            if (y>248){doc.addPage();y=14;}
            doc.setFillColor(...rule.color); doc.roundedRect(margin,y,pageW-margin*2,10,2,2,'F');
            doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont(undefined,'bold');
            doc.text('RULE '+rule.num+': '+rule.title, margin+4, y+7); y+=14;
            doc.setTextColor(40,40,40); doc.setFontSize(8.5);
            for (const [key,val] of rule.items) {
                if(!val) continue;
                const lines = doc.splitTextToSize(String(val), pageW-margin*2-28);
                if(y+lines.length*4.5>270){doc.addPage();y=14;}
                doc.setFont(undefined,'bold'); doc.text(key+':', margin+2, y);
                doc.setFont(undefined,'normal'); doc.text(lines, margin+30, y);
                y+=lines.length*4.5+3;
            }
            y+=5;
        }

        if(p.generalNotes&&y<248){
            doc.setFillColor(99,102,241); doc.roundedRect(margin,y,pageW-margin*2,10,2,2,'F');
            doc.setTextColor(255,255,255); doc.setFontSize(10); doc.setFont(undefined,'bold');
            doc.text('GENERAL RULES & COMPLIANCE', margin+4, y+7); y+=14;
            doc.setTextColor(40,40,40); doc.setFont(undefined,'normal'); doc.setFontSize(8.5);
            const lines=doc.splitTextToSize(p.generalNotes,pageW-margin*2);
            doc.text(lines,margin+2,y); y+=lines.length*4.5+8;
        }

        // Signature block
        if(y<240){
            doc.setFontSize(9); doc.setFont(undefined,'bold'); doc.setTextColor(60,60,60);
            doc.text('STAFF ACKNOWLEDGEMENT', margin, y); y+=8;
            const sigs=[['Staff Name','Staff Signature'],['Supervisor Signature','Date'],['Stock Controller Signature','Branch / Department']];
            for(const [l,r] of sigs){
                doc.setDrawColor(180,180,180);
                doc.line(margin,y+8,margin+80,y+8); doc.line(margin+90,y+8,margin+174,y+8);
                doc.setFontSize(7.5); doc.setFont(undefined,'normal'); doc.setTextColor(120,120,120);
                doc.text(l,margin,y+13); doc.text(r,margin+90,y+13); y+=22;
            }
        }
        doc.setTextColor(160,160,160); doc.setFontSize(7);
        doc.text('Generated by BEEP | '+new Date().toLocaleString(), margin, 290);
        await savePDF(doc, 'BEEP_Withdrawal_Policy_'+new Date().toISOString().split('T')[0]+'.pdf', 'Withdrawal Policy');
    }


    // ===================== BRANCH MISMATCH DIAGNOSTIC & MIGRATION =====================
    // Call fixBranchIds() from the browser console when items are visible to admin
    // (safety-net mode) but should be properly stamped to STATE.currentBranch.
    window.diagnoseBranch = function() {
        console.group('%cBEEP Branch Diagnostic', 'color:#3b82f6;font-weight:bold;font-size:14px;');
        console.log('STATE.currentBranch:', STATE.currentBranch);
        console.log('STATE.branches:', STATE.branches);
        console.log('STATE.isAdmin:', STATE.isAdmin);
        const branchMap = {};
        STATE.items.forEach(i => {
            const k = i.branchId || '(none)';
            branchMap[k] = (branchMap[k] || 0) + 1;
        });
        console.table(branchMap);
        console.groupEnd();
        return branchMap;
    };

    window.fixBranchIds = async function(targetBranchId) {
        if (!STATE.user) { console.error('Not logged in'); return; }
        if (!STATE.isAdmin) { console.error('Admin required'); return; }
        const target = targetBranchId || STATE.currentBranch;
        if (!target) { console.error('No branch selected. Pass a branchId: fixBranchIds("yourBranchId")'); return; }
        console.log('%cBEEP fixBranchIds: migrating all items to branchId="' + target + '" ...', 'color:#f59e0b;font-weight:bold;');
        const allData = await dbGet('items').catch(() => null);
        if (!allData || allData.error) { console.error('Could not fetch items:', allData); return; }
        const entries = Object.entries(allData);
        const toFix = entries.filter(([,val]) => val.branchId !== target);
        if (toFix.length === 0) { console.log('%c✅ All items already have branchId="' + target + '"', 'color:#10b981;font-weight:bold;'); return; }
        console.log('Items to migrate:', toFix.length, '(of', entries.length, 'total)');
        let ok = 0, fail = 0;
        for (const [id] of toFix) {
            try { await dbUpdate('items/' + id, { branchId: target }); ok++; }
            catch(e) { fail++; console.warn('Failed:', id, e); }
        }
        console.log('%c✅ fixBranchIds done. Migrated: ' + ok + '  Failed: ' + fail + '. Refreshing...', 'color:#10b981;font-weight:bold;font-size:14px;');
        await fetchItems();
    };

    // Start notification schedule if enabled
    try {
        if (localStorage.getItem('beep_notif_enabled') === 'true') {
            requestNotificationPermission().then(ok => { if (ok) startNotificationSchedule(); });
        }
        if (localStorage.getItem('beep_wa_schedule') === 'true') {
            startWASchedule();
        }
    } catch(e) {}

    // Detect non-http protocol and show warning
    if (!['http:', 'https:', 'chrome-extension:'].includes(location.protocol)) {
        const w = document.getElementById('protocolWarning');
        if (w) w.style.display = 'block';
        console.log('%c⚠️ Running on protocol: ' + location.protocol + ' — REST API mode active', 'color:#f59e0b;font-weight:bold;');
    }
    console.log('%c✅ BEEP REST Mode — works on any protocol!','color:#10b981;font-weight:bold;');</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2310b981'/><text x='50' y='70' text-anchor='middle' font-size='70' fill='white' font-family='Arial'>🔔</text></svg>">

    <link rel="preconnect" href="https://identitytoolkit.googleapis.com">

    <!-- Export Libraries — loaded lazily (only when needed) -->
    <script>
        // Lazy-load heavy export libs only when first needed
        let _xlsxLoaded=false, _jspdfLoaded=false;
        function loadXLSX() {
            return new Promise(res => {
                if(_xlsxLoaded||window.XLSX){_xlsxLoaded=true;res();return;}
                const s=document.createElement('script');
                s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
                s.onload=()=>{_xlsxLoaded=true;res();}; document.head.appendChild(s);
            });
        }
        function loadJsPDF() {
            return new Promise(res => {
                if(_jspdfLoaded||window.jspdf){_jspdfLoaded=true;res();return;}
                const s=document.createElement('script');
                s.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                s.onload=()=>{
                    const s2=document.createElement('script');
                    s2.src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js';
                    s2.onload=()=>{_jspdfLoaded=true;res();}; document.head.appendChild(s2);
                }; document.head.appendChild(s);
            });
        }
    </script>
    <style>
        :root { 
            --fs-scale: 1; 
            /* Light mode colors (default) */
            --bg-primary: #f3f4f6;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f9fafb;
            --text-primary: #111827;
            --text-secondary: #374151;
            --text-tertiary: #6b7280;
            --border-color: #e5e7eb;
            --shadow: rgba(0,0,0,.1);
            --shadow-lg: rgba(0,0,0,.15);
            --input-bg: #ffffff;
            --card-bg: #ffffff;
        }
        
        [data-theme="dark"] {
            --bg-primary: #111827;
            --bg-secondary: #1f2937;
            --bg-tertiary: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #e5e7eb;
            --text-tertiary: #d1d5db;
            --border-color: #374151;
            --shadow: rgba(0,0,0,.3);
            --shadow-lg: rgba(0,0,0,.5);
            --input-bg: #374151;
            --card-bg: #1f2937;
        }
        
        *{margin:0;padding:0;box-sizing:border-box;transition:background-color .2s ease,color .2s ease,border-color .2s ease;}
        html,body{overscroll-behavior-y:contain;touch-action:pan-y;}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg-primary);color:var(--text-primary);font-size:calc(18px * var(--fs-scale))}

        .dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-bottom:20px;}
        .dash-card{background:var(--card-bg);border-radius:14px;padding:18px;box-shadow:0 2px 8px var(--shadow);border:1px solid var(--border-color);}
        .dash-card h4{font-size:14px;font-weight:700;color:var(--text-secondary);margin-bottom:14px;display:flex;align-items:center;gap:6px;}
        .bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
        .bar-row .lbl{width:90px;flex-shrink:0;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
        .bar-row .bar-bg{flex:1;height:14px;background:var(--bg-tertiary);border-radius:7px;overflow:hidden;}
        .bar-row .bar-fill{height:100%;border-radius:7px;transition:width .6s ease;}
        .bar-row .cnt{width:32px;text-align:right;font-weight:700;color:var(--text-primary);}
        .kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
        .kpi-box{background:var(--bg-tertiary);border-radius:10px;padding:12px;text-align:center;}
        .kpi-box .kv{font-size:22px;font-weight:900;color:var(--text-primary);}
        .kpi-box .kl{font-size:11px;color:var(--text-tertiary);margin-top:2px;}
        @keyframes glow{0%,100%{box-shadow:0 0 10px #10b981}50%{box-shadow:0 0 30px #10b981}}
        @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
        @keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
        @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
        @keyframes slideDown{from{opacity:0;transform:translate(-50%,-100px)}to{opacity:1;transform:translate(-50%,0)}}
        @keyframes slideUp{from{opacity:1;transform:translate(-50%,0)}to{opacity:0;transform:translate(-50%,-100px)}}
        .refreshing{animation:spin 1s linear infinite}
        .pull-to-refresh{position:fixed;top:0;left:0;right:0;height:70px;background:linear-gradient(135deg,#10b981,#059669);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;transform:translateY(-100%);transition:transform .3s ease;z-index:9999}
        .pull-to-refresh.visible{transform:translateY(0)}
        .mega-badge{background:linear-gradient(135deg,#10b981,#059669);color:white;padding:14px 28px;border-radius:22px;font-size:19px;font-weight:900;display:inline-block;animation:pulse 2s infinite;text-transform:uppercase}
        .admin-badge{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;padding:6px 16px;border-radius:10px;font-size:14px;font-weight:800;animation:pulse 2s infinite}
        .auth-wrapper{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%)}
        .auth-box{background:white;border-radius:24px;padding:50px;width:100%;max-width:600px;box-shadow:0 25px 70px rgba(0,0,0,.35)}
        .logo{text-align:center;margin-bottom:35px}
        .logo h1{font-size:44px;color:#2563eb;margin-bottom:12px;font-weight:900}
        .feature-box{background:linear-gradient(135deg,#dbeafe,#bfdbfe);border:4px solid #3b82f6;border-radius:18px;padding:24px;margin:24px 0}
        .feature-box h3{color:#1e40af;margin-bottom:18px;text-align:center;font-size:22px;font-weight:800}
        .feature-item{background:white;padding:16px;margin:10px 0;border-radius:10px;border-left:5px solid #10b981;font-weight:700;font-size:17px}
        .form-group{margin-bottom:24px;position:relative;clear:both;width:100%}
        .form-group label{display:block;margin-bottom:10px;font-weight:700;font-size:18px;width:100%;color:var(--text-primary)}
        .form-control,select{width:100%;padding:16px 18px;border:3px solid #e5e7eb;border-radius:12px;font-size:18px;display:block;margin:0;font-weight:500}
        .form-control:focus,select:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.15)}
        textarea.form-control{resize:vertical;min-height:120px;line-height:1.6}
        .btn{padding:16px 28px;border:none;border-radius:12px;font-size:18px;font-weight:700;cursor:pointer;width:100%;transition:all .2s;display:block;text-align:center;margin:12px 0}
        .btn:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,.2)}
        .btn-primary{background:#2563eb;color:white}
        .btn-primary:hover{background:#1e40af}
        .btn-success{background:#10b981;color:white}
        .btn-success:hover{background:#059669}
        .btn-danger{background:#ef4444;color:white}
        .btn-danger:hover{background:#dc2626}
        .btn-warning{background:#f59e0b;color:white}
        .btn-warning:hover{background:#d97706}
        .btn-info{background:#06b6d4;color:white}
        .btn-info:hover{background:#0891b2}
        .btn-secondary{background:#6b7280;color:white}
        .btn-secondary:hover{background:#4b5563}
        .btn-purple{background:#8b5cf6;color:white}
        .btn-purple:hover{background:#7c3aed}
        .btn-whatsapp{background:#25D366;color:white}
        .btn-whatsapp:hover{background:#128C7E}
        .btn-sm{padding:var(--bsm-p,11px 20px);font-size:var(--bsm-fs,16px);width:auto;font-weight:700}
        .btn-xs{padding:7px 14px;font-size:14px;width:auto;margin:0 3px;font-weight:700}
        .btn:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
        .auth-links{text-align:center;margin-top:24px;font-size:17px}
        .auth-links a{color:#2563eb;text-decoration:none;font-weight:700;cursor:pointer}
        .auth-links a:hover{text-decoration:underline}
        .alert{padding:16px;border-radius:10px;margin-bottom:24px;display:none;border-left:5px solid;animation:fadeIn .3s ease;font-size:17px;font-weight:600}
        .alert.show{display:block}
        .alert-success{background:#d1fae5;color:#065f46;border-left-color:#10b981}
        .alert-danger{background:#fee2e2;color:#991b1b;border-left-color:#ef4444}
        .alert-info{background:#dbeafe;color:#1e40af;border-left-color:#3b82f6}
        .alert-warning{background:#fef3c7;color:#92400e;border-left-color:#f59e0b}
        .header{background:var(--bg-secondary);padding:18px 24px;border-bottom:3px solid var(--border-color);position:sticky;top:0;z-index:100;box-shadow:0 3px 10px var(--shadow)}
        @media(min-width:1200px){.header{padding:8px 20px !important;}}
        .header-content{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px}
        .header-logo{font-size:28px;font-weight:900;color:#2563eb;display:flex;align-items:center;gap:12px}
        .header-user{font-size:16px;color:var(--text-secondary);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-weight:600}
        .container{padding:24px;max-width:1600px;margin:0 auto}
        .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:18px;margin-bottom:30px}
        .stat-card{background:var(--card-bg);padding:26px;border-radius:14px;border-left:5px solid;box-shadow:0 2px 6px var(--shadow);cursor:pointer;transition:transform .2s}
        .stat-card:hover{transform:translateY(-3px);box-shadow:0 6px 18px var(--shadow)}
        .stat-card.critical{border-left-color:#ef4444}
        .stat-card.warning{border-left-color:#f59e0b}
        .stat-card.safe{border-left-color:#10b981}
        .stat-card.all{border-left-color:var(--text-secondary)}
        .stat-card.active{box-shadow:0 0 0 4px #2563eb}
        .stat-value{font-size:var(--sv-fs,42px);font-weight:900;margin:var(--sv-m,10px 0)}
        .stat-label{font-size:var(--sl-fs,16px);color:var(--text-secondary);font-weight:700}
        .actions{background:var(--card-bg);padding:20px;border-radius:14px;margin-bottom:24px;box-shadow:0 2px 6px var(--shadow)}
        .action-row{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
        .action-row:last-child{margin-bottom:0}
        .search-box{flex:1;min-width:240px;padding:14px 18px;border:3px solid var(--border-color);border-radius:12px;font-size:17px;background:var(--input-bg);color:var(--text-primary);font-weight:500}
        .search-box:focus{outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .filter-select{padding:14px 18px;border:3px solid var(--border-color);border-radius:12px;font-size:17px;background:var(--input-bg);color:var(--text-primary);min-width:180px;font-weight:600}
        .filter-select:focus{outline:none;border-color:#2563eb}
        .table-wrapper{background:white;border-radius:14px;box-shadow:0 2px 6px rgba(0,0,0,.12);height:var(--tw-h,700px);overflow-y:scroll;overflow-x:auto;position:relative;display:block;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
        .table-wrapper::-webkit-scrollbar{width:14px}
        .table-wrapper::-webkit-scrollbar-track{background:#f1f1f1;border-radius:12px}
        .table-wrapper::-webkit-scrollbar-thumb{background:#10b981;border-radius:12px}
        .table-wrapper::-webkit-scrollbar-thumb:hover{background:#059669}
        table{width:100%;border-collapse:collapse;background:var(--card-bg);min-width:1200px;display:table}
        thead{position:sticky;top:0;z-index:10;display:table-header-group}
        tbody{display:table-row-group}
        th,td{padding:18px 16px;text-align:left;border-bottom:2px solid var(--border-color)}
        th{background:linear-gradient(135deg,#047857,#065f46);color:white;font-weight:800;font-size:16px;text-transform:uppercase;white-space:nowrap;box-shadow:0 3px 8px rgba(0,0,0,.15);text-shadow:0 1px 2px rgba(0,0,0,.2)}
        td{font-size:17px;background:var(--card-bg);color:var(--text-primary);font-weight:500;line-height:1.6}
        td:first-child{font-weight:800;font-size:18px;color:#111827}
        [data-theme="dark"] td:first-child{color:#f9fafb}
        tr:hover td{background:var(--bg-tertiary)}
        tr.critical-row td{background:#fee2e2 !important;color:#7f1d1d !important;font-weight:700 !important}
        tr.warning-row td{background:#fef3c7 !important;color:#78350f !important;font-weight:700 !important}
        [data-theme="dark"] tr.critical-row td{background:#7f1d1d !important;color:#fecaca !important}
        [data-theme="dark"] tr.warning-row td{background:#78350f !important;color:#fef3c7 !important}
        .badge{padding:7px 14px;border-radius:14px;font-size:14px;font-weight:800}
        .badge-critical{background:#fee2e2;color:#991b1b;border:2px solid #ef4444}
        .badge-warning{background:#fef3c7;color:#92400e;border:2px solid #f59e0b}
        .badge-safe{background:#d1fae5;color:#065f46;border:2px solid #10b981}
        .action-buttons{display:flex;gap:6px;flex-wrap:wrap}
        .modal{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:1000;padding:24px;overflow-y:auto}
        .modal.show{display:flex;align-items:center;justify-content:center}
        .modal-content{background:var(--bg-secondary);border-radius:20px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;animation:fadeIn .3s ease;box-shadow:0 20px 50px rgba(0,0,0,.3)}
        .modal-header{padding:26px;border-bottom:3px solid var(--border-color);display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#f0fdf4,#dcfce7);border-radius:20px 20px 0 0}
        [data-theme="dark"] .modal-header{background:linear-gradient(135deg,#1a3a2e,#2d4a3e)}
        .modal-header h3{color:#065f46;font-size:26px;font-weight:900}
        [data-theme="dark"] .modal-header h3{color:#10b981}
        .modal-close{background:none;border:none;font-size:32px;cursor:pointer;color:var(--text-secondary);line-height:1;font-weight:700}
        .modal-close:hover{color:#ef4444;transform:scale(1.1)}
        .modal-body{padding:26px;font-size:17px}
        .modal-footer{padding:26px;border-top:3px solid var(--border-color);display:flex;gap:14px;justify-content:flex-end;flex-wrap:wrap}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:20px}
        .tabs{display:flex;border-bottom:3px solid var(--border-color);margin-bottom:24px;overflow-x:auto}
        .tab{padding:16px 24px;background:none;border:none;border-bottom:4px solid transparent;font-size:17px;font-weight:700;cursor:pointer;white-space:nowrap;color:var(--text-secondary);transition:all .2s}
        .tab.active{color:#2563eb;border-bottom-color:#2563eb}
        .tab:hover{color:#2563eb}
        .tab-content{display:none}
        .tab-content.active{display:block;animation:fadeIn .3s ease}
        .info-box{background:#dbeafe;border-left:5px solid #2563eb;padding:20px;border-radius:12px;margin-bottom:20px;color:#1e40af;font-size:16px;font-weight:600}
        [data-theme="dark"] .info-box{background:#1e3a5f;color:#93c5fd}
        .warning-box{background:#fef3c7;border-left:5px solid #f59e0b;padding:20px;border-radius:12px;margin-bottom:20px;color:#92400e;font-size:16px;font-weight:600}
        [data-theme="dark"] .warning-box{background:#4c3d1d;color:#fbbf24}
        .success-box{background:#d1fae5;border-left:5px solid #10b981;padding:20px;border-radius:12px;margin-bottom:20px;color:#065f46;font-size:16px;font-weight:600}
        [data-theme="dark"] .success-box{background:#1a3a2e;color:#6ee7b7}
        .danger-box{background:#fee2e2;border-left:5px solid #ef4444;padding:20px;border-radius:12px;margin-bottom:20px;color:#991b1b;font-size:16px;font-weight:600}
        [data-theme="dark"] .danger-box{background:#4c1d1d;color:#fca5a5}
        .instruction-step{background:var(--card-bg);padding:20px;margin:14px 0;border-radius:12px;border-left:5px solid #3b82f6;box-shadow:0 2px 6px var(--shadow);color:var(--text-primary);font-size:16px}
        .instruction-step strong{color:#2563eb;font-size:19px;display:block;margin-bottom:10px;font-weight:800}
        [data-theme="dark"] .instruction-step strong{color:#93c5fd;}
        .instruction-step code{background:var(--bg-tertiary);padding:4px 10px;border-radius:6px;color:var(--text-primary);font-family:monospace;font-size:15px}
        .about-section{background:var(--card-bg);padding:24px;border-radius:14px;margin-bottom:18px;border-left:5px solid #10b981;box-shadow:0 2px 6px var(--shadow);color:var(--text-primary);}
        .about-section h4{color:#059669;margin-bottom:12px;font-size:22px;font-weight:800}
        [data-theme="dark"] .about-section h4{color:#6ee7b7;}
        .about-section p{color:var(--text-primary);line-height:1.7;font-size:17px}
        .password-wrapper{position:relative;display:flex;align-items:center}
        .password-toggle{position:absolute;right:18px;cursor:pointer;font-size:24px;user-select:none;z-index:10}
        .password-toggle:hover{opacity:.7}
        .empty-state{text-align:center;padding:80px 24px;color:#6b7280}
        .empty-state .icon{font-size:80px;margin-bottom:24px}
        .empty-state h3{font-size:24px;margin-bottom:12px;color:var(--text-secondary);font-weight:800}
        .loading{text-align:center;padding:50px;color:var(--text-secondary);font-size:18px}
        .loading-spinner{font-size:50px;display:block;margin-bottom:20px;animation:spin 1s linear infinite}
        .user-list-item{display:flex;align-items:center;justify-content:space-between;padding:16px;background:var(--bg-tertiary);border-radius:12px;margin-bottom:12px;border:2px solid var(--border-color)}
        .user-info{display:flex;flex-direction:column;gap:6px}
        .user-email{font-weight:700;font-size:17px;color:var(--text-primary)}
        .user-meta{font-size:15px;color:var(--text-secondary);font-weight:600}
        .chart-bar{height:26px;border-radius:6px;background:linear-gradient(135deg,#10b981,#059669);transition:width .5s ease;margin:6px 0}
        .chart-label{font-size:15px;color:var(--text-secondary);margin-bottom:6px;font-weight:700}
        .progress-bar-bg{background:var(--border-color);border-radius:6px;overflow:hidden;margin-bottom:16px}
        .category-chip{display:inline-block;padding:6px 14px;border-radius:14px;font-size:14px;font-weight:700;margin:3px;background:#e0e7ff;color:#3730a3}
        .notification-dot{width:10px;height:10px;border-radius:50%;background:#ef4444;display:inline-block;margin-left:6px;animation:pulse 1s infinite}
        .profile-avatar{width:110px;height:110px;border-radius:50%;object-fit:cover;border:4px solid #10b981;cursor:pointer;display:block;margin:0 auto 14px;}
        .profile-avatar-placeholder{width:110px;height:110px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:44px;margin:0 auto 14px;cursor:pointer;border:4px solid #10b981;}
        .profile-header{text-align:center;padding:26px;background:linear-gradient(135deg,#f5f3ff,#ede9fe);border-radius:14px;margin-bottom:24px;}
        .profile-name{font-size:24px;font-weight:900;color:#1e1b4b;margin:10px 0 6px;}
        .profile-role{display:inline-block;padding:5px 16px;border-radius:24px;font-size:15px;font-weight:800;background:#6366f1;color:white;}
        .profile-section{background:var(--bg-tertiary);border-radius:12px;padding:20px;margin-bottom:18px;border:2px solid var(--border-color);color:var(--text-primary);font-size:16px}
        .profile-section h4{color:var(--text-primary);}
        [data-theme="dark"] .profile-section[style*="background:#f0fdf4"]{background:#1a3a2e !important;}
        [data-theme="dark"] .profile-section[style*="background:#fef3c7"]{background:#4c3d1d !important;}
        [data-theme="dark"] .profile-section[style*="background:#fef2f2"]{background:#4c1d1d !important;}

            @page{size:A4 portrait;margin:14mm 14mm 18mm 14mm;}

    // ── Fetch with timeout (default 12 seconds) ──────────────────────────
    function fetchWithTimeout(url, opts = {}, ms = 12000) {
        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), ms);
        return fetch(url, { ...opts, signal: controller.signal })
            .finally(() => clearTimeout(timer));
    }

    async function fbSignIn(email, password) {
        const res = await fetchWithTimeout(`${AUTH_BASE}:signInWithPassword?key=${FB.apiKey}`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({email, password, returnSecureToken: true})
        });
        const data = await res.json();
        if (data.error) throw data.error;
        return data;
    }

    async function fbRefreshToken() {

            method: 'POST',
            headers: {'Content-Type':'application/x-www-form-urlencoded'},
            body: `grant_type=refresh_token&refresh_token=${stored.refreshToken}`
        }, 10000); // 10s timeout for token refresh
        const data = await res.json();

        stored.idToken = data.id_token;

    function _isPermissionDenied(data,status){if(status===403){const msg=_fbErrMsg(data);if(!msg||msg.includes('permission_denied')||msg.includes('permission denied'))return true;}return _fbErrMsg(data).includes('permission_denied')||_fbErrMsg(data).includes('permission denied');}
    async function _dbFetch(url,opts,retried){const res=await fetch(url,opts);const data=await res.json().catch(()=>null);if(_isPermissionDenied(data,res.status)){console.warn('🚫 Firebase rules denied:',url.split('?')[0]);return null;}if((res.status===401||_isAuthError(data))&&!retried){const refreshed=await fbRefreshToken();if(!refreshed){showAlert('warning','⚠️ Your session expired. Please sign in again.');setTimeout(()=>logout(),2500);return null;}return _dbFetch(url.replace(/([?&])auth=[^&]+/,`$1auth=${refreshed.idToken}`),opts,true);}return data;}

    /**

     * queryParams: object with Firebase REST query keys, e.g.
     *   { orderBy: '"expiryDate"', limitToFirst: 500, startAt: '"2026-01-01"' }
     */
    async function dbGet(path, queryParams) {
        const token = STATE.user?.idToken;
        let url = `${FB.dbURL}/${path}.json?`;
        if (token) url += `auth=${token}&`;
        if (queryParams) {
            Object.entries(queryParams).forEach(([k, v]) => {
                url += `${encodeURIComponent(k)}=${encodeURIComponent(v)}&`;
            });
        }
        url = url.replace(/[?&]$/, ''); // trim trailing ? or &
        return _dbFetch(url, {});
    }

    // Simple hash for offline credential check (not cryptographic, just identity matching)
    async function hashPin(str) {
        try {
            const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
            return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('').slice(0,32);
        } catch(e) {
            // Fallback if crypto not available
            let h = 0;
            for (let i = 0; i < str.length; i++) { h = ((h << 5) - h) + str.charCodeAt(i); h |= 0; }
            return Math.abs(h).toString(16).padStart(32,'0');
        }
    }

    function saveOfflineCredential(email, password) {
        hashPin(email.toLowerCase() + '|' + password).then(hash => {
            try { localStorage.setItem('beep_offline_cred', JSON.stringify({ email: email.toLowerCase(), hash, savedAt: Date.now() })); } catch(e) {}
        });
    }

    async function checkOfflineCredential(email, password) {
        try {
            const raw = localStorage.getItem('beep_offline_cred');
            if (!raw) return false;
            const { email: savedEmail, hash } = JSON.parse(raw);
            if (savedEmail !== email.toLowerCase()) return false;
            const inputHash = await hashPin(email.toLowerCase() + '|' + password);
            return inputHash === hash;
        } catch(e) { return false; }
    }

    function _resetLoginBtn() {
        // Always get a fresh DOM reference — stale refs fail silently after re-renders
        const btn = document.getElementById('loginButton');
        if (btn) { btn.disabled = false; btn.textContent = '🚀 Sign In'; }
        _booting = false;

    async function boot() {
        const session = loadSession();

        // No saved session — show login form immediately
        if (!(session && session.refreshToken)) {
            hideBootLoader();
            if (!IS_ONLINE) showAuthAlert('warning', '📵 You\'re offline. Please connect to the internet to sign in.');
            return;
        }

        // Saved session exists — try to restore it
        _booting = true;
        showBootLoader('🔄 Restoring your session...');
        // Disable button only — do NOT change its text (changing to "Restoring..." caused the stuck button bug)
        const btnRef = document.getElementById('loginButton');
        if (btnRef) btnRef.disabled = true;

        try {
            // ── Offline restore ──
            if (!IS_ONLINE) {
                const uid = session.localId || session.uid;
                const hasCachedItems = !!cacheGetStale('items_admin') || !!cacheGetStale('items_' + uid);
                if (uid && hasCachedItems) {
                    STATE.user = session;
                    showBootLoader('📵 Loading offline...');
                    _booting = false;
                    await loadApp();
                    return;
                }
                hideBootLoader();
                _resetLoginBtn();
                showAuthAlert('warning', '📵 You\'re offline. Please connect to the internet for your first login.');
                return;
            }

            // ── Online restore — race token refresh vs 10s timeout ──
            let refreshed = null;
            try {
                refreshed = await Promise.race([
                    fbRefreshToken(),
                    new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 10000))
                ]);
            } catch(e) {
                console.warn('Token refresh failed:', e.message);
                clearSession();
                refreshed = null;
            }

            if (refreshed) {
                STATE.user = refreshed;
                startTokenRefreshSchedule();
                _booting = false;
                await loadApp();
                return; // loadApp() replaces entire DOM — nothing more to do here
            }

            // Token refresh returned null — session dead, prompt re-login
            clearSession();
            hideBootLoader();
            _resetLoginBtn();
            const emailEl = document.getElementById('email');
            if (emailEl && session.email) emailEl.value = session.email;
            showAuthAlert('warning', '⚠️ Session expired. Please sign in again.');

        } finally { _resetLoginBtn(); }
    }

    // ===================== CUSTOM PULL-TO-REFRESH =====================
    let touchStartY = 0;
    let touchCurrentY = 0;
    let pullDistance = 0;
    let isPulling = false;
    let pullThreshold = 80;

    function initPullToRefresh() {
        let pullIndicator = document.getElementById('pullIndicator');
        if (!pullIndicator) {
            pullIndicator = document.createElement('div');
            pullIndicator.id = 'pullIndicator';
            pullIndicator.style.cssText = 'position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(16,185,129,.95);color:white;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:10000;opacity:0;transition:opacity .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.2);';
            pullIndicator.innerHTML = '⬇️ Pull to refresh';
            document.body.appendChild(pullIndicator);
        }

        document.addEventListener('touchstart', (e) => {
            if (window.scrollY === 0) {
                touchStartY = e.touches[0].clientY;
                isPulling = true;
            }
        }, { passive: true });

        document.addEventListener('touchmove', (e) => {
            if (!isPulling || window.scrollY > 0) return;
            touchCurrentY = e.touches[0].clientY;
            pullDistance = touchCurrentY - touchStartY;
            
            // Prevent browser pull-to-refresh
            if (pullDistance > 0 && pullDistance < 150) {
                e.preventDefault();
                pullIndicator.style.opacity = Math.min(pullDistance / pullThreshold, 1);
                if (pullDistance >= pullThreshold) {
                    pullIndicator.innerHTML = '🔄 Release to refresh';
                } else {
                    pullIndicator.innerHTML = '⬇️ Pull to refresh';
                }
            }
        }, { passive: false }); // MUST be non-passive to preventDefault

        document.addEventListener('touchend', () => {
            if (isPulling && pullDistance >= pullThreshold) {
                pullIndicator.innerHTML = '⏳ Refreshing...';
                pullIndicator.style.opacity = '1';
                fetchItems().then(() => {
                    setTimeout(() => {
                        pullIndicator.style.opacity = '0';
                    }, 800);
                });
            } else {
                pullIndicator.style.opacity = '0';
            }
            isPulling = false;
            pullDistance = 0;
            touchStartY = 0;
        }, { passive: true });
    }

    function getDaysLeft(d) {
        const t = new Date(); t.setHours(0,0,0,0);
        const e = new Date(d); e.setHours(0,0,0,0);
        return Math.ceil((e - t) / 86400000);
    }
    function getStatus(d) { const n = getDaysLeft(d); return n <= 7 ? 'critical' : n <= 30 ? 'warning' : 'safe'; }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'}) : '—'; }
    function todayISO() { return new Date().toISOString().split('T')[0]; }
    function escHtml(str) {
        if (str == null) return '';
        return String(str)
            .replace(/&/g,'&amp;')
            .replace(/</g,'&lt;')
            .replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;')
            .replace(/'/g,'&#39;');
    }

    // ── Per-render memoized cache for getDaysLeft / getStatus ──
    // Reset once per renderTable call — eliminates redundant Date math during filter+render
    let _daysCache = new Map();
    let _statusCache = new Map();
    function _resetCalcCache() { _daysCache.clear(); _statusCache.clear(); }
    function getDaysLeftCached(d) {
        if (!d) return 9999;
        if (_daysCache.has(d)) return _daysCache.get(d);
        const v = getDaysLeft(d); _daysCache.set(d, v); return v;
    }
    function getStatusCached(d) {
        if (_statusCache.has(d)) return _statusCache.get(d);
        const v = getStatus(d); _statusCache.set(d, v); return v;
    }

    /**
     * Check for app updates
     */
    async function checkForUpdates() {
        try {
            const lastCheck = localStorage.getItem('beep_last_update_check');
            const now = Date.now();
            
            // Only check once per hour
            if (lastCheck && (now - parseInt(lastCheck)) < 3600000) {
                return;
            }
            
            localStorage.setItem('beep_last_update_check', now.toString());
            
            // Check if there's a newer version by trying to fetch the page
            // If content changes, hash will be different
            const currentHash = hashCode(document.documentElement.outerHTML);
            const storedHash = localStorage.getItem('beep_page_hash');
            
            if (!storedHash) {
                // First run, just store hash
                localStorage.setItem('beep_page_hash', currentHash.toString());
                return;
            }
            
            // On subsequent checks, if hash is different, there might be an update
            // (This is a simple check - in production you'd version the file)
            console.log('✅ Version check: Current v' + APP_VERSION);
            
        } catch(e) {
            // Silently fail - not critical
            console.log('Update check skipped:', e.message);
        }
    }
    
    /**
     * Simple hash function for version checking
     */
    function hashCode(str) {
        let hash = 0;
        for (let i = 0; i < str.length; i++) {
            const char = str.charCodeAt(i);
            hash = ((hash << 5) - hash) + char;
            hash = hash & hash; // Convert to 32bit integer
        }
        return hash;
    }

    // ===================== AUTH =====================
    async function login(event) {
        event.preventDefault();
        if (_booting) { _booting = false; clearSession(); }

        const email = document.getElementById('email').value.trim();
        const pass  = document.getElementById('pass').value;
        const btn   = document.getElementById('loginButton');
        btn.textContent = '⏳ Signing in...'; btn.disabled = true;

        // ── OFFLINE LOGIN ──
        if (!IS_ONLINE) {
            const session = loadSession();
            const credOk  = await checkOfflineCredential(email, pass);
            const uid = session?.localId || session?.uid;
            const hasCachedData = uid && (!!cacheGetStale('items_admin') || !!cacheGetStale('items_' + uid));
            if (credOk && session && session.email === email && hasCachedData) {
                STATE.user = session;
                showAuthAlert('info', '📵 Signing in offline with cached data...');
                await loadApp();
                return;
            } else if (!credOk && session?.email === email) {
                showAuthAlert('danger', '❌ Incorrect password. Cannot verify offline.');
            } else if (!hasCachedData) {
                showAuthAlert('warning', '📵 Offline — no cached data found. Please connect to the internet for your first sign-in.');
            } else {
                showAuthAlert('warning', '📵 You\'re offline. Please sign in with the account you last used on this device.');
            }
            btn.textContent = '🚀 Sign In'; btn.disabled = false;
            return;
        }

        // ── ONLINE LOGIN with 15s timeout ──
        try {
            const data = await Promise.race([
                fbSignIn(email, pass),
                new Promise((_, reject) => setTimeout(() => reject(new Error('LOGIN_TIMEOUT')), 15000))
            ]);
            const session = { idToken: data.idToken, refreshToken: data.refreshToken, localId: data.localId, email: data.email };
            saveSession(session);
            saveOfflineCredential(email, pass);
            STATE.user = session;
            startTokenRefreshSchedule();
            await loadApp();
            return;
        } catch(err) {
            let msg = err.message || 'Sign in failed.';
            const code = msg;
            if (code === 'LOGIN_TIMEOUT' || code.includes('AbortError') || code.toLowerCase().includes('timeout')) {
                msg = 'Connection timed out. Please check your internet connection and try again.';
            } else if (code.includes('EMAIL_NOT_FOUND') || code.includes('INVALID_LOGIN_CREDENTIALS') || code.includes('USER_NOT_FOUND')) {
                msg = 'Account not found. Please check your email or Create Account first.';
            } else if (code.includes('INVALID_PASSWORD') || code.includes('WRONG_PASSWORD')) {
                msg = 'Incorrect password. Please try again.';
            } else if (code.includes('INVALID_EMAIL')) {
                msg = 'Invalid email format.';
            } else if (code.includes('TOO_MANY_ATTEMPTS') || code.includes('TOO_MANY_REQUESTS')) {
                msg = 'Too many attempts. Please wait a few minutes before trying again.';
            } else if (code.includes('USER_DISABLED')) {
                msg = 'This account has been disabled. Contact your administrator.';
            } else if (code.includes('NETWORK') || code.includes('fetch') || code.includes('Failed to fetch')) {
                msg = 'Network error. Please check your internet connection and try again.';
            }
            showAuthAlert('danger', '❌ ' + msg);
            btn.textContent = '🚀 Sign In'; btn.disabled = false;
        }
    }

    function doRegister(event) {
        event.preventDefault();

        const conf = document.getElementById('regPassConfirm').value;
        const name = document.getElementById('regName').value.trim();

        }
        btn.textContent = '⏳ Creating account...'; btn.disabled = true;
        fbSignUp(email, pass)
            .then(data => {
                const session = { idToken: data.idToken, refreshToken: data.refreshToken, localId: data.localId, email: data.email };
                saveSession(session);
                STATE.user = session;
                // Save profile
                return dbSet('users/' + data.localId, {
                    email, displayName: name || email.split('@')[0],
                    createdAt: new Date().toISOString(), role: 'user', active: true
                });
            })
            .then(() => {
                alertDiv.innerHTML = '<div class="alert alert-success show">✅ Account created! Loading app...</div>';
                
                // Send login credentials via email for security
                sendLoginCredentialsEmail(email, name || email.split('@')[0]);
                
                setTimeout(() => { closeModal(); loadApp(); }, 1000);
            })
            .catch(err => {
                let msg = err.message || 'Registration failed.';
                if (msg.includes('EMAIL_EXISTS')) msg = 'Email already registered. Please login instead.';

    function _doGoogleOAuth(btn) {
        const GOOGLE_CLIENT_ID = '738716875529-YOUR_GOOGLE_CLIENT_ID.apps.googleusercontent.com';
        if (GOOGLE_CLIENT_ID.includes('YOUR_GOOGLE_CLIENT_ID')) {
            showAuthAlert('info', '🔵 <strong>Google Sign-In is not configured yet.</strong> Please use <strong>Email + Password</strong> to sign in.');
            if (btn) { btn.disabled = false; btn.innerHTML = _googleBtnHTML(); }
            return;
        }
        try {
            const tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: GOOGLE_CLIENT_ID, scope: 'email profile openid',
                callback: async (r) => {
                    if (r.error) { showAuthAlert('danger', '❌ Google Sign-In cancelled.'); if (btn) { btn.disabled=false; btn.innerHTML=_googleBtnHTML(); } return; }
                    await _firebaseGoogleSignIn(r.access_token, btn);
                }
            });
            tokenClient.requestAccessToken({ prompt: 'select_account' });
        } catch(e) { showAuthAlert('danger', '❌ Google Sign-In failed: ' + (e.message||'')); if (btn) { btn.disabled=false; btn.innerHTML=_googleBtnHTML(); } }
    }
    async function _firebaseGoogleSignIn(accessToken, btn) {
        try {
            const res = await fetch(`https://identitytoolkit.googleapis.com/v1/accounts:signInWithIdp?key=${FB.apiKey}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ postBody:`access_token=${accessToken}&providerId=google.com`, requestUri:window.location.origin, returnIdpCredential:true, returnSecureToken:true })
            });
            const data = await res.json();
            if (data.error) { let m=data.error.message||'Failed'; if(m.includes('OPERATION_NOT_ALLOWED')) m='Google Sign-In not enabled in Firebase. Enable it in Firebase Console → Authentication → Sign-in method → Google.'; showAuthAlert('danger',m); if(btn){btn.disabled=false;btn.innerHTML=_googleBtnHTML();} return; }
            const session = { idToken:data.idToken, refreshToken:data.refreshToken, localId:data.localId, email:data.email };
            saveSession(session); STATE.user = session;
            startTokenRefreshSchedule();
            const uid = data.localId;
            const existing = await dbGet('users/'+uid).catch(()=>null);
            if (!existing) { await dbSet('users/'+uid,{ email:data.email, displayName:data.displayName||data.email.split('@')[0], photoURL:data.photoUrl||'', role:ADMIN_EMAILS.includes(data.email)?'admin':'user', provider:'google', createdAt:new Date().toISOString() }).catch(()=>{}); }
            loadApp();
        } catch(e) { showAuthAlert('danger','❌ Sign-In failed: '+(e.message||'')); if(btn){btn.disabled=false;btn.innerHTML=_googleBtnHTML();} }
    }

    // ===================== LOCAL CACHE (offline + speed) =====================
    const CACHE_TTL = 5 * 60 * 1000; // 5 minutes
    function cacheSet(key, data) {
        try { localStorage.setItem('beep_cache_' + key, JSON.stringify({ data, ts: Date.now() })); } catch(e) {}
    }
    function cacheGet(key, maxAge = CACHE_TTL) {
        try {
            const raw = localStorage.getItem('beep_cache_' + key);
            if (!raw) return null;
            const { data, ts } = JSON.parse(raw);
            if (Date.now() - ts > maxAge) return null;
            return data;
        } catch(e) { return null; }
    }
    function cacheGetStale(key) { // Return even expired cache for offline fallback
        try {
            const raw = localStorage.getItem('beep_cache_' + key);
            return raw ? JSON.parse(raw).data : null;
        } catch(e) { return null; }
    }
    function cacheClear() {
        try {
            Object.keys(localStorage).filter(k => k.startsWith('beep_cache_')).forEach(k => localStorage.removeItem(k));
        } catch(e) {}
    }

    // Safe db fetch — falls back to cache when offline
    async function dbGetCached(path, cacheKey, maxAge = CACHE_TTL) {
        if (!IS_ONLINE) {
            const stale = cacheGetStale(cacheKey);
            if (stale) return stale;
            throw new Error('Offline and no cache available');
        }
        try {
            const fresh = await dbGet(path);
            if (fresh) cacheSet(cacheKey, fresh);
            return fresh;
        } catch(e) {
            const stale = cacheGetStale(cacheKey);
            if (stale) return stale;
            throw e;
        }
    }

    // ===================== REALTIME SYNC (SSE + Live Mode) =====================
    function startRealtimeSync() {
        if (!IS_ONLINE || !STATE.user) return;
        
        // Close existing connection
        if (STATE.sseConnection) {
            STATE.sseConnection.close();
            STATE.sseConnection = null;
        }

        const token = STATE.user.idToken;
        const url = `${FB.dbURL}/items.json?auth=${token}`;
        
        try {
            const eventSource = new EventSource(url);
            STATE.sseConnection = eventSource;

            eventSource.addEventListener('put', (e) => {
                try {
                    const data = JSON.parse(e.data);
                    if (!STATE.user) return;
                    if (data.data) {
                        const uid = STATE.user.localId || STATE.user.uid;
                        let all = Object.entries(data.data).map(([id, val]) => ({id, ...val}));
                        // Admin sees ALL items (no branch filter — mirrors fetchItems logic).
                        // Non-admin: filter by branch + user visibility.
                        if (!STATE.isAdmin) {
                            if (STATE.currentBranch) {
                                all = all.filter(i => i.branchId === STATE.currentBranch || !i.branchId);
                            }
                            all = all.filter(i => i.userId === uid || i.assignedTo === uid || i.assignedTo === 'all');
                        }
                        const oldCount = STATE.items.length;
                        STATE.items = all.sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                        
                        // Cache it (same key as fetchItems — no branch suffix to avoid stale-cache split)
                        const cacheKey = 'items_' + (STATE.isAdmin ? 'admin' : uid);
                        cacheSet(cacheKey, STATE.items);
                        
                        applyFilter();
                        updateStats();
                        updateLastRefresh();
                        
                        // Show notification if data changed
                        if (STATE.items.length !== oldCount) {
                            showChangeNotification();
                        }
                    }
                } catch(err) { console.warn('SSE parse error:', err); }
            });

            eventSource.addEventListener('patch', (e) => {
                // Partial update — refetch to be safe
                fetchItems();
            });

            eventSource.onerror = (e) => {
                console.warn('SSE connection error, falling back to polling');
                eventSource.close();
                STATE.sseConnection = null;
            };

        } catch(e) {
            console.warn('Failed to start SSE:', e);
        }
    }

    function stopRealtimeSync() {
        if (STATE.sseConnection) {
            STATE.sseConnection.close();
            STATE.sseConnection = null;
        }
    }

    function toggleLiveMode() {

    // ===================== LOAD APP =====================
    async function loadApp() {
        const uid = STATE.user.localId || STATE.user.uid;
        const email = STATE.user.email;

        if (!IS_ONLINE) showOfflineBanner();

        // ── 1. Load profile (try cache first for instant render) ──
        const cachedProfile = cacheGet('profile_' + uid, 10 * 60 * 1000);
        if (cachedProfile) {
            STATE.userProfile = cachedProfile;
            STATE.isAdmin = cachedProfile.role === 'admin' || ADMIN_EMAILS.includes(email);
            loadFontSize();
            _isFetchingItems = true; // items not loaded yet — show spinner not empty-state
            renderApp(); // Instant render from cache
        }

        // ── 2. Fire ALL network requests in parallel ──
        const [profileResult, settingsResult] = await Promise.allSettled([
            IS_ONLINE ? dbGet('users/' + uid) : Promise.resolve(null),
            IS_ONLINE ? dbGetCached('appSettings','appSettings', 60*60*1000) : Promise.resolve(null)
        ]);

        // Apply fresh profile
        const freshProfile = profileResult.status === 'fulfilled' && profileResult.value;
        if (freshProfile) {
            STATE.userProfile = freshProfile;
            cacheSet('profile_' + uid, freshProfile);
        } else if (!cachedProfile) {
            STATE.userProfile = { email: email||'', role: 'user', displayName: (email||'user').split('@')[0] };
        }
        STATE.isAdmin = STATE.userProfile.role === 'admin' || ADMIN_EMAILS.includes(email);
        loadFontSize();

        // Apply settings
        const freshSettings = settingsResult.status === 'fulfilled' && settingsResult.value;
        STATE.appSettings = freshSettings || cacheGetStale('appSettings') || {};
        if (freshSettings) cacheSet('appSettings', freshSettings);

        // ── 3. Render (if not already done from cache) ──
        // Pre-set fetching flag BEFORE renderApp so the table shows the spinner
        // immediately instead of the "No items found" empty state on cold cache.
        if (STATE.items.length === 0) _isFetchingItems = true;
        renderApp();
        initDarkMode(); // Apply saved theme

        // ── 4. Load branches (cached → instant) and set currentBranch ──
        await loadBranches();

        const savedBranch = STATE.userProfile?.currentBranch || localStorage.getItem('beep_current_branch');
        if (savedBranch && STATE.branches.some(b => b.id === savedBranch)) {
            STATE.currentBranch = savedBranch;
        } else if (STATE.branches.length > 0) {
            STATE.currentBranch = STATE.branches.find(b => b.active)?.id || STATE.branches[0]?.id;
        }
        // ── BRANCH ID SANITY LOG (visible in DevTools → Console) ──
        // If items don't show, open DevTools and look for the warning below,
        // then call fixBranchIds() or diagnoseBranch() to diagnose.
        console.log(
            '%cBEEP Branch init: currentBranch="' + STATE.currentBranch +
            '" | savedPref="' + (savedBranch||'(none)') +
            '" | knownBranches=[' + STATE.branches.map(b=>b.id).join(',') + ']',
            'color:#10b981;font-weight:bold;'
        );
        updateBranchDisplay();

        // ── 5. Fetch items immediately — don't wait for contacts/registerDevice ──
        // contacts and registerDevice are fire-and-forget; they don't affect the UI.
        await fetchItems();

        // Non-critical tasks run in background without blocking items display
        loadContacts().catch(()=>{});
        registerDevice().catch(()=>{});

        // ── 6. Live mode + sync intervals ──
        loadLiveModePref();
        if (STATE.liveMode) {
            STATE.refreshInterval = setInterval(fetchItems, 10000);
            startRealtimeSync();
        } else {
            STATE.refreshInterval = setInterval(fetchItems, STATE.isAdmin ? 30000 : 90000);
        }

        // ── 7. Non-critical deferred tasks ──
        initKeyboardScanner();
        setTimeout(checkSMSAlertsSchedule, 5000);
        setTimeout(checkForUpdates,        8000);
        setTimeout(showVersionNotification, 3000);
    }

            document.body.appendChild(banner);
            
            // Remove after 6 seconds
            setTimeout(() => {

    let _fetchLock = false;
    let _isFetchingItems = false; // true while Firebase fetch is in-flight (suppresses premature empty-state)
    async function fetchItems() {
        if (!STATE.user) return;
        if (_fetchLock) return;
        _fetchLock = true;
        _isFetchingItems = true; // suppress empty-state while loading
        try {
            const uid = STATE.user.localId || STATE.user.uid;
            const cacheKey = 'items_' + (STATE.isAdmin ? 'admin' : uid);

            // Show cached data instantly while fetching (increased TTL to 5 min)
            const cached = cacheGet(cacheKey, 10 * 60 * 1000);
            if (cached && STATE.items.length === 0) {
                // Ensure _search index exists on cached items
                STATE.items = cached.map(item => {
                    if (!item._search) {
                        item._search = [item.name, item.category, item.location,
                            item.checkedBy, item.barcode, item.notes
                        ].map(v => (v||'').toLowerCase()).join(' ');
                    }
                    return item;
                });
                requestAnimationFrame(() => {
                    _isBackgroundRefresh = true;
                    applyFilter();
                    _isBackgroundRefresh = false;
                    updateStats();
                });
            }

            if (!IS_ONLINE) {
                const stale = cacheGetStale(cacheKey);
                if (stale) { 
                    STATE.items = stale; 
                    requestAnimationFrame(() => {
                        _isBackgroundRefresh = true;
                        applyFilter(); 
                        _isBackgroundRefresh = false;
                        updateStats(); 
                    });
                }
                return;
            }

            // Fetch with server-side sort by expiryDate — pre-sorted data means
            // client-side .sort() becomes a no-op (already ordered).
            const allData = await dbGet('items', { orderBy: '"expiryDate"' }).catch(() => dbGet('items'));
            if (!allData || allData.error) {
                if (allData?.error) console.warn('fetchItems auth/db error:', allData.error);
                // ── BEEP FIX: Detect permission_denied and show actionable error ──
                const errMsg = (typeof allData?.error === 'string' ? allData.error : (allData?.error?.message || '')).toLowerCase();
                if (!allData || errMsg.includes('permission') || errMsg.includes('denied') || errMsg.includes('unauthorized')) {
                    console.error('BEEP: Firebase permission denied reading /items. Check Firebase Rules.');
                    if (STATE.items.length === 0) {
                        showAlert('danger', '🚫 Firebase rules blocked your data. Go to Firebase Console → Realtime Database → Rules and set: {".read":"auth != null",".write":"auth != null"} then refresh.');
                    }
                }
                // Don't wipe existing items on a transient error — keep showing stale data
                if (STATE.items.length === 0) STATE.items = [];
            } else {
                // Optimize: Use faster array operations
                const entries = Object.entries(allData);
                
                // ── VISIBILITY RULES ──
                // ADMIN  → sees ALL items from Firebase. No branch filter at the data layer.
                //          The branch switcher UI is cosmetic for admins (used when adding items).
                //          Branch-filtering admins caused data loss whenever branch IDs drifted
                //          across deploys (createDefaultBranch creating new Firebase push keys).
                // NON-ADMIN → sees only items for their branch + assigned to them / "all".
                let filtered;
                if (STATE.isAdmin) {
                    // Admin always gets everything — no branch filter
                    filtered = entries;
                } else {
                    // Non-admin: filter by current branch, then by user visibility
                    if (STATE.currentBranch) {
                        filtered = entries.filter(([,val]) =>
                            val.branchId === STATE.currentBranch || !val.branchId
                        );
                    } else {
                        filtered = entries;
                    }
                    // User-level visibility: own items + assigned items
                    filtered = filtered.filter(([,val]) =>
                        val.userId === uid ||
                        val.assignedTo === uid ||
                        val.assignedTo === 'all'
                    );
                }
                
                STATE.items = filtered
                    .map(([id, val]) => {
                        const item = {id, ...val};
                        // Pre-compute lowercase search index once per fetch
                        item._search = [
                            item.name, item.category, item.location,
                            item.checkedBy, item.barcode, item.notes
                        ].map(v => (v||'').toLowerCase()).join(' ');
                        return item;
                    })
                    .sort((a,b) => new Date(a.expiryDate) - new Date(b.expiryDate));
                
                cacheSet(cacheKey, STATE.items);

                // Large dataset advisory (admin only, once per session)
                if (STATE.isAdmin && STATE.items.length >= ITEMS_FETCH_LIMIT &&
                    !sessionStorage.getItem('beep_large_ds_warned')) {
                    sessionStorage.setItem('beep_large_ds_warned', '1');
                    showAlert('warning',
                        `⚠️ Large dataset: ${STATE.items.length.toLocaleString()} items loaded. ` +
                        `Consider archiving expired items (Admin → 🗃️ Data → Delete All Expired) ` +
                        `or splitting across branches for faster loads.`);
                }
            }
            
            // Batch DOM updates in single animation frame
            requestAnimationFrame(() => {
                _isBackgroundRefresh = true;
                applyFilter();
                _isBackgroundRefresh = false;
                _isFetchingItems = false; // clear AFTER renderTable so spinner never shows "No items found"
                updateStats();
                updateLastRefresh();
            });
        } catch(e) {
            console.error('Fetch items error:', e);
            if (!STATE.user) return;
            const uid = STATE.user.localId || STATE.user.uid;
            const stale = cacheGetStale('items_' + (STATE.isAdmin ? 'admin' : uid));
            if (stale) { 
                STATE.items = stale; 
                requestAnimationFrame(() => {
                    _isBackgroundRefresh = true;
                    applyFilter(); 
                    _isBackgroundRefresh = false;
                    _isFetchingItems = false;
                    updateStats(); 
                });
            } else {
                _isFetchingItems = false; // no stale data — show empty state
            }
        } finally {
            _fetchLock = false;
            // Note: _isFetchingItems is cleared inside the requestAnimationFrame callback
            // (after applyFilter runs) so the spinner stays until items are actually rendered.
        }
    }

    // ===================== STATS & FILTER =====================
    let _policyBannerChecked = false;
    async function checkAndShowPolicyBanner() {
        const banner = document.getElementById('policyBanner');
        if (!banner) return;
        // Only hit the DB once per session; after that use cached STATE value
        if (_policyBannerChecked) {
            const p = STATE.appSettings?.withdrawPolicy;
            banner.style.display = (p && (p.expired?.action || p.bizName)) ? 'flex' : 'none';
            return;
        }
        try {
            const p = STATE.appSettings?.withdrawPolicy || await dbGet('appSettings/withdrawPolicy').catch(()=>null);
            if (p && (p.expired?.action || p.bizName)) {
                banner.style.display = 'flex';
                STATE.appSettings.withdrawPolicy = p;
            } else {
                banner.style.display = 'none';
            }
            _policyBannerChecked = true;
        } catch(e) { banner.style.display = 'none'; }
    }

    function updateStats() {
        const total    = STATE.items.length;
        const critical = STATE.items.filter(i => getStatusCached(i.expiryDate) === 'critical').length;
        const warning  = STATE.items.filter(i => getStatusCached(i.expiryDate) === 'warning').length;
        const safe     = STATE.items.filter(i => getStatusCached(i.expiryDate) === 'safe').length;
        const expired  = STATE.items.filter(i => getDaysLeftCached(i.expiryDate) < 0).length;
        const se = id => document.getElementById(id);
        if (se('statTotal'))    se('statTotal').textContent    = total;
        if (se('statCritical')) se('statCritical').textContent = critical;
        if (se('statWarning'))  se('statWarning').textContent  = warning;
        if (se('statSafe'))     se('statSafe').textContent     = safe;
        // Pulse header if critical
        if (critical > 0) document.title = `🔴 ${critical} Critical | BEEP`;
        else document.title = '🔔 BEEP - Expiry Management';
        // Show/hide WhatsApp alert banner
        updateWAAlertBanner(critical, expired, warning);
    }

    function updateWAAlertBanner(critical, expired, warning) {
        const banner = document.getElementById('waAlertBanner');
        if (!banner) return;
        const waAlertsAllowed  = STATE.appSettings?.wa?.alertsEnabled !== false;
        const waUserEnabled    = localStorage.getItem('beep_wa_alerts') === 'true';
        const waAlertCritical  = STATE.appSettings?.wa?.alertCritical !== false;
        const waAlertExpired   = STATE.appSettings?.wa?.alertExpired  !== false;
        const waAlertWarning   = STATE.appSettings?.wa?.alertWarning  || false;
        const hasContacts      = (STATE.contacts || []).length > 0;

        const shouldShow = waAlertsAllowed && waUserEnabled && hasContacts &&
            ((waAlertCritical && critical > 0) ||
             (waAlertExpired  && expired  > 0) ||
             (waAlertWarning  && warning  > 0));

        banner.style.display = shouldShow ? 'flex' : 'none';

        if (shouldShow) {
            // Play alert chime only when banner transitions from hidden → visible
            if (!banner._wasVisible) playWANotifSound('alert');
            banner._wasVisible = true;
            const parts = [];
            if (waAlertExpired  && expired  > 0) parts.push(`${expired} expired`);
            if (waAlertCritical && critical > 0) parts.push(`${critical} critical`);
            if (waAlertWarning  && warning  > 0) parts.push(`${warning} warning`);
            const txt = document.getElementById('waAlertBannerText');
            if (txt) txt.textContent = `${parts.join(', ')} item${parts.length > 1 || (expired+critical+warning) > 1 ? 's' : ''} — tap to alert your contacts via WhatsApp`;
        } else {
            banner._wasVisible = false; // reset so next appearance plays sound again
        }
    }

    function getDateRangeForPreset(preset) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        
        let from = null;
        let to = null;
        
        switch(preset) {
            case 'today':
                from = new Date(today);
                to = new Date(today);
                to.setHours(23, 59, 59);
                break;
            case 'this_week':
                from = new Date(today);
                from.setDate(today.getDate() - today.getDay()); // Start of week (Sunday)
                to = new Date(from);
                to.setDate(from.getDate() + 6); // End of week (Saturday)
                to.setHours(23, 59, 59);
                break;
            case 'next_7':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 7);
                to.setHours(23, 59, 59);
                break;
            case 'next_14':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 14);
                to.setHours(23, 59, 59);
                break;
            case 'next_30':
                from = new Date(today);
                to = new Date(today);
                to.setDate(today.getDate() + 30);
                to.setHours(23, 59, 59);
                break;
            case 'this_month':
                from = new Date(today.getFullYear(), today.getMonth(), 1);
                to = new Date(today.getFullYear(), today.getMonth() + 1, 0);
                to.setHours(23, 59, 59);
                break;
            case 'next_month':
                from = new Date(today.getFullYear(), today.getMonth() + 1, 1);
                to = new Date(today.getFullYear(), today.getMonth() + 2, 0);
                to.setHours(23, 59, 59);
                break;
        }
        
        return { from, to };
    }

    function populateCheckedByFilter() {
        const sel = document.getElementById('checkedByFilter');
        if (!sel) return;
        const names = [...new Set(STATE.items.map(i => i.checkedBy).filter(Boolean))].sort();
        const current = STATE.currentCheckedBy;
        sel.innerHTML = `<option value="">👁️ All Checked By</option>` +
            names.map(n => `<option value="${escHtml(n)}" ${current === n ? 'selected' : ''}>${escHtml(n)}</option>`).join('');
    }

    function applyFilter() {
        let items = [...STATE.items];
        if (STATE.currentFilter !== 'all')
            items = items.filter(i => getStatusCached(i.expiryDate) === STATE.currentFilter);
        if (STATE.currentCategory)
            items = items.filter(i => i.category === STATE.currentCategory);
        if (STATE.currentCheckedBy)
            items = items.filter(i => (i.checkedBy||'').toLowerCase() === STATE.currentCheckedBy.toLowerCase());
        
        // Date filtering
        if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
            const range = getDateRangeForPreset(STATE.currentDatePreset);
            if (range.from && range.to) {
                items = items.filter(i => {
                    if (!i.expiryDate) return false;
                    const expiry = new Date(i.expiryDate);
                    return expiry >= range.from && expiry <= range.to;
                });
            }
        } else if (STATE.currentDateFrom || STATE.currentDateTo) {
            items = items.filter(i => {
                if (!i.expiryDate) return false;
                const expiry = new Date(i.expiryDate);
                if (STATE.currentDateFrom) {
                    const from = new Date(STATE.currentDateFrom);
                    if (expiry < from) return false;
                }
                if (STATE.currentDateTo) {
                    const to = new Date(STATE.currentDateTo);
                    to.setHours(23, 59, 59);
                    if (expiry > to) return false;
                }
                return true;
            });
        }
        
        if (STATE.currentSearch) {
            const s = STATE.currentSearch;
            items = items.filter(i => i._search && i._search.includes(s));
        }
        STATE.filtered = items;
        _resetCalcCache(); // reset per-render cache before renderTable
        populateCheckedByFilter();
        renderTable();
        checkAndShowPolicyBanner();
        const fi = document.getElementById('filterInfo');
        if (fi) {
            const parts = [];
            if (STATE.currentFilter !== 'all') parts.push(`Status: ${STATE.currentFilter}`);
            if (STATE.currentCategory) parts.push(`Category: ${STATE.currentCategory}`);
            if (STATE.currentCheckedBy) parts.push(`Checked By: "${STATE.currentCheckedBy}"`);
            if (STATE.currentDatePreset && STATE.currentDatePreset !== 'custom') {
                const labels = {today:'Today',this_week:'This Week',next_7:'Next 7 Days',next_14:'Next 14 Days',next_30:'Next 30 Days',this_month:'This Month',next_month:'Next Month'};
                parts.push(`Expiry: ${labels[STATE.currentDatePreset]||STATE.currentDatePreset}`);
            } else if (STATE.currentDateFrom || STATE.currentDateTo) {
                if (STATE.currentDateFrom && STATE.currentDateTo) parts.push(`Expiry: ${STATE.currentDateFrom} to ${STATE.currentDateTo}`);
                else if (STATE.currentDateFrom) parts.push(`Expiry: From ${STATE.currentDateFrom}`);
                else if (STATE.currentDateTo) parts.push(`Expiry: Until ${STATE.currentDateTo}`);
            }
            if (STATE.currentSearch) parts.push(`Search: "${STATE.currentSearch}"`);
            fi.textContent = parts.length ? `Filtering by: ${parts.join(' | ')}` : '';
        }
        const tf = document.getElementById('tableFooter');
        if (tf) tf.textContent = `Showing ${items.length} of ${STATE.items.length} items`;
    }

    // ===================== TABLE =====================
    const TABLE_PAGE_SIZE = window.innerWidth >= 1200 ? 300 : 200; // max rows rendered at once
    let _tableOffset = 0;        // current render start index

    // Flag set by fetchItems so renderTable knows it's a background refresh (not a user action)
    let _isBackgroundRefresh = false;

    function renderTable(resetOffset) {
        const wrapper = document.getElementById('tableWrapper');
        if (!wrapper) return;
        if (resetOffset !== false) _tableOffset = 0; // reset on new filter
        _resetCalcCache();

        // ── Preserve scroll only during background auto-refresh ──
        // User-triggered renders (filter change, search, sort) always reset to top.
        const scrollEl = wrapper.closest('.table-wrapper');
        const savedScrollTop = _isBackgroundRefresh && scrollEl ? scrollEl.scrollTop : 0;

        if (STATE.filtered.length === 0) {
            // Show a spinner while the first Firebase fetch is in-flight instead of "No items found".
            // This prevents the jarring empty state flash on fresh deploys / cold cache.
            if (_isFetchingItems && STATE.items.length === 0) {
                wrapper.innerHTML = `
                    <div class="empty-state" id="loadingState">
                        <div style="font-size:56px;margin-bottom:18px;animation:spin 1s linear infinite;display:inline-block;">⏳</div>
                        <h3 style="color:var(--text-secondary);">Loading inventory…</h3>
                        <p style="color:var(--text-tertiary);margin-top:8px;font-size:15px;">Fetching your items from the database</p>
                    </div>`;
            } else {
                wrapper.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📦</div>
                        <h3>No items found</h3>
                        <p>${STATE.items.length === 0 ? 'Start by adding your first inventory item!' : 'Try adjusting your search or filters.'}</p>
                        ${STATE.items.length === 0 ? `<button class="btn btn-success btn-sm" style="width:auto;margin-top:15px;" onclick="showAddItem()">➕ Add First Item</button>` : ''}
                    </div>`;
            }
            return;
        }

        const total   = STATE.filtered.length;
        const page    = STATE.filtered.slice(_tableOffset, _tableOffset + TABLE_PAGE_SIZE);
        const showing = _tableOffset + page.length;
        const rows    = page.map((item, idx) => generateTableRow(item, _tableOffset + idx)).join('');

        // Show more / show all bar
        const moreBar = showing < total ? `
            <div style="padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--bg-tertiary);border-top:2px solid var(--border-color);font-size:13px;color:var(--text-secondary);">
                <span>Showing <strong>${showing}</strong> of <strong>${total}</strong> items</span>
                <button class="btn btn-primary btn-xs" style="width:auto;" onclick="_loadMoreRows()">⬇️ Load ${Math.min(TABLE_PAGE_SIZE, total-showing)} More</button>
                ${total > TABLE_PAGE_SIZE ? `<button class="btn btn-secondary btn-xs" style="width:auto;" onclick="_loadAllRows()">📋 Show All ${total}</button>` : ''}
            </div>` : '';

        wrapper.innerHTML = `
            <table id="inventoryTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>📦 Name</th>
                        <th>🏷️ Category</th>
                        <th>🏢 Supplier</th>
                        <th>📍 Location</th>
                        <th>📅 Expiry</th>
                        <th>⏱️ Days Left</th>
                        <th>🚦 Status</th>
                        <th>📊 Qty</th>
                        <th>🔖 Barcode</th>
                        <th>📝 Notes</th>
                        <th>✅ Checked By</th>
                        <th>⚙️ Actions</th>
                    </tr>
                </thead>
                <tbody id="inventoryTbody">${rows}</tbody>
            </table>${moreBar}`;

        // ── Single delegated listener for all row actions ──
        // Replaces 3 inline onclick handlers × N rows
        const tbody = document.getElementById('inventoryTbody');
        if (tbody) {
            tbody.addEventListener('click', _tableClickHandler, { passive: true });
        }

        // ── Restore scroll position silently after DOM update ──
        if (savedScrollTop > 0 && scrollEl) {
            // Use requestAnimationFrame to restore after paint so browser doesn't fight it
            requestAnimationFrame(() => { scrollEl.scrollTop = savedScrollTop; });
        }

        updateLastRefresh();
    }

    function _tableClickHandler(e) {
        const btn = e.target.closest('[data-action]');
        if (!btn) return;
        const action = btn.dataset.action;
        const id     = btn.dataset.id;
        const name   = btn.dataset.name || '';
        if (action === 'view')   viewItem(id);
        if (action === 'edit')   editItem(id);
        if (action === 'delete') deleteItem(id, name);
    }

    function _loadMoreRows() {
        _tableOffset += TABLE_PAGE_SIZE;
        const wrapper = document.getElementById('tableWrapper');
        if (!wrapper) return;
        const total  = STATE.filtered.length;
        const page   = STATE.filtered.slice(_tableOffset, _tableOffset + TABLE_PAGE_SIZE);
        const showing = _tableOffset + page.length;
        const rows   = page.map((item, idx) => generateTableRow(item, _tableOffset + idx)).join('');

        // Append rows to existing tbody instead of full re-render
        const tbody = document.getElementById('inventoryTbody');
        if (tbody) {
            const tmp = document.createElement('tbody');
            tmp.innerHTML = rows;
            while (tmp.firstChild) tbody.appendChild(tmp.firstChild);
            tbody.addEventListener('click', _tableClickHandler, { passive: true });
        }

        // Update/remove more bar
        const existingBar = wrapper.querySelector('.more-bar');
        if (existingBar) existingBar.remove();
        if (showing < total) {
            const bar = document.createElement('div');
            bar.className = 'more-bar';
            bar.style.cssText = 'padding:12px 16px;display:flex;align-items:center;gap:12px;background:var(--bg-tertiary);border-top:2px solid var(--border-color);font-size:13px;color:var(--text-secondary);';
            bar.innerHTML = `<span>Showing <strong>${showing}</strong> of <strong>${total}</strong> items</span>
                <button class="btn btn-primary btn-xs" style="width:auto;" onclick="_loadMoreRows()">⬇️ Load ${Math.min(TABLE_PAGE_SIZE, total-showing)} More</button>
                ${total > TABLE_PAGE_SIZE ? `<button class="btn btn-secondary btn-xs" style="width:auto;" onclick="_loadAllRows()">📋 Show All ${total}</button>` : ''}`;
            wrapper.appendChild(bar);
        }
        _tableOffset = _tableOffset; // keep offset
    }

    function _loadAllRows() {
        _tableOffset = 0;
        const saved = TABLE_PAGE_SIZE;
        // Temporarily remove page limit and re-render all
        const tbody = document.getElementById('inventoryTbody');
        if (!tbody) return;
        const rows = STATE.filtered.map((item, idx) => generateTableRow(item, idx)).join('');
        tbody.innerHTML = rows;
        tbody.addEventListener('click', _tableClickHandler, { passive: true });
        const bar = document.querySelector('.more-bar');
        if (bar) bar.remove();
        updateLastRefresh();
    }

    function generateTableRow(item, idx) {
        const days   = getDaysLeftCached(item.expiryDate);
